<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🕸️ clawd-web</title>
<style>
  :root {
    --bg:  #1e0a0a;
    --bg2: #2d1212;
    --bg3: #3d1818;
    --border: #5a2020;
    --fg:  #f9eded;
    --fg2: rgba(249,237,237,0.6);
    --fg3: rgba(249,237,237,0.3);
    --accent:  #cc2b2b;
    --accent2: #e55a2b;
    --user: rgba(204,43,43,0.14);
    --user-border: rgba(204,43,43,0.3);
    --assistant: #2d1212;
    --tool: #1e0a0a;
    --tool-border: #5a2020;
    --thinking: #260e0e;
    --thinking-border: #5a2020;
    --error: #3d1010;
    --error-border: rgba(229,90,43,0.45);
    --ok:   #34eeb6;
    --warn: #ffcf72;
    --bad:  #e55a2b;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, Roboto, sans-serif;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #00aa00; font-family: var(--font-sans); font-size: 16px; line-height: 1.5; overflow: hidden; height: 100%; }

  @keyframes pulse  { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* ── Widget: full-height transparent overlay, bottom-left ────────────── */
  #widget {
    position: fixed; left: 0; top: 0; bottom: 15px; right: 0;
    width: 100%;
    display: flex; flex-direction: column;
    pointer-events: none;
    z-index: 9999; color: var(--fg);
    font-family: var(--font-sans); font-size: 16px;
  }
  #widget * { pointer-events: auto; }

  /* ── Bubble (minimized) ───────────────────────────────────────────────── */
  #bubble {
    display: none; flex-direction: column; gap: 6px;
    position: fixed; bottom: 60px; left: 8px;
    width: 178px;
    cursor: pointer; user-select: none; pointer-events: auto;
  }
  #bubble:hover { filter: brightness(1.1); }
  #bubbleVid video { width: 100%; border-radius: 8px; display: block; }

  /* Video cross-fade wrapper (added in JS) */
  .clawd-vid-wrap { position: relative; line-height: 0; }
  .clawd-vid-wrap > video { width: 100%; display: block; border-radius: 8px; }
  .clawd-vid-wrap > video.vid-overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    pointer-events: none;
  }
  .clawd-vid-wrap > video.vid-overlay.snap { opacity: 1; }
  .clawd-vid-wrap > video.vid-overlay.fading { opacity: 0; transition: opacity 0.4s ease; }
  #bubbleLastMsg {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    font-size: 13px; color: var(--fg2); line-height: 1.4;
    max-height: 72px; overflow: hidden;
  }
  #widget.minimized #bubble { display: flex; }
  #widget.minimized #panel  { display: none; }

  /* ── Speech mode: full-black 16:9 stage with Clawd + subtitles ────────── */
  #speechMode {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    z-index: 100000;
    align-items: center; justify-content: center;
    pointer-events: auto;
    cursor: pointer;
  }
  #widget.speech #speechMode { display: flex; animation: fadeUp 0.25s ease; }
  #widget.speech #panel,
  #widget.speech #bubble { display: none !important; }
  body:has(#widget.speech) { background: #000 !important; }

  #speechStage {
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    position: relative;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #speechVidWrap {
    height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  #speechVidWrap .clawd-vid-wrap {
    height: 100%;
    width: auto;
    border-radius: 0;
  }
  #speechVidWrap video {
    height: 100%;
    width: auto;
    max-width: 100%;
    border-radius: 0 !important;
    display: block;
    pointer-events: none;
  }
  #speechSubtitle {
    position: absolute;
    left: 0; right: 0; bottom: 2%;
    text-align: center;
    font-family: var(--font-sans);
    font-size: clamp(32px, 5.5vh, 72px);
    font-weight: 800;
    letter-spacing: 0.01em;
    color: #fff;
    -webkit-text-stroke: 2px #000;
    paint-order: stroke fill;
    text-shadow:
      0 0 2px #000,
      0 0 4px #000,
      0 0 8px rgba(0,0,0,0.95),
      0 4px 18px rgba(0,0,0,0.95),
      2px 2px 0 #000,
      -2px 2px 0 #000,
      2px -2px 0 #000,
      -2px -2px 0 #000;
    padding: 0 5%;
    line-height: 1.2;
    pointer-events: none;
    transition: opacity 0.15s ease;
    max-height: 35%;
    overflow: hidden;
  }
  #speechSubtitle:empty { opacity: 0; }

  /* HUD icons (status + listening) in speech mode */
  #speechHud {
    position: absolute;
    top: 24px; right: 28px;
    display: flex; align-items: center; gap: 16px;
    font-size: 28px; line-height: 1;
    pointer-events: none;
    z-index: 3;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9);
  }
  #speechHud > span {
    opacity: 0.18;
    transition: opacity 0.2s ease;
    filter: grayscale(0.7);
  }
  #widget.speech.rec  #speechMicIcon  { opacity: 1; filter: none; animation: pulse 1s infinite; }
  #widget.speech.busy #speechBusyIcon { opacity: 1; filter: none; animation: pulse 1.5s infinite; }

  /* Inline composer in speech mode */
  #speechComposer {
    position: fixed;
    left: 8%; right: 8%; bottom: 12px;
    display: flex; gap: 10px; align-items: center;
    pointer-events: auto;
    z-index: 100001;
  }
  #speechInput {
    flex: 1;
    background: transparent;
    border: none;
    color: #fff;
    padding: 4px 0;
    font: inherit; font-size: 18px;
    outline: none;
  }
  #speechInput::placeholder { color: transparent; }
  #speechSendBtn { display: none; }

  #bubbleControls {
    display: flex; align-items: center; gap: 6px;
    padding: 0 2px;
  }
  #bubbleControls .bubbleBtn {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--fg2); width: 22px; height: 22px;
    border-radius: 6px; cursor: pointer; font: inherit; font-size: 16px;
    line-height: 1; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #bubbleControls .bubbleBtn:hover { background: var(--bg3); color: var(--fg); }
  #bubbleControls .bubbleIcon {
    font-size: 16px; line-height: 1; display: none;
  }
  #bubble.rec  #bubbleMicIcon   { display: inline-block; animation: pulse 1s infinite; }
  #bubble.busy #bubbleThinkIcon { display: inline-block; animation: pulse 1.5s infinite; }

  /* ── Panel: transparent, full height ─────────────────────────────────── */
  #panel {
    display: flex; flex: 1; flex-direction: column; overflow: hidden;
    background: transparent;
    animation: fadeUp 0.2s ease;
  }
  #topRow { flex: 1; display: flex; overflow: hidden; }

  /* ── Clawd video ─────────────────────────────────────────────────────── */
  #clawdVid { flex-shrink: 0; padding: 0 6px 4px; cursor: pointer; }
  #clawdVid video { width: 100%; border-radius: 8px; display: block; pointer-events: none; }

  /* ── Sidebar: floating tab pills on the left ──────────────────────────── */
  #sidebar {
    width: 280px; flex-shrink: 0;
    display: flex; flex-direction: column;
    padding: 16px 6px 8px;
    pointer-events: none;
  }
  #sidebar * { pointer-events: auto; }
  #tabStack {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  #tabList {
    overflow-y: auto; overflow-x: hidden;
    display: flex; flex-direction: column; gap: 4px;
    scrollbar-width: none;
  }
  .tab {
    position: relative; padding: 7px 8px 7px 10px;
    border-radius: 7px; cursor: pointer; user-select: none;
    color: var(--fg2); background: var(--bg2);
    border: 1px solid var(--border);
    font-size: 12px; line-height: 1.3; transition: all 0.15s;
  }
  .tab .label { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 14px; }
  .tab:hover { background: var(--bg3); color: var(--fg); border-color: var(--border); }
  .tab.active { background: #3d0c0c; color: var(--fg); border-color: var(--accent); }
  .tab.dirty:not(.active) .label::before { content: "● "; color: var(--warn); font-size: 9px; vertical-align: middle; }
  .tab .close {
    display: none; position: absolute; top: 3px; right: 3px;
    background: var(--bg); border: none; color: var(--fg3);
    border-radius: 3px; font-size: 11px; padding: 0 4px; cursor: pointer; line-height: 1.4;
  }
  .tab:hover .close { display: block; }
  .tab .close:hover { color: #fff; background: var(--accent); }

  #sidebarFooter { display: none; }
  .sb-btn {
    width: 30px; height: 30px; border-radius: 6px;
    background: transparent; border: none;
    color: var(--fg3); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.1s;
  }
  .sb-btn:hover { color: var(--fg); }
  #statusDot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--fg3); flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  #statusDot.ok        { background: var(--ok);   box-shadow: 0 0 5px var(--ok); }
  #statusDot.connecting{ background: var(--warn);  animation: pulse 1s infinite; }
  #statusDot.bad       { background: var(--bad); }

  /* ── Main: messages + input ───────────────────────────────────────────── */

  /* Messages float up from bottom */
  #msgArea {
    flex: 1; min-width: 0; overflow-y: auto; overflow-x: hidden;
    display: flex; flex-direction: column;
    padding: 0 10px 0 4px;
    scrollbar-width: none;
  }
  #msgArea::-webkit-scrollbar { display: none; }
  #transcript { margin-top: auto; display: flex; flex-direction: column; gap: 6px; padding: 8px 0 4px; }
  .transcript-pane { display: none; flex-direction: column; gap: 6px; }
  .transcript-pane.active { display: flex; }

  /* Messages */
  .msg {
    padding: 7px 10px; border-radius: 8px; border: 1px solid transparent;
    font-size: 14px; animation: fadeUp 0.2s ease;
  }
  .msg .role {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--fg3); margin-bottom: 3px; font-weight: 600;
  }
  .msg .body { white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere; }
  .msg .body a { color: var(--accent); text-decoration: underline; }
  .msg .body a:visited { color: #a32222; }
  .msg .body a:hover { color: var(--accent2); }
  .msg .body code {
    background: var(--bg3); padding: 1px 4px; border-radius: 3px;
    font-family: var(--font-mono); font-size: 0.9em;
  }
  .msg .body pre {
    background: var(--bg); padding: 8px 10px; border-radius: 6px;
    overflow-x: auto; font-family: var(--font-mono); font-size: 11px;
    border: 1px solid var(--border); margin: 4px 0;
  }
  .msg.user { background: #2e0909; border-color: #5a1515; }
  .msg.assistant { background: var(--bg2); border-color: var(--border); overflow: hidden; }
  .msg.assistant::after { content: ""; display: table; clear: both; }
  .msg.system { font-size: 11px; color: var(--fg3); background: var(--bg); }
  .msg.error { background: var(--error); border-color: var(--error-border); }
  .msg.error .role { color: #ff9e9e; }
  .msg.faded { display: none; }
  .transcript-pane.revealing .msg.faded { display: block; }
  .transcript-pane.revealing .hidden-counter { display: none; }
  .hidden-counter {
    align-self: center; cursor: pointer; user-select: none;
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--fg3); font-size: 10px; font-family: var(--font-mono);
    padding: 2px 8px; border-radius: 999px;
    transition: color 0.1s, border-color 0.1s;
  }
  .hidden-counter:hover { color: var(--fg); border-color: var(--accent); }

  /* Tool cards */
  .tool-card {
    margin: 6px 0; background: var(--tool); border: 1px solid var(--tool-border);
    border-radius: 6px; overflow: hidden; font-family: var(--font-mono); font-size: 11px;
  }
  .tool-card .hdr {
    padding: 6px 10px; display: flex; align-items: center; gap: 6px; cursor: pointer;
    user-select: none; background: var(--bg);
  }
  .tool-card .hdr:hover { background: var(--bg2); }
  .tool-card .hdr .icon { flex-shrink: 0; }
  .tool-card .hdr .name { color: #d4a060; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tool-card .hdr .status {
    font-size: 9px; text-transform: uppercase; padding: 1px 6px;
    border-radius: 999px; background: var(--bg3); color: var(--fg2);
  }
  .tool-card .hdr .status.running { color: var(--warn); }
  .tool-card .hdr .status.done    { color: var(--ok); }
  .tool-card .hdr .status.error   { color: var(--bad); }
  .tool-card .hdr .chev { margin-left: auto; color: var(--fg3); transition: transform 0.15s; }
  .tool-card.open .hdr .chev { transform: rotate(90deg); }
  .tool-card .body-wrap { display: none; }
  .tool-card.open .body-wrap { display: block; }
  .tool-card .section { padding: 6px 10px; border-top: 1px solid var(--border); }
  .tool-card .section .label { color: var(--fg3); font-size: 9px; text-transform: uppercase; margin-bottom: 3px; letter-spacing: 0.05em; }
  .tool-card .section pre { margin: 0; padding: 0; background: transparent; border: none; white-space: pre-wrap; color: var(--fg); max-height: 240px; overflow-y: auto; }
  .tool-card.claude-code { border-color: #b88dd6; }
  .tool-card.claude-code .hdr .name { color: #c8a4e0; }

  /* Thinking pill */
  .thinking-card {
    float: right; clear: right; margin: 0 0 4px 8px;
    background: var(--thinking); border: 1px solid var(--thinking-border);
    border-radius: 20px; font-size: 11px; overflow: hidden;
    cursor: pointer; user-select: none; transition: border-radius 0.15s;
  }
  .thinking-card.open { border-radius: 8px; }
  .thinking-card .hdr { display: flex; align-items: center; padding: 3px 7px; }
  .thinking-card .hdr .icon { font-size: 14px; line-height: 1; }
  .thinking-card .hdr .label, .thinking-card .hdr .preview, .thinking-card .hdr .chev { display: none; }
  .thinking-card .body-wrap { display: none; padding: 6px 10px 8px; max-width: 280px; }
  .thinking-card.open .body-wrap { display: block; }
  .thinking-card .body { color: var(--fg2); font-style: italic; white-space: pre-wrap; max-height: 200px; overflow-y: auto; font-size: 10px; line-height: 1.5; }

  /* Working indicator */
  .working { display: inline-flex; align-items: center; gap: 5px; color: var(--fg3); font-size: 11px; }
  .working .blink { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 1s infinite; }
  .elapsed { font-size: 10px; color: var(--fg3); }

  /* Empty state */
  .empty { text-align: center; color: var(--fg3); padding: 40px 16px; }
  .empty h2 { color: var(--fg2); font-weight: 500; font-size: 15px; margin: 0 0 6px; }
  .empty p  { margin: 0; font-size: 11px; }

  /* ── Input area: full-width bottom strip ─────────────────────────────── */
  #inputArea {
    flex-shrink: 0; padding: 6px 10px 10px 10px;
    background: transparent;
  }
  #composer { display: flex; flex-direction: column; gap: 6px; }
  #composer textarea {
    width: 100%; background: var(--bg2); color: var(--fg);
    border: 1px solid var(--border); border-radius: 10px; resize: none;
    font: inherit; font-size: 15px; padding: 9px 12px;
    min-height: 48px; max-height: 140px; line-height: 1.5;
    box-sizing: border-box;
  }
  #composer textarea:focus { outline: none; border-color: var(--accent); }
  #composer textarea::placeholder { color: var(--fg3); }
  #controlsRow {
    display: flex; align-items: center; gap: 8px;
  }
  #modelPicker, #modePicker {
    flex: 1;
    padding: 5px 22px 5px 8px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg2); color: var(--fg3);
    font: inherit; font-size: 11px; cursor: pointer;
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path fill='%23663333' d='M0 0l4 5 4-5z'/></svg>");
    background-repeat: no-repeat; background-position: right 8px center;
  }
  #modelPicker:focus, #modePicker:focus { outline: 1px solid var(--accent); }
  #modelPicker:disabled, #modePicker:disabled { opacity: 0.4; cursor: not-allowed; }
  #modePicker { max-width: 130px; }
  #modePicker.has-mode { color: var(--fg); border-color: var(--accent); }
  #btnMic { font-size: 18px; }
  #btnMic.recording { color: var(--bad); animation: pulse 1s infinite; }
  #btnSpeak { font-size: 18px; }
  #btnSpeak.active { color: var(--ok); }

  #btnSend {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 6px 14px; font: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer; flex-shrink: 0; height: 34px;
  }
  #btnSend:hover { filter: brightness(1.15); }
  #btnSend:disabled { opacity: 0.4; cursor: not-allowed; }
  #btnSend.stop { background: var(--bad); }

  /* ── Settings panel ───────────────────────────────────────────────────── */
  #settings {
    position: fixed; bottom: 72px; left: 16px; width: 384px; z-index: 10000;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    display: none;
  }
  #settings.open { display: block; }
  #settings h3 { margin: 0 0 10px; font-size: 11px; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.06em; }
  #settings label { display: block; font-size: 10px; color: var(--fg3); margin-top: 8px; margin-bottom: 3px; }
  #settings input, #settings select {
    width: 100%; padding: 6px 9px; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; font: inherit; font-size: 11px;
    font-family: var(--font-mono);
  }
  #settings input:focus, #settings select:focus { outline: none; border-color: var(--accent); }
  #settings .row-btn { margin-top: 12px; display: flex; gap: 6px; }
  #settings .row-btn button { flex: 1; padding: 7px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--fg); font: inherit; font-size: 11px; cursor: pointer; }
  #settings .row-btn button.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  #settings .row-btn button:hover { filter: brightness(1.15); }
</style>
</head>
<body>

<div id="widget" class="expanded">

  <!-- Speech mode: full-screen black, 16:9 stage, Clawd + subtitles -->
  <div id="speechMode">
    <div id="speechStage">
      <div id="speechVidWrap">
        <video id="clawdVideoSpeech" autoplay muted playsinline src="clawdassets/idle_1.mp4"></video>
      </div>
      <div id="speechHud">
        <span id="speechBusyIcon" title="Working…">💭</span>
        <span id="speechMicIcon" title="Listening">🎤</span>
      </div>
      <div id="speechSubtitle"></div>
      <form id="speechComposer" onsubmit="event.preventDefault(); speechSend();">
        <input id="speechInput" type="text" autocomplete="off" />
        <button id="speechSendBtn" type="submit" title="Send" aria-hidden="true" tabindex="-1">↑</button>
      </form>
    </div>
  </div>

  <!-- Minimized bubble -->
  <div id="bubble">
    <div id="bubbleControls">
      <button type="button" id="bubbleNewTab" class="bubbleBtn" title="New chat">+</button>
      <span id="bubbleMicIcon" class="bubbleIcon" title="Listening">🎤</span>
      <span id="bubbleThinkIcon" class="bubbleIcon" title="Thinking…">💭</span>
    </div>
    <div id="bubbleVid">
      <video id="clawdVideoMin" autoplay muted playsinline src="clawdassets/idle_1.mp4"></video>
    </div>
    <div id="bubbleLastMsg"></div>
  </div>

  <!-- Expanded panel -->
  <div id="panel">

    <!-- Top row: sidebar + messages -->
    <div id="topRow">
      <div id="sidebar">
        <div id="tabStack">
          <div id="clawdVid">
            <video id="clawdVideo" autoplay muted playsinline src="clawdassets/idle_1.mp4"></video>
          </div>
          <div id="tabList"></div>
        </div>
      </div>
      <div id="msgArea">
        <div id="transcript"></div>
      </div>
    </div>

    <!-- Bottom: full-width input + controls -->
    <div id="inputArea">
      <form id="composer" onsubmit="event.preventDefault(); onSend();">
        <textarea id="input" rows="2" placeholder="message… (⌘↵)" autofocus></textarea>
        <div id="controlsRow">
          <button class="sb-btn" type="button" id="btnNewTab" title="New tab">+</button>
          <button class="sb-btn" type="button" id="btnSettings" title="Settings">⚙</button>
          <span id="statusDot" class="connecting" title="connecting…"></span>
          <select id="modelPicker" aria-label="Model">
            <option value="ollama/minimax-m3:cloud">MiniMax M3 · cloud</option>
            <option value="bankr/minimax-m2.7">MiniMax 2.7 · $0.30/$1.20</option>
            <option value="bankr/kimi-k2.6">Kimi K2.6 · $0.95/$4</option>
            <option value="bankr/claude-haiku-4.5">Haiku · $1/$5</option>
            <option value="bankr/deepseek-v4-pro">DeepSeek V4 Pro · $1.74/$3.48</option>
            <option value="bankr/claude-sonnet-4.6">Sonnet · $3/$15</option>
            <option value="bankr/claude-opus-4.6">Opus · $5/$25</option>
          </select>
          <select id="modePicker" aria-label="Mode" title="Prepended to your first message in this tab">

<script>
// ── Clawd video state machine ─────────────────────────────────────────────
const clawdVid = (() => {
  const IDLES = [
    "clawdassets/idle_1.mp4",
    "clawdassets/idle_2.mp4",
    "clawdassets/idle.mp4",
    "clawdassets/idle_lookaround.mp4",
  ];
  const RARE_BURGER  = "clawdassets/idle-rare-eats-a-burger.mp4";
  const RARE_SMOKING = "clawdassets/idle-smoking.mp4";
  const RARE_COFFEE  = "clawdassets/idle-sipping-coffee.mp4";
  const RARE_MASK    = "clawdassets/idle-guy-fawkes-mask.mp4";
  const CHAT_DEFAULT = "clawdassets/chatting_1.mp4";
  const CHAT_SHORT   = "clawdassets/short-subtle-talking.mp4";
  const CHAT_DRUNK   = "clawdassets/talking-lil-drunk.mp4";
  const CHAT_HELLO   = "clawdassets/talking-saying-hello.mp4";
  const CHAT_EXPLAIN_HANDS = "clawdassets/talking-explaining-with-his-hands.mp4";
  const CHAT_EXPLAIN = "clawdassets/explaining.mp4";
  const CHAT_SATISFIED = "clawdassets/talking-satisfied-just-finished-something-good.mp4";
  const FIRST_HELLO  = "clawdassets/saying-hello-for-the-first-time.mp4";
  const BUILDING     = "clawdassets/building.mp4";
  const BUILD_HAMMER_MED  = "clawdassets/hammering-tool-use-building-medium.mp4";
  const BUILD_HAMMER_LONG = "clawdassets/longer-hammering-tool-use.mp4";
  const BUILD_CLI_QUICK   = "clawdassets/quick-command-line-tool-use.mp4";
  const BUILD_CLI_MED     = "clawdassets/medium-cli-or-tool-use.mp4";
  const BUILD_CLI_LONG    = "clawdassets/longer-cli-command-line-tool-use.mp4";
  const THINKING     = "clawdassets/thinking-idle-light-thinking.mp4";
  const DEEP_THINKING = "clawdassets/deep-in-thought-or-listening.mp4";
  const LISTENING    = "clawdassets/thinking-listening.mp4";

  const DEEP_THINK_AFTER_MS = 5000;
  const BUILD_MED_AFTER_MS  = 8000;
  const BUILD_LONG_AFTER_MS = 25000;

  let _chatting = false;
  let _building = false;
  let _thinking = false;
  let _listening = false;
  let _deepTimer = null;
  let _buildingCat = null;
  let _buildingStartTs = 0;
  let _buildStageTimers = [];

  function categorizeTool(name) {
    const n = (name || "").toLowerCase();
    if (!n) return "hammer";
    if (n === "bash" || n.includes("command") || n.includes("shell") || n.includes("exec") || n.includes("terminal") || n.includes("run_")) return "cli";
    return "hammer";
  }
  function buildingSrcFor(cat, elapsedMs) {
    if (cat === "cli") {
      if (elapsedMs >= BUILD_LONG_AFTER_MS) return BUILD_CLI_LONG;
      if (elapsedMs >= BUILD_MED_AFTER_MS)  return BUILD_CLI_MED;
      return BUILD_CLI_QUICK;
    }
    if (elapsedMs >= BUILD_LONG_AFTER_MS) return BUILD_HAMMER_LONG;
    if (elapsedMs >= BUILD_MED_AFTER_MS)  return BUILD_HAMMER_MED;
    return BUILDING;
  }

  function nextIdle() {
    const r = Math.random();
    if (r < 0.005) return RARE_BURGER;        // ~0.5%
    if (r < 0.02)  return RARE_MASK;          // ~1.5% — puts on the mask
    if (r < 0.04)  return RARE_SMOKING;       // ~2%
    if (r < 0.09)  return RARE_COFFEE;        // ~5% — occasional coffee sip
    return IDLES[Math.floor(Math.random() * IDLES.length)];
  }

  // NOTE: right now only CHAT_DEFAULT (chatting_1.mp4) is a real animated
  // talking clip — the other CHAT_* files are still static stopgaps that read
  // as idle. So route ALL talking to CHAT_DEFAULT: the mouth actually moves,
  // and because chat clips don't loop, onEnded re-picks this same clip while
  // TTS is still playing → a continuous talking loop for the whole response.
  // Restore the contextual variety (hello/short/explain/satisfied) once those
  // clips are regenerated via tools/gen_avatar_veo.py.
  function nextChat(text, opts) {
    return CHAT_DEFAULT;
  }
  function nextChatVariant() {
    return CHAT_DEFAULT;
  }

  // Wrap each primary video and add an overlay layer for cross-fade.
  const slots = ["clawdVideo", "clawdVideoMin", "clawdVideoSpeech"].map(id => {
    const primary = document.getElementById(id);
    const wrap = document.createElement("div");
    wrap.className = "clawd-vid-wrap";
    primary.parentNode.insertBefore(wrap, primary);
    wrap.appendChild(primary);
    const overlay = primary.cloneNode(false);
    overlay.removeAttribute("id");
    overlay.removeAttribute("src");
    overlay.classList.add("vid-overlay");
    wrap.appendChild(overlay);
    // Once metadata is known, lock the wrapper's aspect-ratio so it never
    // collapses while primary's src is reloading.
    const setRatio = () => {
      const w = primary.videoWidth, h = primary.videoHeight;
      if (w && h) wrap.style.aspectRatio = `${w} / ${h}`;
    };
    if (primary.videoWidth) setRatio();
    else primary.addEventListener("loadedmetadata", setRatio, { once: true });
    return { primary, overlay, wrap };
  });

  const LOOPING_SRCS = new Set([
    BUILDING, BUILD_HAMMER_MED, BUILD_HAMMER_LONG,
    BUILD_CLI_QUICK, BUILD_CLI_MED, BUILD_CLI_LONG,
    THINKING, DEEP_THINKING, LISTENING,
  ]);
  function play(src) {
    const shouldLoop = LOOPING_SRCS.has(src);
    slots.forEach(({ primary, overlay, wrap }) => {
      // Freeze wrapper's current pixel height so it can't collapse while
      // primary's src is reloading (which would also shrink the absolute
      // overlay at 100% of wrap height).
      const h = wrap.offsetHeight;
      if (h) wrap.style.minHeight = h + "px";
      // Cancel any in-flight listeners.
      if (overlay._onPlaying) overlay.removeEventListener("playing", overlay._onPlaying);
      if (primary._onPlaying) primary.removeEventListener("playing", primary._onPlaying);
      if (overlay._fadeTimer) { clearTimeout(overlay._fadeTimer); overlay._fadeTimer = null; }

      primary.loop = shouldLoop;
      overlay.loop = shouldLoop;

      // Same src already → just ensure primary is playing, no transition.
      if (primary.src && primary.src.endsWith(src) && !primary.paused) return;

      // Reset overlay state.
      overlay.classList.remove("snap", "fading");
      overlay.src = src;
      overlay.play().catch(() => {});

      // If the file 404s or fails to decode, abort the transition so we
      // don't leave the overlay stuck mid-state. Primary keeps playing
      // whatever it had — graceful fallback for missing optional clips.
      const onError = () => {
        overlay.removeEventListener("error", onError);
        overlay.removeEventListener("playing", onOverlayPlaying);
        overlay._onPlaying = null;
        overlay.classList.remove("snap", "fading");
        wrap.style.minHeight = "";
      };
      overlay.addEventListener("error", onError, { once: true });

      const onOverlayPlaying = () => {
        overlay.removeEventListener("error", onError);
        overlay.removeEventListener("playing", onOverlayPlaying);
        overlay._onPlaying = null;

        // Snap overlay to fully opaque (instant cover, no fade-in flash).
        overlay.classList.add("snap");

        const onPrimaryPlaying = () => {
          primary.removeEventListener("playing", onPrimaryPlaying);
          primary._onPlaying = null;
          try { primary.currentTime = overlay.currentTime; } catch (_) {}
          // Now fade overlay out, revealing primary which is in sync.
          requestAnimationFrame(() => {
            overlay.classList.remove("snap");
            overlay.classList.add("fading");
            overlay._fadeTimer = setTimeout(() => {
              overlay.classList.remove("fading");
              overlay._fadeTimer = null;
              wrap.style.minHeight = "";
            }, 450);
          });
        };
        primary._onPlaying = onPrimaryPlaying;
        primary.addEventListener("playing", onPrimaryPlaying);
        // Wait one frame so 'snap' is committed before we kick the primary
        // src reload (which momentarily blanks it underneath the cover).
        requestAnimationFrame(() => {
          primary.src = src;
          primary.play().catch(() => {});
        });
      };
      overlay._onPlaying = onOverlayPlaying;
      overlay.addEventListener("playing", onOverlayPlaying);
    });
  }

  function onEnded() {
    // building/thinking loop, so onEnded won't fire while in those states.
    // If a chat clip ends while TTS audio is still going, pick a fresh
    // talking variant so the mouth keeps moving instead of dropping to idle.
    if (_chatting && (_ttsAudio || _ttsQueue.length > 0)) {
      play(nextChatVariant());
      return;
    }
    if (_chatting) _chatting = false;
    play(nextIdle());
  }

  // Only the primary drives 'ended'; the overlay is fading and we don't care.
  slots.forEach(({ primary }) => primary.addEventListener("ended", onEnded));

  function clearAll() {
    _chatting = _building = _thinking = _listening = false;
    _buildingCat = null;
    _buildingStartTs = 0;
    if (_deepTimer) { clearTimeout(_deepTimer); _deepTimer = null; }
    if (_buildStageTimers.length) {
      _buildStageTimers.forEach(clearTimeout);
      _buildStageTimers = [];
    }
  }

  return {
    chatting(text, opts) {
      // Already chatting: don't re-pick a variant mid-clip (TTS chunk
      // boundaries call this repeatedly — let the current clip finish).
      _building = false;
      _thinking = false;
      _listening = false;
      if (_deepTimer) { clearTimeout(_deepTimer); _deepTimer = null; }
      if (_chatting) return;
      _chatting = true;
      play(nextChat(text, opts));
    },
    building(toolName) {
      const cat = categorizeTool(toolName);
      if (_building && cat === _buildingCat) return;  // same category, keep looping

      if (!_building) {
        clearAll();
        _building = true;
        _buildingStartTs = Date.now();
      }
      _buildingCat = cat;

      const elapsed = Date.now() - _buildingStartTs;
      play(buildingSrcFor(cat, elapsed));

      // Cancel previous stage timers; schedule remaining stage transitions.
      _buildStageTimers.forEach(clearTimeout);
      _buildStageTimers = [];
      if (elapsed < BUILD_MED_AFTER_MS) {
        _buildStageTimers.push(setTimeout(() => {
          if (_building) play(buildingSrcFor(_buildingCat, BUILD_MED_AFTER_MS));
        }, BUILD_MED_AFTER_MS - elapsed));
      }
      if (elapsed < BUILD_LONG_AFTER_MS) {
        _buildStageTimers.push(setTimeout(() => {
          if (_building) play(buildingSrcFor(_buildingCat, BUILD_LONG_AFTER_MS));
        }, BUILD_LONG_AFTER_MS - elapsed));
      }
    },
    thinking() {
      if (_thinking) return;
      clearAll();
      _thinking = true;
      play(THINKING);
      // After a few seconds of waiting, switch to deeper thinking variant.
      _deepTimer = setTimeout(() => {
        _deepTimer = null;
        if (_thinking) play(DEEP_THINKING);
      }, DEEP_THINK_AFTER_MS);
    },
    listening() {
      if (_listening) return;
      clearAll();
      _listening = true;
      play(LISTENING);
    },
    idle(immediate = false) {
      clearAll();
      if (immediate) play(nextIdle());
    },
  };
})();

if (new URLSearchParams(location.search).has("debug")) window.__clawdDebug = true;
window.__eventLog = [];
(function installWsTap() {
  const _OrigWS = window.WebSocket;
  function TappedWS(...args) {
    const s = new _OrigWS(...args);
    s.addEventListener("message", (ev) => {
      try {
        const f = JSON.parse(ev.data);
        if (f?.type === "event" && (f.event === "agent" || f.event === "chat")) {
          window.__eventLog.push({ event: f.event, payload: f.payload, ts: Date.now() });
          if (window.__eventLog.length > 500) window.__eventLog.shift();
        }
      } catch {}
    });
    return s;
  }
  TappedWS.prototype = _OrigWS.prototype;
  TappedWS.CONNECTING = _OrigWS.CONNECTING;
  TappedWS.OPEN = _OrigWS.OPEN;
  TappedWS.CLOSING = _OrigWS.CLOSING;
  TappedWS.CLOSED = _OrigWS.CLOSED;
  window.WebSocket = TappedWS;
})();

// Default flipped to anthropic-1m direct on 2026-05-22 because bankr is
// returning 500 Authentication errors after 90+ second hangs. Revert to
// "bankr/claude-sonnet-4.6" once bankr is healthy again.
const DEFAULT_MODEL = "anthropic-1m/claude-sonnet-4-6";

// Cascade: if the picked model fails to deliver a first token within
// FIRST_TOKEN_TIMEOUT_MS, or errors, retry the same message on the next tier.
// Bankr is free but flaky → venice (anonymized Claude) is cheap → anthropic
// direct is the never-fails floor (most expensive). Total budget for the user
// to wait: FIRST_TOKEN_TIMEOUT_MS × number of tiers.
const CASCADE_FLOOR = "anthropic-1m/claude-sonnet-4-6";
const CASCADE_VENICE = "venice/claude-sonnet-4-6";
const FIRST_TOKEN_TIMEOUT_MS = 8000;
function cascadeChain(startModel) {
  // Hard-coded preferred chain. Then dedupe so we don't try the same provider
  // twice if DEFAULT_MODEL/picked model already IS one of the lower tiers.
  const BANKR_SONNET = "bankr/claude-sonnet-4.6";
  const preferred = [BANKR_SONNET, CASCADE_VENICE, CASCADE_FLOOR];
  // Figure out the index of startModel in the chain; everything before it is skipped.
  const i = preferred.indexOf(startModel);
  let chain = i >= 0 ? preferred.slice(i) : [startModel, CASCADE_FLOOR];
  // Dedupe while preserving order.
  return [...new Set(chain)];
}

function uuid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return "id-" + Date.now() + "-" + Math.random().toString(36).slice(2);
}

function shortHex(n=8) {
  const buf = new Uint8Array(Math.ceil(n / 2));
  crypto.getRandomValues(buf);
  return Array.from(buf, b => b.toString(16).padStart(2, "0")).join("").slice(0, n);
}

function renderText(text) {
  if (!text) return "";
  const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  function renderInline(raw) {
    let s = esc(raw);
    const codeSlots = [];
    s = s.replace(/`([^`\n]+)`/g, (_, c) => { codeSlots.push(c); return `␀${codeSlots.length - 1}␀`; });
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
    s = s.replace(/(^|[\s(])((?:https?:\/\/)[^\s<)]+)/g, (_, pre, url) => `${pre}<a href="${url}" target="_blank" rel="noreferrer">${url}</a>`);
    s = s.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/__([^_\n]+)__/g, "<strong>$1</strong>");
    s = s.replace(/(^|[^*\w])\*([^*\n]+)\*(?!\w)/g, "$1<em>$2</em>");
    s = s.replace(/(^|[^_\w])_([^_\n]+)_(?!\w)/g, "$1<em>$2</em>");
    s = s.replace(/␀(\d+)␀/g, (_, i) => `<code>${codeSlots[+i]}</code>`);
    return s;
  }

  function renderBlock(block) {
    const lines = block.split("\n");
    const out = [];
    let listType = null;
    const closeList = () => { if (listType) { out.push(`</${listType}>`); listType = null; } };
    for (const line of lines) {
      if (!line.trim()) { closeList(); out.push("<br/>"); continue; }
      const h = /^(#{1,6})\s+(.*)$/.exec(line);
      if (h) { closeList(); out.push(`<h${h[1].length}>${renderInline(h[2])}</h${h[1].length}>`); continue; }
      const ul = /^\s*[-*+]\s+(.*)$/.exec(line);
      if (ul) { if (listType !== "ul") { closeList(); listType = "ul"; out.push("<ul>"); } out.push(`<li>${renderInline(ul[1])}</li>`); continue; }
      const ol = /^\s*\d+\.\s+(.*)$/.exec(line);
      if (ol) { if (listType !== "ol") { closeList(); listType = "ol"; out.push("<ol>"); } out.push(`<li>${renderInline(ol[1])}</li>`); continue; }
      const bq = /^>\s?(.*)$/.exec(line);
      if (bq) { closeList(); out.push(`<blockquote>${renderInline(bq[1])}</blockquote>`); continue; }
      closeList();
      out.push(`${renderInline(line)}<br/>`);
    }
    closeList();
    return out.join("");
  }

  const parts = [];
  let i = 0;
  const re = /```(\w*)\n([\s\S]*?)```/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > i) parts.push({ type: "text", value: text.slice(i, m.index) });
    parts.push({ type: "code", value: m[2] });
    i = m.index + m[0].length;
  }
  if (i < text.length) parts.push({ type: "text", value: text.slice(i) });
  return parts.map(p => {
    if (p.type === "code") return `<pre><code>${esc(p.value)}</code></pre>`;
    return renderBlock(p.value);
  }).join("");
}

function extractText(content) {
  if (!content) return "";
  if (typeof content === "string") return content;
  if (Array.isArray(content)) {
    return content.filter(b => b && (b.type === "text" || typeof b.text === "string"))
                  .map(b => b.text || "").join("");
  }
  if (typeof content === "object" && typeof content.text === "string") return content.text;
  return "";
}

// ── Tab model ──────────────────────────────────────────────────────────────
function makeTab({ id, sessionKey, displayName, selectedModel, lastSentModel, selectedMode, scrollTop }) {
  const pane = document.createElement("div");
  pane.className = "transcript-pane";
  return {
    id, sessionKey, displayName,
    selectedModel: selectedModel || DEFAULT_MODEL,
    lastSentModel: lastSentModel || null,
    selectedMode: selectedMode || "",
    modeApplied: false,
    activeRunId: null,
    runs: new Map(),
    runCompletions: new Map(),
    paneEl: pane,
    historyLoaded: false,
    verboseEnabled: false,
    dirty: false,
    scrollTop: typeof scrollTop === "number" ? scrollTop : 0,
    turnCount: 0,
    silentRuns: new Set(),
    // Cascade: runs awaiting their first token. Map<runId, {resolve, reject}>.
    // Populated by sendWithCascade, drained by handleChatEvent on first delta
    // or by handleChatEvent on error/aborted (which then suppresses UI render).
    runFirstDelta: new Map(),
    // Event buffering — while loading history, queue events to replay AFTER
    // so they render in the right order and don't get wiped by the pane clear.
    loadingHistory: false,
    bufferedEvents: [],
  };
}

function currentTab() {
  return state.tabs.find(t => t.id === state.activeTabId) || null;
}
function tabBySession(sk) {
  return state.tabs.find(t => t.sessionKey === sk) || null;
}
function saveTabs() {
  localStorage.setItem("clawd.tabs", JSON.stringify(state.tabs.map(t => ({
    id: t.id,
    sessionKey: t.sessionKey,
    displayName: t.displayName,
    selectedModel: t.selectedModel,
    lastSentModel: t.lastSentModel,
    selectedMode: t.selectedMode || "",
    scrollTop: t.scrollTop || 0,
  }))));
  if (state.activeTabId) localStorage.setItem("clawd.activeTab", state.activeTabId);
}
function loadTabsFromStorage() {
  try {
    const arr = JSON.parse(localStorage.getItem("clawd.tabs") || "[]");
    if (!Array.isArray(arr) || !arr.length) return null;
    return arr.filter(t => t && t.id && t.sessionKey).map(makeTab);
  } catch { return null; }
}
// ── Modes ──────────────────────────────────────────────────────────────────
// Modes are .md files in modes/ served by the Python server. Selecting a mode
// in a fresh tab prepends the file content (wrapped in a <mode> block) to
// your first message. Picker locks after the first message is sent.
state.modes = [];     // [{ slug, name, content }]
state.modesById = {}; // slug -> mode object

async function loadModes() {
  try {
    const res = await fetch("/api/modes");
    const data = await res.json();
    state.modes = Array.isArray(data?.modes) ? data.modes : [];
    state.modesById = Object.fromEntries(state.modes.map(m => [m.slug, m]));
  } catch (e) {
    console.warn("[modes] load failed", e);
    state.modes = [];
    state.modesById = {};
  }
  populateModePicker();
}

function populateModePicker() {
  const sel = document.getElementById("modePicker");
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">no mode</option>' +
    state.modes.map(m => `<option value="${m.slug}">${m.name}</option>`).join("");
  // Restore current selection if still present
  if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
  syncModePicker(currentTab());
}

function syncModePicker(t) {
  const sel = document.getElementById("modePicker");
  if (!sel) return;
  if (!t) { sel.value = ""; sel.disabled = true; sel.classList.remove("has-mode"); return; }
  const v = t.selectedMode || "";
  // If the saved mode slug isn't in the list (file deleted), fall back to none.
  if (v && !state.modesById[v]) { t.selectedMode = ""; }
  sel.value = t.selectedMode || "";
  sel.disabled = !!t.modeApplied || (t.turnCount || 0) > 0;
  sel.classList.toggle("has-mode", !!t.selectedMode);
}

function nextTabName() {
  const used = new Set(state.tabs.map(t => t.displayName));
  for (let i = 1; i < 1000; i++) {
    const n = "new chat " + i;
    if (!used.has(n)) return n;
  }
  return "new chat " + Date.now();
}

async function createTab({ displayName, sessionKey, selectedModel, selectedMode, switchTo = true } = {}) {
  const id = "ui-" + shortHex(6);
  const tab = makeTab({
    id,
    sessionKey: sessionKey || ("agent:clawd:tab-" + shortHex(8)),
    displayName: displayName || nextTabName(),
    selectedModel: selectedModel || (currentTab()?.selectedModel || DEFAULT_MODEL),
    selectedMode: selectedMode !== undefined ? selectedMode : (currentTab()?.selectedMode || ""),
  });
  state.tabs.push(tab);
  $transcript.appendChild(tab.paneEl);
  renderTabs();
  saveTabs();
  if (switchTo) await switchTab(tab.id);
  return tab;
}

async function switchTab(id) {
  const t = state.tabs.find(x => x.id === id);
  if (!t) return;
  state.activeTabId = id;
  state.tabs.forEach(x => x.paneEl.classList.toggle("active", x.id === id));
  t.dirty = false;
  const sel = document.getElementById("modelPicker");
  if (sel) {
    if ([...sel.options].some(o => o.value === t.selectedModel)) sel.value = t.selectedModel;
    else { sel.value = DEFAULT_MODEL; t.selectedModel = DEFAULT_MODEL; }
  }
  syncModePicker(t);
  ttsReset();
  // Restore draft for this tab
  $input.value = loadDraft(t);
  autosize($input);
  requestAnimationFrame(() => $input.focus());
  setStatus(state.connected ? "ok" : "bad", t.sessionKey);
  updateSendButton();
  renderTabs();
  saveTabs();
  if (state.connected && !t.historyLoaded) loadHistory(t);
  // Restore the per-tab scroll position
  requestAnimationFrame(() => {
    const el = getMsgArea();
    if (!el) return;
    if (t.scrollTop && t.scrollTop > 0) el.scrollTop = t.scrollTop;
    else el.scrollTop = el.scrollHeight;
  });
}

async function closeTab(id) {
  const idx = state.tabs.findIndex(x => x.id === id);
  if (idx < 0) return;
  const t = state.tabs[idx];
  if (t.activeRunId && !confirm(`"${t.displayName}" has a run in progress — close anyway?`)) return;
  t.paneEl.remove();
  state.tabs.splice(idx, 1);
  if (state.activeTabId === id) {
    const next = state.tabs[Math.max(0, idx - 1)];
    if (next) await switchTab(next.id);
    else await createTab({ displayName: "new chat 1", sessionKey: "agent:clawd:tab-" + shortHex(8) });
  } else {
    renderTabs();
    saveTabs();
  }
}

function renameTab(id) {
  const t = state.tabs.find(x => x.id === id);
  if (!t) return;
  const v = prompt("Rename tab:", t.displayName);
  if (!v || v.trim() === "" || v === t.displayName) return;
  t.displayName = v.trim().slice(0, 40);
  renderTabs();
  saveTabs();
}

function renderTabs() {
  $tabs.innerHTML = "";
  for (const t of state.tabs) {
    const el = document.createElement("div");
    el.className = "tab" + (t.id === state.activeTabId ? " active" : "") + (t.dirty ? " dirty" : "");
    el.dataset.tabId = t.id;
    el.title = t.displayName + " — dblclick to rename";
    el.innerHTML = `<span class="label"></span><button class="close" title="Close">×</button>`;
    el.querySelector(".label").textContent = t.displayName;
    el.addEventListener("click", (e) => {
      if (e.target.classList.contains("close")) { e.stopPropagation(); closeTab(t.id); }
      else switchTab(t.id);
    });
    el.addEventListener("dblclick", (e) => {
      if (!e.target.classList.contains("close")) { e.preventDefault(); renameTab(t.id); }
    });
    $tabs.appendChild(el);
  }
  updateBubblePreview();
}

function updateBubblePreview() {
  const tab = currentTab();
  const $lastMsg = document.getElementById("bubbleLastMsg");
  if (!$lastMsg || !tab) return;
  const bodies = tab.paneEl ? tab.paneEl.querySelectorAll(".msg.assistant .body") : [];
  const lastText = bodies.length ? bodies[bodies.length - 1].textContent.trim() : "";
  $lastMsg.textContent = lastText || tab.displayName;
}

// ── Auto tab title via server proxy ───────────────────────────────────────
async function autoTitleTab(tab, seedText) {
  try {
    let context;
    if (seedText) {
      // Turn 1: we already have the user's message — skip the history RPC
      context = `user: ${seedText.slice(0, 400)}`;
    } else {
      context = getCachedTurns(tab)
        .filter(m => m.role === "user" || m.role === "assistant")
        .map(m => `${m.role}: ${(m.text || "").slice(0, 400)}`)
        .join("\n\n");
    }
    if (!context) return;

    const resp = await fetch("/api/autotitle", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: [{ role: "user", content: `Give a 2-3 word title for this conversation:\n\n${context}` }],
      }),
    });
    if (!resp.ok) { if (window.__clawdDebug) console.warn("autoTitle HTTP", resp.status); return; }
    const data = await resp.json();
    const title = data?.title;
    if (title && title.length >= 2) {
      tab.displayName = title;
      renderTabs();
      saveTabs();
    }
  } catch (e) {
    if (window.__clawdDebug) console.warn("autoTitleTab:", e);
  }
}

// ── Settings panel ─────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById("optBankrKey").value = state.config?.bankrKey || "";
  $optThinking.value = state.thinking;
  $settings.classList.add("open");
}
function closeSettings() { $settings.classList.remove("open"); }

$btnSettings.onclick = openSettings;
$btnSettingsClose.onclick = closeSettings;
