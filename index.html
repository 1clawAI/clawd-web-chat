<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🕸️ clawd-web</title>
<style>
  :root {
    --bg: #0e0f13;
    --bg2: #161820;
    --bg3: #1e2130;
    --fg: #e7e9ee;
    --fg2: #9aa0ad;
    --fg3: #5f6575;
    --accent: #7cc4ff;
    --accent2: #a694ff;
    --user: #2a3a5c;
    --assistant: #1e2130;
    --tool: #20261c;
    --tool-border: #3e4a2f;
    --thinking: #2a2030;
    --thinking-border: #4a3a5f;
    --error: #3a1f20;
    --error-border: #7a3a3a;
    --border: #2a2e3c;
    --ok: #7cc47c;
    --warn: #d4a74a;
    --bad: #d45a5a;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: var(--font-sans); font-size: 14px; line-height: 1.5; }
  body { display: flex; flex-direction: column; height: 100vh; }

  /* ── Top bar ──────────────────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0;
  }
  header .title { font-weight: 600; letter-spacing: -0.01em; }
  header .spacer { flex: 1; }
  header .pill {
    font-family: var(--font-mono); font-size: 11px; padding: 4px 10px;
    border-radius: 999px; background: var(--bg3); color: var(--fg2);
    display: inline-flex; align-items: center; gap: 6px;
  }
  header .pill .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--fg3);
  }
  header .pill.ok .dot { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  header .pill.connecting .dot { background: var(--warn); animation: pulse 1s infinite; }
  header .pill.bad .dot { background: var(--bad); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  header button {
    background: var(--bg3); color: var(--fg); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font: inherit; font-size: 12px;
  }
  header button:hover { background: var(--border); }
  header button.danger:hover { background: var(--error); border-color: var(--error-border); }

  /* ── Settings panel ───────────────────────────────────────────────────── */
  #settings {
    position: fixed; top: 52px; right: 16px; width: 380px; z-index: 10;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: none;
  }
  #settings.open { display: block; }
  #settings h3 { margin: 0 0 12px; font-size: 13px; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.05em; }
  #settings label { display: block; font-size: 11px; color: var(--fg2); margin-top: 10px; margin-bottom: 4px; }
  #settings input, #settings select {
    width: 100%; padding: 8px 10px; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; font: inherit; font-size: 12px;
    font-family: var(--font-mono);
  }
  #settings input:focus, #settings select:focus { outline: none; border-color: var(--accent); }
  #settings .row-btn { margin-top: 16px; display: flex; gap: 8px; }
  #settings .row-btn button { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--fg); font: inherit; cursor: pointer; }
  #settings .row-btn button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }
  #settings .row-btn button:hover { filter: brightness(1.15); }

  /* ── Transcript ───────────────────────────────────────────────────────── */
  main { flex: 1; overflow-y: auto; padding: 20px 0 120px; }
  #transcript { max-width: 820px; margin: 0 auto; padding: 0 20px; display: flex; flex-direction: column; gap: 16px; }

  .msg { padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); }
  .msg .role {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--fg2); margin-bottom: 6px; font-weight: 600;
  }
  .msg .body { white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere; }
  .msg .body code {
    background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px;
    font-family: var(--font-mono); font-size: 0.92em;
  }
  .msg .body pre {
    background: var(--bg); padding: 10px 12px; border-radius: 6px;
    overflow-x: auto; font-family: var(--font-mono); font-size: 12px;
    border: 1px solid var(--border); margin: 6px 0;
  }
  .msg.user { background: var(--user); border-color: #33456b; }
  .msg.user .role { color: #9ec0f0; }
  .msg.assistant { background: var(--assistant); }
  .msg.assistant .role { color: var(--accent2); }
  .msg.system { background: var(--bg3); font-size: 12px; color: var(--fg2); }
  .msg.error { background: var(--error); border-color: var(--error-border); }
  .msg.error .role { color: #ff9e9e; }

  /* Tool call cards */
  .tool-card {
    margin: 8px 0; background: var(--tool); border: 1px solid var(--tool-border);
    border-radius: 8px; overflow: hidden; font-family: var(--font-mono); font-size: 12px;
  }
  .tool-card .hdr {
    padding: 8px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer;
    user-select: none; background: rgba(0,0,0,0.2);
  }
  .tool-card .hdr:hover { background: rgba(0,0,0,0.3); }
  .tool-card .hdr .icon { flex-shrink: 0; }
  .tool-card .hdr .name { color: #c6d68f; font-weight: 500; }
  .tool-card .hdr .status {
    font-size: 10px; text-transform: uppercase; padding: 2px 7px;
    border-radius: 999px; background: rgba(255,255,255,0.08); color: var(--fg2);
  }
  .tool-card .hdr .status.running { color: var(--warn); }
  .tool-card .hdr .status.done { color: var(--ok); }
  .tool-card .hdr .status.error { color: var(--bad); }
  .tool-card .hdr .chev { margin-left: auto; color: var(--fg3); transition: transform 0.15s; }
  .tool-card.open .hdr .chev { transform: rotate(90deg); }
  .tool-card .body-wrap { display: none; }
  .tool-card.open .body-wrap { display: block; }
  .tool-card .section {
    padding: 8px 12px; border-top: 1px solid rgba(255,255,255,0.08);
  }
  .tool-card .section .label { color: var(--fg3); font-size: 10px; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.05em; }
  .tool-card .section pre {
    margin: 0; padding: 0; background: transparent; border: none; white-space: pre-wrap;
    color: var(--fg); max-height: 400px; overflow-y: auto;
  }

  /* Thinking block */
  .thinking-card {
    margin: 8px 0; background: var(--thinking); border: 1px solid var(--thinking-border);
    border-radius: 8px; padding: 10px 12px; font-size: 12px;
  }
  .thinking-card .label {
    color: var(--accent2); font-size: 10px; text-transform: uppercase;
    margin-bottom: 4px; letter-spacing: 0.05em;
  }
  .thinking-card .body { color: var(--fg2); font-style: italic; white-space: pre-wrap; }

  /* Inline "working" indicator */
  .working {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--fg3); font-size: 12px;
  }
  .working .blink {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    animation: pulse 1s infinite;
  }

  /* ── Input ────────────────────────────────────────────────────────────── */
  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    padding: 20px; display: flex; justify-content: center;
  }
  #composer {
    display: flex; gap: 8px; align-items: flex-end;
    max-width: 820px; width: 100%;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #composer textarea {
    flex: 1; background: transparent; color: var(--fg); border: none; resize: none;
    font: inherit; padding: 8px 10px; min-height: 22px; max-height: 200px;
    line-height: 1.5;
  }
  #composer textarea:focus { outline: none; }
  #composer button {
    background: var(--accent); color: #000; border: none; border-radius: 8px;
    padding: 8px 16px; font: inherit; font-weight: 500; cursor: pointer;
    min-width: 72px; height: 38px; align-self: flex-end;
  }
  #composer button:hover { filter: brightness(1.1); }
  #composer button:disabled { opacity: 0.5; cursor: not-allowed; }
  #composer button.stop { background: var(--bad); color: #fff; }

  /* ── Empty state ──────────────────────────────────────────────────────── */
  .empty {
    text-align: center; color: var(--fg3); padding: 60px 20px;
  }
  .empty h2 { color: var(--fg2); font-weight: 500; font-size: 18px; margin: 0 0 8px; }
  .empty p { margin: 0; font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="title">🕸️ clawd-web</div>
  <span id="status" class="pill connecting"><span class="dot"></span><span id="statusText">connecting…</span></span>
  <div class="spacer"></div>
  <button id="btnReset" class="danger" title="Reset this session (clears transcript on server)">Reset</button>
  <button id="btnSettings">⚙ Settings</button>
</header>

<div id="settings">
  <h3>Gateway Settings</h3>
  <label>WebSocket URL</label>
  <input id="optWsUrl" placeholder="ws://127.0.0.1:18789" />
  <label>Auth Token</label>
  <input id="optToken" type="password" placeholder="gateway.auth.token" />
  <label>Session Key</label>
  <input id="optSessionKey" placeholder="agent:default:main" />
  <label>Thinking</label>
  <select id="optThinking">
    <option value="off">off</option>
    <option value="on">on</option>
    <option value="high" selected>high</option>
    <option value="stream">stream</option>
  </select>
  <div class="row-btn">
    <button id="btnSettingsClose">Cancel</button>
    <button id="btnSettingsSave" class="primary">Save &amp; reconnect</button>
  </div>
</div>

<main>
  <div id="transcript">
    <div class="empty">
      <h2>connecting to openclaw…</h2>
      <p>once connected, your conversation history will load here.</p>
    </div>
  </div>
</main>

<footer>
  <form id="composer" onsubmit="event.preventDefault(); onSend();">
    <textarea id="input" rows="1" placeholder="Message clawdadsonnet… (⌘↵ to send)" autofocus></textarea>
    <button id="btnSend" type="submit">Send</button>
  </form>
</footer>

<script>
// ══════════════════════════════════════════════════════════════════════════
// clawd-web — native openclaw gateway WebSocket client
// ══════════════════════════════════════════════════════════════════════════

// Debug bridge: tap all WS frames into window.__eventLog for inspection.
// Set ?debug=1 to enable console logs. Always records to __eventLog.
if (new URLSearchParams(location.search).has("debug")) window.__clawdDebug = true;
window.__eventLog = [];
(function installWsTap() {
  const _OrigWS = window.WebSocket;
  function TappedWS(...args) {
    const s = new _OrigWS(...args);
    s.addEventListener("message", (ev) => {
      try {
        const f = JSON.parse(ev.data);
        if (f?.type === "event" && (f.event === "agent" || f.event === "chat")) {
          window.__eventLog.push({ event: f.event, payload: f.payload, ts: Date.now() });
          if (window.__eventLog.length > 500) window.__eventLog.shift();
        }
      } catch {}
    });
    return s;
  }
  TappedWS.prototype = _OrigWS.prototype;
  TappedWS.CONNECTING = _OrigWS.CONNECTING;
  TappedWS.OPEN = _OrigWS.OPEN;
  TappedWS.CLOSING = _OrigWS.CLOSING;
  TappedWS.CLOSED = _OrigWS.CLOSED;
  window.WebSocket = TappedWS;
})();

const state = {
  ws: null,
  reqSeq: 0,
  pending: new Map(),    // id → { resolve, reject }
  config: null,          // { wsUrl, token, sessionKey }
  connected: false,
  activeRunId: null,
  // Map of runId → turnState { assistantBlock, toolCards: Map<toolCallId, element>, thinkingEl, seqSeen }
  runs: new Map(),
  thinking: localStorage.getItem("clawd.thinking") || "high",
};

// ── DOM ────────────────────────────────────────────────────────────────────
const $transcript = document.getElementById("transcript");
const $input = document.getElementById("input");
const $btnSend = document.getElementById("btnSend");
const $btnReset = document.getElementById("btnReset");
const $btnSettings = document.getElementById("btnSettings");
const $btnSettingsClose = document.getElementById("btnSettingsClose");
const $btnSettingsSave = document.getElementById("btnSettingsSave");
const $settings = document.getElementById("settings");
const $optWsUrl = document.getElementById("optWsUrl");
const $optToken = document.getElementById("optToken");
const $optSessionKey = document.getElementById("optSessionKey");
const $optThinking = document.getElementById("optThinking");
const $status = document.getElementById("status");
const $statusText = document.getElementById("statusText");

// ── Utilities ──────────────────────────────────────────────────────────────
function setStatus(s, text) {
  $status.className = "pill " + s;
  $statusText.textContent = text;
}

function autosize($el) {
  $el.style.height = "auto";
  $el.style.height = Math.min($el.scrollHeight, 200) + "px";
}

function uuid() {
  // cryptographic-ish id; good enough for idempotency keys and request ids
  if (crypto.randomUUID) return crypto.randomUUID();
  return "id-" + Date.now() + "-" + Math.random().toString(36).slice(2);
}

function scrollToBottom(force = false) {
  const main = document.querySelector("main");
  const nearBottom = main.scrollHeight - main.scrollTop - main.clientHeight < 120;
  if (force || nearBottom) main.scrollTop = main.scrollHeight;
}

// Minimal markdown-ish rendering: escape HTML, fence code blocks, wrap backticks.
function renderText(text) {
  if (!text) return "";
  const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  // Split out code fences first
  const parts = [];
  let i = 0;
  const re = /```(\w*)\n([\s\S]*?)```/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > i) parts.push({ type: "text", value: text.slice(i, m.index) });
    parts.push({ type: "code", lang: m[1], value: m[2] });
    i = m.index + m[0].length;
  }
  if (i < text.length) parts.push({ type: "text", value: text.slice(i) });

  return parts.map(p => {
    if (p.type === "code") return `<pre><code>${esc(p.value)}</code></pre>`;
    // inline code
    const html = esc(p.value).replace(/`([^`\n]+)`/g, "<code>$1</code>");
    return html;
  }).join("");
}

// Extract plain text from a content field that may be string or array of blocks
function extractText(content) {
  if (!content) return "";
  if (typeof content === "string") return content;
  if (Array.isArray(content)) {
    return content.filter(b => b && (b.type === "text" || typeof b.text === "string"))
                  .map(b => b.text || "").join("");
  }
  if (typeof content === "object" && typeof content.text === "string") return content.text;
  return "";
}

// ── Settings panel ─────────────────────────────────────────────────────────
function openSettings() {
  $optWsUrl.value = state.config?.wsUrl || "";
  $optToken.value = state.config?.token || "";
  $optSessionKey.value = state.config?.sessionKey || "";
  $optThinking.value = state.thinking;
  $settings.classList.add("open");
}
function closeSettings() { $settings.classList.remove("open"); }

$btnSettings.onclick = openSettings;
$btnSettingsClose.onclick = closeSettings;
$btnSettingsSave.onclick = async () => {
  const cfg = {
    wsUrl: $optWsUrl.value.trim(),
    token: $optToken.value.trim(),
    sessionKey: $optSessionKey.value.trim() || "agent:default:main",
  };
  localStorage.setItem("clawd.config", JSON.stringify(cfg));
  state.thinking = $optThinking.value;
  localStorage.setItem("clawd.thinking", state.thinking);
  state.config = cfg;
  closeSettings();
  // Reconnect
  if (state.ws) try { state.ws.close(); } catch {}
  connect();
};

// ── Rendering ──────────────────────────────────────────────────────────────
function clearTranscript() {
  $transcript.innerHTML = "";
}

function renderUserMessage(text) {
  const el = document.createElement("div");
  el.className = "msg user";
  el.innerHTML = `<div class="role">You</div><div class="body"></div>`;
  el.querySelector(".body").innerHTML = renderText(text);
  $transcript.appendChild(el);
  return el;
}

function renderAssistantContainer() {
  const el = document.createElement("div");
  el.className = "msg assistant";
  el.innerHTML = `
    <div class="role">clawdadsonnet</div>
    <div class="body"></div>
    <div class="tools"></div>
    <div class="text"></div>
    <div class="footer-status"></div>
  `;
  $transcript.appendChild(el);
  return el;
}

function renderSystem(text) {
  const el = document.createElement("div");
  el.className = "msg system";
  el.textContent = text;
  $transcript.appendChild(el);
  return el;
}

function renderError(text) {
  const el = document.createElement("div");
  el.className = "msg error";
  el.innerHTML = `<div class="role">Error</div><div class="body"></div>`;
  el.querySelector(".body").textContent = text;
  $transcript.appendChild(el);
  return el;
}

// Tool card
function renderToolCard(parent, toolName, input, startOpen=false) {
  const card = document.createElement("div");
  card.className = "tool-card" + (startOpen ? " open" : "");
  card.innerHTML = `
    <div class="hdr">
      <span class="icon">🔧</span>
      <span class="name"></span>
      <span class="status running">running</span>
      <span class="chev">›</span>
    </div>
    <div class="body-wrap">
      <div class="section input-section">
        <div class="label">input</div>
        <pre></pre>
      </div>
      <div class="section output-section" style="display:none">
        <div class="label">output</div>
        <pre></pre>
      </div>
    </div>
  `;
  card.querySelector(".name").textContent = toolName || "tool";
  card.querySelector(".input-section pre").textContent = formatToolData(input);
  card.querySelector(".hdr").onclick = () => card.classList.toggle("open");
  parent.appendChild(card);
  return card;
}

function formatToolData(v) {
  if (v === undefined || v === null) return "";
  if (typeof v === "string") return v;
  try { return JSON.stringify(v, null, 2); } catch { return String(v); }
}

function updateToolResult(card, output, isError=false) {
  const statusEl = card.querySelector(".status");
  statusEl.className = "status " + (isError ? "error" : "done");
  statusEl.textContent = isError ? "error" : "done";
  const outSec = card.querySelector(".output-section");
  outSec.style.display = "block";
  outSec.querySelector("pre").textContent = formatToolData(output);
}

// Ensure there's a turn container for this runId; return it
function ensureTurn(runId) {
  let t = state.runs.get(runId);
  if (t) return t;
  const container = renderAssistantContainer();
  t = {
    runId,
    container,
    textEl: container.querySelector(".text"),
    toolsEl: container.querySelector(".tools"),
    footerEl: container.querySelector(".footer-status"),
    thinkingEl: null,
    toolCards: new Map(), // keyed by tool call id
    lastText: "",
    lastThinking: "",
  };
  state.runs.set(runId, t);

  // Indicate working
  t.footerEl.innerHTML = `<div class="working"><span class="blink"></span>working…</div>`;

  scrollToBottom(true);
  return t;
}

// ── Event handlers ─────────────────────────────────────────────────────────
function handleChatEvent(payload) {
  const { runId, sessionKey, state: chatState, message, errorMessage } = payload;
  if (window.__clawdDebug) console.debug("[chat]", chatState, message?.content);
  if (sessionKey && state.config?.sessionKey && sessionKey !== state.config.sessionKey) return;

  const t = ensureTurn(runId);

  if (chatState === "delta" || chatState === "final") {
    if (message) {
      // Extract text content
      const text = extractText(message.content);
      if (text) {
        t.lastText = text;
        t.textEl.innerHTML = renderText(text);
      }
      // If message.content has tool_use blocks, render them too (as an alternate path to agent events)
      if (Array.isArray(message.content)) {
        for (const b of message.content) {
          if (b && b.type === "tool_use" && b.id) {
            if (!t.toolCards.has(b.id)) {
              const card = renderToolCard(t.toolsEl, b.name, b.input);
              t.toolCards.set(b.id, card);
            }
          }
          if (b && b.type === "thinking" && typeof b.thinking === "string") {
            if (!t.thinkingEl) {
              t.thinkingEl = document.createElement("div");
              t.thinkingEl.className = "thinking-card";
              t.thinkingEl.innerHTML = `<div class="label">thinking</div><div class="body"></div>`;
              t.container.insertBefore(t.thinkingEl, t.toolsEl);
            }
            t.thinkingEl.querySelector(".body").textContent = b.thinking;
          }
        }
      }
    }
  }

  if (chatState === "final") {
    t.footerEl.innerHTML = "";
    state.activeRunId = null;
    updateSendButton();
    scrollToBottom();
  } else if (chatState === "aborted") {
    t.footerEl.innerHTML = `<div style="color:var(--warn); font-size:12px">⏹ aborted</div>`;
    state.activeRunId = null;
    updateSendButton();
  } else if (chatState === "error") {
    t.footerEl.innerHTML = `<div style="color:var(--bad); font-size:12px">⚠ ${errorMessage || "error"}</div>`;
    state.activeRunId = null;
    updateSendButton();
  } else {
    // delta → just keep working indicator
    scrollToBottom();
  }
}

function handleAgentEvent(payload) {
  const { runId, stream, data } = payload;
  if (window.__clawdDebug) console.debug("[agent]", stream, data);
  const t = ensureTurn(runId);

  // openclaw stream types (daemon-cli.js): "lifecycle" | "assistant" | "tool" | "thinking" | "reasoning"
  if (stream === "tool") {
    const callId = data?.toolCallId || data?.id || ("call-" + Date.now());
    const phase = data?.phase;
    if (phase === "start") {
      if (!t.toolCards.has(callId)) {
        // Build a nicer title: "exec: uuidgen" instead of just "exec"
        const baseName = data?.name || data?.toolName || "tool";
        const argPreview = data?.args?.command || data?.args?.path || data?.args?.url;
        const title = argPreview ? `${baseName}: ${String(argPreview).slice(0, 60)}` : baseName;
        const card = renderToolCard(t.toolsEl, title, data?.args || data?.input);
        t.toolCards.set(callId, card);
      }
    } else if (phase === "result" || phase === "end") {
      const card = t.toolCards.get(callId);
      // Tool output is emitted as meta/output/result depending on verbose level; fall back to a summary
      const out = data?.output ?? data?.result ?? data?.text ?? data?.content ?? data?.meta ?? "(completed)";
      const isError = !!data?.isError || !!data?.error;
      if (card) updateToolResult(card, out, isError);
      else {
        const orphan = renderToolCard(t.toolsEl, data?.name || "(result)", out, true);
        updateToolResult(orphan, out, isError);
      }
    }
    // phase === "update" — intermediate; ignore for now
  } else if (stream === "thinking" || stream === "reasoning") {
    const text = data?.text || data?.content;
    if (text) {
      if (!t.thinkingEl) {
        t.thinkingEl = document.createElement("div");
        t.thinkingEl.className = "thinking-card";
        t.thinkingEl.innerHTML = `<div class="label">${stream}</div><div class="body"></div>`;
        t.container.insertBefore(t.thinkingEl, t.toolsEl);
      }
      t.thinkingEl.querySelector(".body").textContent = text;
    }
  }
  // "lifecycle" and "assistant" are handled via chat events — ignore here
  scrollToBottom();
}

// ── WebSocket connection + RPC ─────────────────────────────────────────────
function connect() {
  if (!state.config?.wsUrl) {
    setStatus("bad", "no gateway URL");
    return;
  }
  setStatus("connecting", "connecting…");
  state.connectNonce = null;

  let ws;
  try {
    ws = new WebSocket(state.config.wsUrl);
  } catch (e) {
    setStatus("bad", "bad url");
    renderError("Failed to open WebSocket: " + e.message);
    return;
  }
  state.ws = ws;

  ws.onopen = async () => {
    // First frame must be `connect`
    try {
      const ident = await getOrCreateIdentity();
      const scopes = ["operator.read", "operator.write", "operator.admin"];
      const clientId = "openclaw-control-ui";
      const clientMode = "ui";
      const role = "operator";
      const device = await signDevicePayload(ident, {
        clientId, clientMode, role, scopes, token: state.config.token || null, nonce: state.connectNonce || null,
      });
      await rpc("connect", {
        minProtocol: 3,
        maxProtocol: 3,
        client: { id: clientId, displayName: "clawd-web", version: "0.1.0", platform: "web", mode: clientMode },
        role,
        scopes,
        caps: ["tool-events"],  // required so the gateway streams "tool" events to us
        auth: state.config.token ? { token: state.config.token } : undefined,
        locale: navigator.language || "en-US",
        userAgent: navigator.userAgent,
        device,
      });
      onConnected();
    } catch (err) {
      setStatus("bad", "auth failed");
      renderError("Handshake failed: " + (err.message || err));
    }
  };

  ws.onmessage = (ev) => {
    let frame;
    try { frame = JSON.parse(ev.data); }
    catch { console.warn("bad frame", ev.data); return; }
    onFrame(frame);
  };

  ws.onclose = (ev) => {
    setStatus("bad", `disconnected (${ev.code})`);
    state.connected = false;
    state.activeRunId = null;
    updateSendButton();
    if (ev.code === 1008) {
      renderError(
        "Gateway rejected the connection (1008). Likely causes:\n" +
        "  • Our origin isn't in gateway.controlUi.allowedOrigins\n" +
        "  • Device pairing is required (see `openclaw devices list`)\n" +
        "  • Auth token is wrong\n\n" +
        "See the clawd-web README for the fix."
      );
      return; // don't auto-reconnect on policy failures
    }
    // Auto-reconnect after 2s unless it was a manual close (code 1000)
    if (ev.code !== 1000) {
      setTimeout(() => { if (!state.connected) connect(); }, 2000);
    }
  };

  ws.onerror = () => {
    // onclose will fire after
  };
}

// ── Ed25519 device identity ────────────────────────────────────────────────
// Matches openclaw's device auth scheme:
//   deviceId = sha256(raw_public_key_32_bytes).hex
//   publicKey (wire) = base64url(raw_public_key_32_bytes)
//   signature = base64url(ed25519_sign(payload_utf8))
//   payload = version|deviceId|clientId|clientMode|role|scopes|signedAtMs|token[|nonce]
//   version = "v2" if nonce provided else "v1"
async function getOrCreateIdentity() {
  if (state.identity) return state.identity;
  const stored = localStorage.getItem("clawd.identity");
  if (stored) {
    try {
      const obj = JSON.parse(stored);
      const privateKey = await crypto.subtle.importKey(
        "jwk", obj.privJwk, { name: "Ed25519" }, true, ["sign"]
      );
      state.identity = { privateKey, deviceId: obj.deviceId, publicKey: obj.publicKey };
      return state.identity;
    } catch (e) {
      console.warn("stored identity unusable, regenerating:", e);
    }
  }
  // Generate new Ed25519 keypair
  let kp;
  try {
    kp = await crypto.subtle.generateKey({ name: "Ed25519" }, true, ["sign", "verify"]);
  } catch (e) {
    throw new Error("Ed25519 not supported in this browser — needs Chrome 112+ / Safari 17+ / Firefox 129+");
  }
  const rawPub = new Uint8Array(await crypto.subtle.exportKey("raw", kp.publicKey));
  const deviceIdBytes = new Uint8Array(await crypto.subtle.digest("SHA-256", rawPub));
  const deviceId = bytesToHex(deviceIdBytes);
  const publicKey = bytesToB64Url(rawPub);
  const privJwk = await crypto.subtle.exportKey("jwk", kp.privateKey);
  localStorage.setItem("clawd.identity", JSON.stringify({ deviceId, publicKey, privJwk }));
  state.identity = { privateKey: kp.privateKey, deviceId, publicKey };
  return state.identity;
}

async function signDevicePayload(identity, { clientId, clientMode, role, scopes, token, nonce }) {
  const signedAtMs = Date.now();
  const version = nonce ? "v2" : "v1";
  const parts = [
    version,
    identity.deviceId,
    clientId,
    clientMode,
    role,
    scopes.join(","),
    String(signedAtMs),
    token || "",
  ];
  if (version === "v2") parts.push(nonce || "");
  const payload = parts.join("|");
  const sigBuf = await crypto.subtle.sign(
    { name: "Ed25519" }, identity.privateKey, new TextEncoder().encode(payload)
  );
  const out = {
    id: identity.deviceId,
    publicKey: identity.publicKey,
    signature: bytesToB64Url(new Uint8Array(sigBuf)),
    signedAt: signedAtMs,
  };
  if (nonce) out.nonce = nonce;
  return out;
}

function bytesToHex(u8) {
  return Array.from(u8, b => b.toString(16).padStart(2, "0")).join("");
}
function bytesToB64Url(u8) {
  let s = "";
  for (let i = 0; i < u8.length; i++) s += String.fromCharCode(u8[i]);
  return btoa(s).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function onFrame(frame) {
  if (frame.type === "res") {
    const p = state.pending.get(frame.id);
    if (p) {
      state.pending.delete(frame.id);
      if (frame.ok) p.resolve(frame.payload);
      else p.reject(new Error(frame.error?.message || "rpc error"));
    }
    return;
  }
  if (frame.type === "event") {
    switch (frame.event) {
      case "chat":       return handleChatEvent(frame.payload);
      case "agent":      return handleAgentEvent(frame.payload);
      case "connect.challenge":
        // Capture nonce so we can include it in the signed payload (v2)
        if (frame.payload?.nonce) state.connectNonce = frame.payload.nonce;
        return;
      case "tick":
      case "presence":
      case "health":
        return;
      default:
        if (window.__clawdDebug) console.debug("[unhandled event]", frame.event, frame.payload);
        return;
    }
  }
}

function rpc(method, params) {
  return new Promise((resolve, reject) => {
    if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
      return reject(new Error("not connected"));
    }
    const id = "r" + (++state.reqSeq);
    state.pending.set(id, { resolve, reject });
    state.ws.send(JSON.stringify({ type: "req", id, method, params }));
    // 60s timeout
    setTimeout(() => {
      if (state.pending.has(id)) {
        state.pending.delete(id);
        reject(new Error(method + " timed out"));
      }
    }, 60000);
  });
}

async function onConnected() {
  state.connected = true;
  setStatus("ok", state.config.sessionKey);
  updateSendButton();
  // Enable verbose on this session so tool / thinking events stream live.
  // Requires operator.admin scope (pair once: `openclaw devices approve <id>`).
  try {
    await rpc("sessions.patch", { key: state.config.sessionKey, verboseLevel: "on" });
  } catch (e) {
    console.warn("sessions.patch verboseLevel failed:", e.message);
  }
  await loadHistory();
}

// ── History load ───────────────────────────────────────────────────────────
async function loadHistory() {
  clearTranscript();
  try {
    const res = await rpc("chat.history", {
      sessionKey: state.config.sessionKey,
      limit: 100,
    });
    const msgs = res.messages || res.items || [];
    if (msgs.length === 0) {
      const el = document.createElement("div");
      el.className = "empty";
      el.innerHTML = `<h2>ready</h2><p>session: <code>${state.config.sessionKey}</code><br/>no history yet — say something below.</p>`;
      $transcript.appendChild(el);
      return;
    }
    for (const m of msgs) renderHistoryMessage(m);
    scrollToBottom(true);
  } catch (e) {
    renderError("Could not load history: " + e.message);
  }
}

function renderHistoryMessage(m) {
  const role = m.role || "system";
  if (role === "user") {
    renderUserMessage(extractText(m.content) || "(empty)");
  } else if (role === "assistant") {
    const container = renderAssistantContainer();
    const textEl = container.querySelector(".text");
    const toolsEl = container.querySelector(".tools");
    const content = m.content;
    // Tool blocks
    if (Array.isArray(content)) {
      for (const b of content) {
        if (b?.type === "tool_use") {
          const card = renderToolCard(toolsEl, b.name, b.input);
          // No result info in history per-call (usually in next message), leave running? mark done to avoid confusion
          const statusEl = card.querySelector(".status");
          statusEl.className = "status done";
          statusEl.textContent = "done";
        }
      }
    }
    const text = extractText(content);
    if (text) textEl.innerHTML = renderText(text);
  } else if (role === "tool") {
    // Tool result in history; try to attach to previous assistant card if possible
    const text = extractText(m.content);
    const sys = renderSystem("tool → " + (text.length > 200 ? text.slice(0, 200) + "…" : text));
    sys.style.fontFamily = "var(--font-mono)";
  } else {
    const text = extractText(m.content);
    if (text) renderSystem(text);
  }
}

// ── Sending ────────────────────────────────────────────────────────────────
function updateSendButton() {
  if (state.activeRunId) {
    $btnSend.textContent = "Stop";
    $btnSend.classList.add("stop");
    $btnSend.disabled = false;
  } else {
    $btnSend.textContent = "Send";
    $btnSend.classList.remove("stop");
    $btnSend.disabled = !state.connected;
  }
}

async function onSend() {
  if (state.activeRunId) {
    return onStop();
  }
  const text = $input.value.trim();
  if (!text) return;
  if (!state.connected) {
    renderError("Not connected");
    return;
  }
  // Clear empty state if present
  const empty = $transcript.querySelector(".empty");
  if (empty) empty.remove();

  renderUserMessage(text);
  $input.value = "";
  autosize($input);

  try {
    const res = await rpc("chat.send", {
      sessionKey: state.config.sessionKey,
      message: text,
      thinking: state.thinking,
      deliver: false,
      idempotencyKey: uuid(),
    });
    if (res?.runId) {
      state.activeRunId = res.runId;
      updateSendButton();
    }
  } catch (e) {
    renderError("chat.send failed: " + e.message);
  }
}

async function onStop() {
  if (!state.activeRunId) return;
  try {
    await rpc("chat.abort", {
      sessionKey: state.config.sessionKey,
      runId: state.activeRunId,
    });
  } catch (e) {
    renderError("chat.abort failed: " + e.message);
  }
}

$btnReset.onclick = async () => {
  if (!confirm("Reset this session? The transcript on the server will be cleared.")) return;
  try {
    await rpc("sessions.reset", { key: state.config.sessionKey, reason: "reset" });
    state.runs.clear();
    state.activeRunId = null;
    updateSendButton();
    await loadHistory();
  } catch (e) {
    renderError("sessions.reset failed: " + e.message);
  }
};

// ── Input handling ─────────────────────────────────────────────────────────
$input.addEventListener("input", () => autosize($input));
$input.addEventListener("keydown", (e) => {
  // Enter = send (unless shift) on desktop; ⌘/Ctrl+Enter always sends
  if (e.key === "Enter" && ((e.metaKey || e.ctrlKey) || !e.shiftKey)) {
    e.preventDefault();
    onSend();
  }
});

// ── Boot ───────────────────────────────────────────────────────────────────
async function boot() {
  // Load stored settings first, fall back to server /config
  const stored = localStorage.getItem("clawd.config");
  if (stored) {
    try { state.config = JSON.parse(stored); } catch {}
  }
  if (!state.config?.wsUrl || !state.config?.token) {
    try {
      const resp = await fetch("/config");
      const cfg = await resp.json();
      state.config = { ...cfg, ...(state.config || {}) };
      // If stored had no URL/token but server did, prefer server values
      if (!state.config.wsUrl) state.config.wsUrl = cfg.wsUrl;
      if (!state.config.token) state.config.token = cfg.token;
      if (!state.config.sessionKey) state.config.sessionKey = cfg.sessionKey;
    } catch (e) {
      console.warn("no /config endpoint", e);
    }
  }
  if (!state.config?.wsUrl) state.config = { ...(state.config || {}), wsUrl: "ws://127.0.0.1:18789" };
  if (!state.config?.sessionKey) state.config.sessionKey = "agent:default:main";

  if (!state.config.token) {
    setStatus("bad", "no token — open settings");
    openSettings();
    return;
  }
  connect();
}

window.__clawdState = state;
boot();
</script>
</body>
