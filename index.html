<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🕸️ clawd-web</title>
<style>
  :root {
    --bg: #0e0f13;
    --bg2: #161820;
    --bg3: #1e2130;
    --fg: #e7e9ee;
    --fg2: #9aa0ad;
    --fg3: #5f6575;
    --accent: #7cc4ff;
    --accent2: #a694ff;
    --user: #2a3a5c;
    --assistant: #1e2130;
    --tool: #20261c;
    --tool-border: #3e4a2f;
    --thinking: #2a2030;
    --thinking-border: #4a3a5f;
    --error: #3a1f20;
    --error-border: #7a3a3a;
    --border: #2a2e3c;
    --ok: #7cc47c;
    --warn: #d4a74a;
    --bad: #d45a5a;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: var(--font-sans); font-size: 14px; line-height: 1.5; }
  body { display: flex; flex-direction: column; height: 100vh; }

  /* ── Top bar ──────────────────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0;
  }
  header .title { font-weight: 600; letter-spacing: -0.01em; }
  header .spacer { flex: 1; }
  header .pill {
    font-family: var(--font-mono); font-size: 11px; padding: 4px 10px;
    border-radius: 999px; background: var(--bg3); color: var(--fg2);
    display: inline-flex; align-items: center; gap: 6px;
  }
  header .pill .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--fg3);
  }
  header .pill.ok .dot { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  header .pill.connecting .dot { background: var(--warn); animation: pulse 1s infinite; }
  header .pill.bad .dot { background: var(--bad); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  header button {
    background: var(--bg3); color: var(--fg); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font: inherit; font-size: 12px;
  }
  header button:hover { background: var(--border); }
  header button.danger:hover { background: var(--error); border-color: var(--error-border); }

  /* ── Tab strip ────────────────────────────────────────────────────────── */
  #tabs {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 8px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: 10px;
    overflow-x: auto; flex-shrink: 0;
    scrollbar-width: thin;
    max-width: 820px; width: 100%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .tab {
    display: flex; align-items: center; gap: 4px;
    padding: 5px 4px 5px 10px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; cursor: pointer;
    white-space: nowrap; user-select: none;
    color: var(--fg2); flex-shrink: 0;
    max-width: 200px;
  }
  .tab:hover { background: var(--border); color: var(--fg); }
  .tab.active {
    background: var(--accent); color: #000; border-color: var(--accent);
  }
  .tab.active:hover { filter: brightness(1.05); background: var(--accent); }
  .tab .label { line-height: 1; overflow: hidden; text-overflow: ellipsis; }
  .tab.dirty:not(.active) .label::after {
    content: "•"; margin-left: 4px; color: var(--warn);
  }
  .tab .close {
    background: transparent; border: none; color: inherit; cursor: pointer;
    font-size: 14px; padding: 1px 5px; opacity: 0.5;
    border-radius: 3px; line-height: 1;
  }
  .tab .close:hover { opacity: 1; background: rgba(0,0,0,0.2); }
  .tab.active .close:hover { background: rgba(0,0,0,0.15); }
  #newTab {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--fg2); border-radius: 6px;
    width: 28px; height: 28px;
    font-size: 16px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #newTab:hover { color: var(--fg); background: var(--border); }

  /* ── Settings panel ───────────────────────────────────────────────────── */
  #settings {
    position: fixed; top: 52px; right: 16px; width: 380px; z-index: 10;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: none;
  }
  #settings.open { display: block; }
  #settings h3 { margin: 0 0 12px; font-size: 13px; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.05em; }
  #settings label { display: block; font-size: 11px; color: var(--fg2); margin-top: 10px; margin-bottom: 4px; }
  #settings input, #settings select {
    width: 100%; padding: 8px 10px; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; font: inherit; font-size: 12px;
    font-family: var(--font-mono);
  }
  #settings input:focus, #settings select:focus { outline: none; border-color: var(--accent); }
  #settings .row-btn { margin-top: 16px; display: flex; gap: 8px; }
  #settings .row-btn button { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--fg); font: inherit; cursor: pointer; }
  #settings .row-btn button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }
  #settings .row-btn button:hover { filter: brightness(1.15); }

  /* ── Transcript ───────────────────────────────────────────────────────── */
  main { flex: 1; overflow-y: auto; padding: 20px 0 180px; }
  #transcript { max-width: 820px; margin: 0 auto; padding: 0 20px; }
  .transcript-pane {
    display: none;
    flex-direction: column; gap: 16px;
  }
  .transcript-pane.active { display: flex; }

  .msg { padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); }
  .msg .role {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--fg2); margin-bottom: 6px; font-weight: 600;
  }
  .msg .body { white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere; }
  .msg .body code {
    background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px;
    font-family: var(--font-mono); font-size: 0.92em;
  }
  .msg .body pre {
    background: var(--bg); padding: 10px 12px; border-radius: 6px;
    overflow-x: auto; font-family: var(--font-mono); font-size: 12px;
    border: 1px solid var(--border); margin: 6px 0;
  }
  .msg.user { background: var(--user); border-color: #33456b; }
  .msg.user .role { color: #9ec0f0; }
  .msg.assistant { background: var(--assistant); }
  .msg.assistant .role { color: var(--accent2); }
  .msg.system { background: var(--bg3); font-size: 12px; color: var(--fg2); }
  .msg.error { background: var(--error); border-color: var(--error-border); }
  .msg.error .role { color: #ff9e9e; }

  /* Tool call cards */
  .tool-card {
    margin: 8px 0; background: var(--tool); border: 1px solid var(--tool-border);
    border-radius: 8px; overflow: hidden; font-family: var(--font-mono); font-size: 12px;
  }
  .tool-card .hdr {
    padding: 8px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer;
    user-select: none; background: rgba(0,0,0,0.2);
  }
  .tool-card .hdr:hover { background: rgba(0,0,0,0.3); }
  .tool-card .hdr .icon { flex-shrink: 0; }
  .tool-card .hdr .name { color: #c6d68f; font-weight: 500; }
  .tool-card .hdr .status {
    font-size: 10px; text-transform: uppercase; padding: 2px 7px;
    border-radius: 999px; background: rgba(255,255,255,0.08); color: var(--fg2);
  }
  .tool-card .hdr .status.running { color: var(--warn); }
  .tool-card .hdr .status.done { color: var(--ok); }
  .tool-card .hdr .status.error { color: var(--bad); }
  .tool-card .hdr .chev { margin-left: auto; color: var(--fg3); transition: transform 0.15s; }
  .tool-card.open .hdr .chev { transform: rotate(90deg); }
  .tool-card .body-wrap { display: none; }
  .tool-card.open .body-wrap { display: block; }
  .tool-card .section {
    padding: 8px 12px; border-top: 1px solid rgba(255,255,255,0.08);
  }
  .tool-card .section .label { color: var(--fg3); font-size: 10px; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.05em; }
  .tool-card .section pre {
    margin: 0; padding: 0; background: transparent; border: none; white-space: pre-wrap;
    color: var(--fg); max-height: 400px; overflow-y: auto;
  }

  /* Thinking block */
  .thinking-card {
    margin: 8px 0; background: var(--thinking); border: 1px solid var(--thinking-border);
    border-radius: 8px; font-size: 12px; overflow: hidden;
  }
  .thinking-card .hdr {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; cursor: pointer; user-select: none;
  }
  .thinking-card .hdr .icon { font-size: 13px; }
  .thinking-card .hdr .label {
    color: var(--accent2); font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.05em; flex-shrink: 0;
  }
  .thinking-card .hdr .preview {
    flex: 1; min-width: 0; color: var(--fg3); font-style: italic;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .thinking-card.open .hdr .preview { display: none; }
  .thinking-card .hdr .chev { color: var(--fg3); transition: transform 0.15s; flex-shrink: 0; }
  .thinking-card.open .hdr .chev { transform: rotate(90deg); }
  .thinking-card .body-wrap { display: none; padding: 0 12px 10px; }
  .thinking-card.open .body-wrap { display: block; }
  .thinking-card .body {
    color: var(--fg2); font-style: italic; white-space: pre-wrap;
    max-height: 320px; overflow-y: auto;
  }

  /* Inline "working" indicator */
  .working {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--fg3); font-size: 12px;
  }
  .working .blink {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    animation: pulse 1s infinite;
  }

  /* ── Input ────────────────────────────────────────────────────────────── */
  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--bg) 50%, transparent);
    padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  #composer {
    display: flex; gap: 8px; align-items: flex-end;
    max-width: 820px; width: 100%;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #modelPicker {
    align-self: flex-end; height: 38px; padding: 0 28px 0 10px;
    border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--fg);
    font: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23888' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center;
  }
  #modelPicker:hover { filter: brightness(1.15); }
  #modelPicker:focus { outline: 1px solid var(--accent); }
  #modelPicker:disabled { opacity: 0.5; cursor: not-allowed; }
  #composer textarea {
    flex: 1; background: transparent; color: var(--fg); border: none; resize: none;
    font: inherit; padding: 8px 10px; min-height: 22px; max-height: 200px;
    line-height: 1.5;
  }
  #composer textarea:focus { outline: none; }
  #composer button {
    background: var(--accent); color: #000; border: none; border-radius: 8px;
    padding: 8px 16px; font: inherit; font-weight: 500; cursor: pointer;
    min-width: 72px; height: 38px; align-self: flex-end;
  }
  #composer button:hover { filter: brightness(1.1); }
  #composer button:disabled { opacity: 0.5; cursor: not-allowed; }
  #composer button.stop { background: var(--bad); color: #fff; }

  /* ── Empty state ──────────────────────────────────────────────────────── */
  .empty {
    text-align: center; color: var(--fg3); padding: 60px 20px;
  }
  .empty h2 { color: var(--fg2); font-weight: 500; font-size: 18px; margin: 0 0 8px; }
  .empty p { margin: 0; font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="title">🕸️ clawd-web</div>
  <span id="status" class="pill connecting"><span class="dot"></span><span id="statusText">connecting…</span></span>
  <div class="spacer"></div>
  <button id="btnReset" class="danger" title="Reset the active tab's session (clears server transcript)">Reset</button>
  <button id="btnSettings">⚙ Settings</button>
</header>

<div id="settings">
  <h3>Gateway Settings</h3>
  <label>WebSocket URL</label>
  <input id="optWsUrl" placeholder="ws://127.0.0.1:18789" />
  <label>Auth Token</label>
  <input id="optToken" type="password" placeholder="gateway.auth.token" />
  <label>Thinking</label>
  <select id="optThinking">
    <option value="off">off</option>
    <option value="on">on</option>
    <option value="high" selected>high</option>
    <option value="stream">stream</option>
  </select>
  <div class="row-btn">
    <button id="btnSettingsClose">Cancel</button>
    <button id="btnSettingsSave" class="primary">Save &amp; reconnect</button>
  </div>
</div>

<main>
  <div id="transcript"></div>
</main>

<footer>
  <div id="tabs"></div>
  <form id="composer" onsubmit="event.preventDefault(); onSend();">
    <select id="modelPicker" aria-label="Model" title="$input / $output per million tokens">
      <option value="bankr/minimax-m2.7">MiniMax 2.7 · $0.30/$1.20</option>
      <option value="bankr/kimi-k2.6">Kimi K2.6 · $0.95/$4</option>
      <option value="bankr/claude-haiku-4.5">Haiku · $1/$5</option>
      <option value="bankr/deepseek-v4-pro">DeepSeek V4 Pro · $1.74/$3.48</option>
      <option value="bankr/claude-sonnet-4.6">Sonnet · $3/$15</option>
      <option value="bankr/claude-opus-4.6">Opus · $5/$25</option>
    </select>
    <textarea id="input" rows="1" placeholder="Message @clawdbotatg… (⌘↵ to send)" autofocus></textarea>
    <button id="btnSend" type="submit">Send</button>
  </form>
</footer>

<script>
// ══════════════════════════════════════════════════════════════════════════
// clawd-web — native openclaw gateway WebSocket client (multi-tab)
// ══════════════════════════════════════════════════════════════════════════

if (new URLSearchParams(location.search).has("debug")) window.__clawdDebug = true;
window.__eventLog = [];
(function installWsTap() {
  const _OrigWS = window.WebSocket;
  function TappedWS(...args) {
    const s = new _OrigWS(...args);
    s.addEventListener("message", (ev) => {
      try {
        const f = JSON.parse(ev.data);
        if (f?.type === "event" && (f.event === "agent" || f.event === "chat")) {
          window.__eventLog.push({ event: f.event, payload: f.payload, ts: Date.now() });
          if (window.__eventLog.length > 500) window.__eventLog.shift();
        }
      } catch {}
    });
    return s;
  }
  TappedWS.prototype = _OrigWS.prototype;
  TappedWS.CONNECTING = _OrigWS.CONNECTING;
  TappedWS.OPEN = _OrigWS.OPEN;
  TappedWS.CLOSING = _OrigWS.CLOSING;
  TappedWS.CLOSED = _OrigWS.CLOSED;
  window.WebSocket = TappedWS;
})();

const DEFAULT_MODEL = "bankr/minimax-m2.7";

const state = {
  ws: null,
  reqSeq: 0,
  pending: new Map(),
  config: null,         // { wsUrl, token } — sessionKey now lives per-tab
  connected: false,
  thinking: localStorage.getItem("clawd.thinking") || "high",
  identity: null,
  connectNonce: null,
  tabs: [],             // [{ id, sessionKey, displayName, selectedModel, lastSentModel, activeRunId, runs, runCompletions, paneEl, historyLoaded, verboseEnabled, dirty }]
  activeTabId: null,
};

// ── DOM ────────────────────────────────────────────────────────────────────
const $transcript = document.getElementById("transcript");
const $tabs = document.getElementById("tabs");
const $input = document.getElementById("input");
const $btnSend = document.getElementById("btnSend");
const $btnReset = document.getElementById("btnReset");
const $btnSettings = document.getElementById("btnSettings");
const $btnSettingsClose = document.getElementById("btnSettingsClose");
const $btnSettingsSave = document.getElementById("btnSettingsSave");
const $settings = document.getElementById("settings");
const $optWsUrl = document.getElementById("optWsUrl");
const $optToken = document.getElementById("optToken");
const $optThinking = document.getElementById("optThinking");
const $status = document.getElementById("status");
const $statusText = document.getElementById("statusText");

// ── Utilities ──────────────────────────────────────────────────────────────
function setStatus(s, text) {
  $status.className = "pill " + s;
  $statusText.textContent = text;
}

function autosize($el) {
  $el.style.height = "auto";
  $el.style.height = Math.min($el.scrollHeight, 200) + "px";
}

function uuid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return "id-" + Date.now() + "-" + Math.random().toString(36).slice(2);
}

function shortHex(n=8) {
  const buf = new Uint8Array(Math.ceil(n / 2));
  crypto.getRandomValues(buf);
  return Array.from(buf, b => b.toString(16).padStart(2, "0")).join("").slice(0, n);
}

function scrollToBottom(force = false) {
  const main = document.querySelector("main");
  const nearBottom = main.scrollHeight - main.scrollTop - main.clientHeight < 120;
  if (force || nearBottom) main.scrollTop = main.scrollHeight;
}

let _scrollSaveTimer = null;
function persistScroll() {
  const tab = currentTab();
  if (!tab) return;
  const main = document.querySelector("main");
  tab.scrollTop = main.scrollTop;
  clearTimeout(_scrollSaveTimer);
  _scrollSaveTimer = setTimeout(saveTabs, 300);
}
document.addEventListener("DOMContentLoaded", () => {
  document.querySelector("main").addEventListener("scroll", persistScroll, { passive: true });
});

function renderText(text) {
  if (!text) return "";
  const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  function renderInline(raw) {
    let s = esc(raw);
    const codeSlots = [];
    s = s.replace(/`([^`\n]+)`/g, (_, c) => { codeSlots.push(c); return `␀${codeSlots.length - 1}␀`; });
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
    s = s.replace(/(^|[\s(])((?:https?:\/\/)[^\s<)]+)/g, (_, pre, url) => `${pre}<a href="${url}" target="_blank" rel="noreferrer">${url}</a>`);
    s = s.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/__([^_\n]+)__/g, "<strong>$1</strong>");
    s = s.replace(/(^|[^*\w])\*([^*\n]+)\*(?!\w)/g, "$1<em>$2</em>");
    s = s.replace(/(^|[^_\w])_([^_\n]+)_(?!\w)/g, "$1<em>$2</em>");
    s = s.replace(/␀(\d+)␀/g, (_, i) => `<code>${codeSlots[+i]}</code>`);
    return s;
  }

  function renderBlock(block) {
    const lines = block.split("\n");
    const out = [];
    let listType = null;
    const closeList = () => { if (listType) { out.push(`</${listType}>`); listType = null; } };
    for (const line of lines) {
      if (!line.trim()) { closeList(); out.push("<br/>"); continue; }
      const h = /^(#{1,6})\s+(.*)$/.exec(line);
      if (h) { closeList(); out.push(`<h${h[1].length}>${renderInline(h[2])}</h${h[1].length}>`); continue; }
      const ul = /^\s*[-*+]\s+(.*)$/.exec(line);
      if (ul) { if (listType !== "ul") { closeList(); listType = "ul"; out.push("<ul>"); } out.push(`<li>${renderInline(ul[1])}</li>`); continue; }
      const ol = /^\s*\d+\.\s+(.*)$/.exec(line);
      if (ol) { if (listType !== "ol") { closeList(); listType = "ol"; out.push("<ol>"); } out.push(`<li>${renderInline(ol[1])}</li>`); continue; }
      const bq = /^>\s?(.*)$/.exec(line);
      if (bq) { closeList(); out.push(`<blockquote>${renderInline(bq[1])}</blockquote>`); continue; }
      closeList();
      out.push(`${renderInline(line)}<br/>`);
    }
    closeList();
    return out.join("");
  }

  const parts = [];
  let i = 0;
  const re = /```(\w*)\n([\s\S]*?)```/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > i) parts.push({ type: "text", value: text.slice(i, m.index) });
    parts.push({ type: "code", value: m[2] });
    i = m.index + m[0].length;
  }
  if (i < text.length) parts.push({ type: "text", value: text.slice(i) });
  return parts.map(p => {
    if (p.type === "code") return `<pre><code>${esc(p.value)}</code></pre>`;
    return renderBlock(p.value);
  }).join("");
}

function extractText(content) {
  if (!content) return "";
  if (typeof content === "string") return content;
  if (Array.isArray(content)) {
    return content.filter(b => b && (b.type === "text" || typeof b.text === "string"))
                  .map(b => b.text || "").join("");
  }
  if (typeof content === "object" && typeof content.text === "string") return content.text;
  return "";
}

// ── Tab model ──────────────────────────────────────────────────────────────
function makeTab({ id, sessionKey, displayName, selectedModel, lastSentModel, scrollTop }) {
  const pane = document.createElement("div");
  pane.className = "transcript-pane";
  return {
    id, sessionKey, displayName,
    selectedModel: selectedModel || DEFAULT_MODEL,
    lastSentModel: lastSentModel || null,
    activeRunId: null,
    runs: new Map(),
    runCompletions: new Map(),
    paneEl: pane,
    historyLoaded: false,
    verboseEnabled: false,
    dirty: false,
    scrollTop: typeof scrollTop === "number" ? scrollTop : 0,
    // Event buffering — while loading history, queue events to replay AFTER
    // so they render in the right order and don't get wiped by the pane clear.
    loadingHistory: false,
    bufferedEvents: [],
  };
}

function currentTab() {
  return state.tabs.find(t => t.id === state.activeTabId) || null;
}
function tabBySession(sk) {
  return state.tabs.find(t => t.sessionKey === sk) || null;
}
function saveTabs() {
  localStorage.setItem("clawd.tabs", JSON.stringify(state.tabs.map(t => ({
    id: t.id,
    sessionKey: t.sessionKey,
    displayName: t.displayName,
    selectedModel: t.selectedModel,
    lastSentModel: t.lastSentModel,
    scrollTop: t.scrollTop || 0,
  }))));
  if (state.activeTabId) localStorage.setItem("clawd.activeTab", state.activeTabId);
}
function loadTabsFromStorage() {
  try {
    const arr = JSON.parse(localStorage.getItem("clawd.tabs") || "[]");
    if (!Array.isArray(arr) || !arr.length) return null;
    return arr.filter(t => t && t.id && t.sessionKey).map(makeTab);
  } catch { return null; }
}
function nextTabName() {
  const used = new Set(state.tabs.map(t => t.displayName));
  for (let i = 1; i < 1000; i++) {
    const n = "tab " + i;
    if (!used.has(n)) return n;
  }
  return "tab " + Date.now();
}

async function createTab({ displayName, sessionKey, selectedModel, switchTo = true } = {}) {
  const id = "ui-" + shortHex(6);
  const tab = makeTab({
    id,
    sessionKey: sessionKey || ("agent:clawd:tab-" + shortHex(8)),
    displayName: displayName || nextTabName(),
    selectedModel: selectedModel || (currentTab()?.selectedModel || DEFAULT_MODEL),
  });
  state.tabs.push(tab);
  $transcript.appendChild(tab.paneEl);
  renderTabs();
  saveTabs();
  if (switchTo) await switchTab(tab.id);
  return tab;
}

async function switchTab(id) {
  const t = state.tabs.find(x => x.id === id);
  if (!t) return;
  state.activeTabId = id;
  state.tabs.forEach(x => x.paneEl.classList.toggle("active", x.id === id));
  t.dirty = false;
  const sel = document.getElementById("modelPicker");
  if (sel) {
    if ([...sel.options].some(o => o.value === t.selectedModel)) sel.value = t.selectedModel;
    else { sel.value = DEFAULT_MODEL; t.selectedModel = DEFAULT_MODEL; }
  }
  // Restore draft for this tab
  $input.value = loadDraft(t);
  autosize($input);
  setStatus(state.connected ? "ok" : "bad", t.sessionKey);
  updateSendButton();
  renderTabs();
  saveTabs();
  if (state.connected) {
    if (!t.verboseEnabled) {
      try {
        await rpc("sessions.patch", {
          key: t.sessionKey,
          verboseLevel: "on",
          reasoningLevel: "stream",  // emit live thinking_delta agent events
        });
        t.verboseEnabled = true;
      } catch (e) {
        console.warn("sessions.patch failed:", e.message);
      }
    }
    if (!t.historyLoaded) await loadHistory(t);
  }
  // Restore the per-tab scroll position
  const main = document.querySelector("main");
  requestAnimationFrame(() => {
    if (t.scrollTop && t.scrollTop > 0) main.scrollTop = t.scrollTop;
    else main.scrollTop = main.scrollHeight;
  });
}

async function closeTab(id) {
  const idx = state.tabs.findIndex(x => x.id === id);
  if (idx < 0) return;
  const t = state.tabs[idx];
  if (t.activeRunId && !confirm(`"${t.displayName}" has a run in progress — close anyway?`)) return;
  t.paneEl.remove();
  state.tabs.splice(idx, 1);
  if (state.activeTabId === id) {
    const next = state.tabs[Math.max(0, idx - 1)];
    if (next) await switchTab(next.id);
    else await createTab({ displayName: "tab 1", sessionKey: "agent:clawd:main" });
  } else {
    renderTabs();
    saveTabs();
  }
}

function renameTab(id) {
  const t = state.tabs.find(x => x.id === id);
  if (!t) return;
  const v = prompt("Rename tab:", t.displayName);
  if (!v || v.trim() === "" || v === t.displayName) return;
  t.displayName = v.trim().slice(0, 40);
  renderTabs();
  saveTabs();
}

function renderTabs() {
  $tabs.innerHTML = "";
  for (const t of state.tabs) {
    const el = document.createElement("div");
    el.className = "tab" + (t.id === state.activeTabId ? " active" : "") + (t.dirty ? " dirty" : "");
    el.dataset.tabId = t.id;
    el.title = t.sessionKey + " — double-click to rename";
    el.innerHTML = `<span class="label"></span><button class="close" title="Close tab">×</button>`;
    el.querySelector(".label").textContent = t.displayName;
    el.addEventListener("click", (e) => {
      if (e.target.classList.contains("close")) {
        e.stopPropagation();
        closeTab(t.id);
      } else {
        switchTab(t.id);
      }
    });
    el.addEventListener("dblclick", (e) => {
      if (e.target.classList.contains("close")) return;
      e.preventDefault();
      renameTab(t.id);
    });
    $tabs.appendChild(el);
  }
  const newBtn = document.createElement("button");
  newBtn.id = "newTab";
  newBtn.textContent = "+";
  newBtn.title = "New tab";
  newBtn.addEventListener("click", () => createTab());
  $tabs.appendChild(newBtn);
}

// ── Settings panel ─────────────────────────────────────────────────────────
function openSettings() {
  $optWsUrl.value = state.config?.wsUrl || "";
  $optToken.value = state.config?.token || "";
  $optThinking.value = state.thinking;
  $settings.classList.add("open");
}
function closeSettings() { $settings.classList.remove("open"); }

$btnSettings.onclick = openSettings;
$btnSettingsClose.onclick = closeSettings;
$btnSettingsSave.onclick = async () => {
  const cfg = { wsUrl: $optWsUrl.value.trim(), token: $optToken.value.trim() };
  localStorage.setItem("clawd.config", JSON.stringify(cfg));
  state.thinking = $optThinking.value;
  localStorage.setItem("clawd.thinking", state.thinking);
  state.config = cfg;
  closeSettings();
  if (state.ws) try { state.ws.close(); } catch {}
  connect();
};

// ── Rendering (per-tab) ────────────────────────────────────────────────────
function renderUserMessage(text, tab) {
  const el = document.createElement("div");
  el.className = "msg user";
  el.innerHTML = `<div class="role">You</div><div class="body"></div>`;
  el.querySelector(".body").innerHTML = renderText(text);
  tab.paneEl.appendChild(el);
  return el;
}

function renderAssistantContainer(tab) {
  const el = document.createElement("div");
  el.className = "msg assistant";
  el.innerHTML = `
    <div class="role"><a href="https://x.com/clawdbotatg" target="_blank" rel="noreferrer">@clawdbotatg</a></div>
    <div class="body"></div>
    <div class="tools"></div>
    <div class="text"></div>
    <div class="footer-status"></div>
  `;
  tab.paneEl.appendChild(el);
  return el;
}

function renderSystem(text, tab) {
  const el = document.createElement("div");
  el.className = "msg system";
  el.textContent = text;
  tab.paneEl.appendChild(el);
  return el;
}

function renderError(text, tab = null) {
  const t = tab || currentTab();
  const el = document.createElement("div");
  el.className = "msg error";
  el.innerHTML = `<div class="role">Error</div><div class="body"></div>`;
  el.querySelector(".body").textContent = text;
  if (t) t.paneEl.appendChild(el);
  else { console.error(text); alert(text); }
  return el;
}

function renderThinkingCard(parent, label, text, startOpen=false) {
  const card = document.createElement("div");
  card.className = "thinking-card" + (startOpen ? " open" : "");
  card.innerHTML = `
    <div class="hdr">
      <span class="icon">💭</span>
      <span class="label"></span>
      <span class="preview"></span>
      <span class="chev">›</span>
    </div>
    <div class="body-wrap"><div class="body"></div></div>
  `;
  card.querySelector(".label").textContent = label || "thinking";
  if (text) updateThinkingCard(card, text);
  card.querySelector(".hdr").onclick = () => card.classList.toggle("open");
  parent.appendChild(card);
  return card;
}
function updateThinkingCard(card, text) {
  if (!card || typeof text !== "string") return;
  card.querySelector(".body").textContent = text;
  // Preview shows the most recent non-empty line so streaming gives a live
  // "what's it thinking right now" feel even while the card stays collapsed.
  const lines = text.split("\n");
  let last = "";
  for (let i = lines.length - 1; i >= 0; i--) {
    const s = lines[i].trim();
    if (s) { last = s; break; }
  }
  card.querySelector(".preview").textContent = last.slice(0, 200);
}

function renderToolCard(parent, toolName, input, startOpen=false) {
  const card = document.createElement("div");
  card.className = "tool-card" + (startOpen ? " open" : "");
  card.innerHTML = `
    <div class="hdr">
      <span class="icon">🔧</span>
      <span class="name"></span>
      <span class="status running">running</span>
      <span class="chev">›</span>
    </div>
    <div class="body-wrap">
      <div class="section input-section"><div class="label">input</div><pre></pre></div>
      <div class="section output-section" style="display:none"><div class="label">output</div><pre></pre></div>
    </div>
  `;
  card.querySelector(".name").textContent = toolName || "tool";
  card.querySelector(".input-section pre").textContent = formatToolData(input);
  card.querySelector(".hdr").onclick = () => card.classList.toggle("open");
  parent.appendChild(card);
  return card;
}

function formatToolData(v) {
  if (v === undefined || v === null) return "";
  if (typeof v === "string") return v;
  try { return JSON.stringify(v, null, 2); } catch { return String(v); }
}

function updateToolResult(card, output, isError=false) {
  const statusEl = card.querySelector(".status");
  statusEl.className = "status " + (isError ? "error" : "done");
  statusEl.textContent = isError ? "error" : "done";
  const outSec = card.querySelector(".output-section");
  outSec.style.display = "block";
  outSec.querySelector("pre").textContent = formatToolData(output);
}

function ensureTurn(runId, tab) {
  let t = tab.runs.get(runId);
  if (t) return t;
  const container = renderAssistantContainer(tab);
  t = {
    runId, container,
    textEl: container.querySelector(".text"),
    toolsEl: container.querySelector(".tools"),
    footerEl: container.querySelector(".footer-status"),
    thinkingEl: null,
    toolCards: new Map(),
    lastText: "",
    lastThinking: "",
    startedAt: Date.now(),
    state: "working",
    tickerId: null,
  };
  tab.runs.set(runId, t);
  // Working indicator + 1s elapsed ticker
  t.footerEl.innerHTML = `<div class="working"><span class="blink"></span><span class="label">working</span><span class="elapsed"></span></div>`;
  const labelEl = t.footerEl.querySelector(".label");
  const elapsedEl = t.footerEl.querySelector(".elapsed");
  const tick = () => {
    if (!tab.runs.has(runId)) { clearInterval(t.tickerId); return; }
    const secs = Math.floor((Date.now() - t.startedAt) / 1000);
    elapsedEl.textContent = ` · ${secs}s`;
  };
  tick();
  t.tickerId = setInterval(tick, 1000);
  // Promote "working" → "responding" once we've actually seen content
  t.markResponding = () => {
    if (t.state === "working") {
      t.state = "responding";
      labelEl.textContent = "responding";
    }
  };
  if (tab === currentTab()) scrollToBottom(true);
  return t;
}

function markDirtyIfBackground(tab) {
  if (tab !== currentTab() && !tab.dirty) {
    tab.dirty = true;
    renderTabs();
  }
}

// Reconcile a turn's UI with the canonical assistant message from server
// history. Used after chat:final to pull in thinking/tool data that the
// delta stream didn't carry (common for non-Anthropic models via OpenAI-
// compat APIs — they only stream text, openclaw extracts thinking later).
async function syncTurnFromHistory(tab, turn) {
  if (!turn || !turn.container || !turn.container.isConnected) return;
  try {
    const res = await rpc("chat.history", { sessionKey: tab.sessionKey, limit: 4 });
    const msgs = res.messages || res.items || [];
    // Find the most recent assistant message (corresponds to this just-final run)
    for (let i = msgs.length - 1; i >= 0; i--) {
      const m = msgs[i];
      if (m.role !== "assistant" || !Array.isArray(m.content)) continue;
      for (const b of m.content) {
        if (b?.type === "thinking" && typeof b.thinking === "string") {
          if (!turn.thinkingEl) {
            turn.thinkingEl = renderThinkingCard(turn.container, "thinking", b.thinking, false);
            turn.container.insertBefore(turn.thinkingEl, turn.toolsEl);
          } else {
            updateThinkingCard(turn.thinkingEl, b.thinking);
          }
        }
        // (tool_use blocks should already be rendered from agent events)
      }
      // If the streaming text was empty/partial, take the canonical text too
      const finalText = extractText(m.content);
      if (finalText && (!turn.lastText || turn.lastText.length < finalText.length)) {
        turn.lastText = finalText;
        turn.textEl.innerHTML = renderText(finalText);
      }
      break;
    }
  } catch (e) {
    if (window.__clawdDebug) console.warn("syncTurnFromHistory:", e);
  }
}

// ── Event handlers ─────────────────────────────────────────────────────────
function handleChatEvent(payload) {
  const { runId, sessionKey, state: chatState, message, errorMessage } = payload;
  if (window.__clawdDebug) console.debug("[chat]", chatState, sessionKey, message?.content);
  const tab = sessionKey ? tabBySession(sessionKey) : null;
  if (!tab) return;
  if (tab.loadingHistory) {
    // Queue this event; we'll replay it once history finishes rendering so the
    // DOM order stays correct (history first, then in-flight content below).
    tab.bufferedEvents.push({ kind: "chat", payload });
    return;
  }

  const t = ensureTurn(runId, tab);

  if (chatState === "delta" || chatState === "final") {
    if (message) {
      const text = extractText(message.content);
      if (text) { t.lastText = text; t.textEl.innerHTML = renderText(text); }
      if (Array.isArray(message.content)) {
        for (const b of message.content) {
          if (b && (b.type === "tool_use" || b.type === "toolCall") && b.id) {
            if (!t.toolCards.has(b.id)) {
              const card = renderToolCard(t.toolsEl, b.name, b.input || b.arguments);
              t.toolCards.set(b.id, card);
            }
          }
          if (b && b.type === "thinking" && typeof b.thinking === "string") {
            if (!t.thinkingEl) {
              t.thinkingEl = renderThinkingCard(t.container, "thinking", b.thinking);
              t.container.insertBefore(t.thinkingEl, t.toolsEl);
            } else {
              updateThinkingCard(t.thinkingEl, b.thinking);
            }
          }
        }
      }
    }
    markDirtyIfBackground(tab);
  }

  if (chatState === "delta") {
    t.markResponding && t.markResponding();
  }
  if (chatState === "final") {
    if (t.tickerId) clearInterval(t.tickerId);
    t.footerEl.innerHTML = "";
    tab.activeRunId = null;
    removePendingByRunId(tab, runId);
    resolveTabRunCompletion(tab, runId, null);
    // Sync thinking + tool blocks from server-side history. For non-Anthropic
    // models, deltas don't carry thinking content — it only appears in the
    // persisted message after the run completes.
    syncTurnFromHistory(tab, t).catch(() => {});
  } else if (chatState === "aborted") {
    if (t.tickerId) clearInterval(t.tickerId);
    t.footerEl.innerHTML = `<div style="color:var(--warn); font-size:12px">⏹ aborted</div>`;
    tab.activeRunId = null;
    removePendingByRunId(tab, runId);
    resolveTabRunCompletion(tab, runId, "aborted");
  } else if (chatState === "error") {
    if (t.tickerId) clearInterval(t.tickerId);
    t.footerEl.innerHTML = `<div style="color:var(--bad); font-size:12px">⚠ ${errorMessage || "error"}</div>`;
    tab.activeRunId = null;
    removePendingByRunId(tab, runId);
    resolveTabRunCompletion(tab, runId, errorMessage || "error");
  }

  if (tab === currentTab()) {
    updateSendButton();
    if (chatState === "delta" || chatState === "final") scrollToBottom();
  }
}

function handleAgentEvent(payload) {
  const { runId, sessionKey, stream, data } = payload;
  if (window.__clawdDebug) console.debug("[agent]", stream, sessionKey, data);
  let tab = sessionKey ? tabBySession(sessionKey) : null;
  if (!tab) tab = state.tabs.find(x => x.runs.has(runId)) || null;
  if (!tab) return;
  if (tab.loadingHistory) {
    tab.bufferedEvents.push({ kind: "agent", payload });
    return;
  }
  const t = ensureTurn(runId, tab);

  if (stream === "tool") {
    const callId = data?.toolCallId || data?.id || ("call-" + Date.now());
    const phase = data?.phase;
    if (phase === "start") {
      if (!t.toolCards.has(callId)) {
        const baseName = data?.name || data?.toolName || "tool";
        const argPreview = data?.args?.command || data?.args?.path || data?.args?.url;
        const title = argPreview ? `${baseName}: ${String(argPreview).slice(0, 60)}` : baseName;
        const card = renderToolCard(t.toolsEl, title, data?.args || data?.input);
        t.toolCards.set(callId, card);
      }
    } else if (phase === "result" || phase === "end") {
      const card = t.toolCards.get(callId);
      const out = data?.output ?? data?.result ?? data?.text ?? data?.content ?? data?.meta ?? "(completed)";
      const isError = !!data?.isError || !!data?.error;
      if (card) updateToolResult(card, out, isError);
      else {
        const orphan = renderToolCard(t.toolsEl, data?.name || "(result)", out, true);
        updateToolResult(orphan, out, isError);
      }
    }
  } else if (stream === "thinking" || stream === "reasoning") {
    const text = data?.text || data?.content;
    if (text) {
      if (!t.thinkingEl) {
        t.thinkingEl = renderThinkingCard(t.container, stream, text);
        t.container.insertBefore(t.thinkingEl, t.toolsEl);
      } else {
        updateThinkingCard(t.thinkingEl, text);
      }
    }
  }

  if (t.markResponding) t.markResponding();
  markDirtyIfBackground(tab);
  if (tab === currentTab()) scrollToBottom();
}

// ── WebSocket connection + RPC ─────────────────────────────────────────────
function connect() {
  if (!state.config?.wsUrl) {
    setStatus("bad", "no gateway URL");
    return;
  }
  setStatus("connecting", "connecting…");
  state.connectNonce = null;

  let ws;
  try { ws = new WebSocket(state.config.wsUrl); }
  catch (e) {
    setStatus("bad", "bad url");
    renderError("Failed to open WebSocket: " + e.message);
    return;
  }
  state.ws = ws;

  ws.onopen = async () => {
    try {
      const ident = await getOrCreateIdentity();
      const scopes = ["operator.read", "operator.write", "operator.admin"];
      const clientId = "openclaw-control-ui";
      const clientMode = "ui";
      const role = "operator";
      const device = await signDevicePayload(ident, {
        clientId, clientMode, role, scopes, token: state.config.token || null, nonce: state.connectNonce || null,
      });
      await rpc("connect", {
        minProtocol: 3,
        maxProtocol: 3,
        client: { id: clientId, displayName: "clawd-web", version: "0.1.0", platform: "web", mode: clientMode },
        role, scopes,
        caps: ["tool-events"],
        auth: state.config.token ? { token: state.config.token } : undefined,
        locale: navigator.language || "en-US",
        userAgent: navigator.userAgent,
        device,
      });
      onConnected();
    } catch (err) {
      setStatus("bad", "auth failed");
      renderError("Handshake failed: " + (err.message || err));
    }
  };

  ws.onmessage = (ev) => {
    let frame;
    try { frame = JSON.parse(ev.data); } catch { console.warn("bad frame", ev.data); return; }
    onFrame(frame);
  };

  ws.onclose = (ev) => {
    setStatus("bad", `disconnected (${ev.code})`);
    state.connected = false;
    for (const t of state.tabs) t.activeRunId = null;
    updateSendButton();
    if (ev.code === 1008) {
      renderError(
        "Gateway rejected the connection (1008). Likely causes:\n" +
        "  • Our origin isn't in gateway.controlUi.allowedOrigins\n" +
        "  • Device pairing is required (see `openclaw devices list`)\n" +
        "  • Auth token is wrong\n\n" +
        "See the clawd-web README for the fix."
      );
      return;
    }
    if (ev.code !== 1000) {
      setTimeout(() => { if (!state.connected) connect(); }, 2000);
    }
  };

  ws.onerror = () => {};
}

// ── Ed25519 device identity ────────────────────────────────────────────────
async function getOrCreateIdentity() {
  if (state.identity) return state.identity;
  const stored = localStorage.getItem("clawd.identity");
  if (stored) {
    try {
      const obj = JSON.parse(stored);
      const privateKey = await crypto.subtle.importKey("jwk", obj.privJwk, { name: "Ed25519" }, true, ["sign"]);
      state.identity = { privateKey, deviceId: obj.deviceId, publicKey: obj.publicKey };
      return state.identity;
    } catch (e) { console.warn("stored identity unusable, regenerating:", e); }
  }
  let kp;
  try { kp = await crypto.subtle.generateKey({ name: "Ed25519" }, true, ["sign", "verify"]); }
  catch (e) { throw new Error("Ed25519 not supported in this browser — needs Chrome 112+ / Safari 17+ / Firefox 129+"); }
  const rawPub = new Uint8Array(await crypto.subtle.exportKey("raw", kp.publicKey));
  const deviceIdBytes = new Uint8Array(await crypto.subtle.digest("SHA-256", rawPub));
  const deviceId = bytesToHex(deviceIdBytes);
  const publicKey = bytesToB64Url(rawPub);
  const privJwk = await crypto.subtle.exportKey("jwk", kp.privateKey);
  localStorage.setItem("clawd.identity", JSON.stringify({ deviceId, publicKey, privJwk }));
  state.identity = { privateKey: kp.privateKey, deviceId, publicKey };
  return state.identity;
}

async function signDevicePayload(identity, { clientId, clientMode, role, scopes, token, nonce }) {
  const signedAtMs = Date.now();
  const version = nonce ? "v2" : "v1";
  const parts = [version, identity.deviceId, clientId, clientMode, role, scopes.join(","), String(signedAtMs), token || ""];
  if (version === "v2") parts.push(nonce || "");
  const payload = parts.join("|");
  const sigBuf = await crypto.subtle.sign({ name: "Ed25519" }, identity.privateKey, new TextEncoder().encode(payload));
  const out = { id: identity.deviceId, publicKey: identity.publicKey, signature: bytesToB64Url(new Uint8Array(sigBuf)), signedAt: signedAtMs };
  if (nonce) out.nonce = nonce;
  return out;
}

function bytesToHex(u8) { return Array.from(u8, b => b.toString(16).padStart(2, "0")).join(""); }
function bytesToB64Url(u8) {
  let s = "";
  for (let i = 0; i < u8.length; i++) s += String.fromCharCode(u8[i]);
  return btoa(s).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function onFrame(frame) {
  if (frame.type === "res") {
    const p = state.pending.get(frame.id);
    if (p) {
      state.pending.delete(frame.id);
      if (frame.ok) p.resolve(frame.payload);
      else p.reject(new Error(frame.error?.message || "rpc error"));
    }
    return;
  }
  if (frame.type === "event") {
    switch (frame.event) {
      case "chat":  return handleChatEvent(frame.payload);
      case "agent": return handleAgentEvent(frame.payload);
      case "connect.challenge":
        if (frame.payload?.nonce) state.connectNonce = frame.payload.nonce;
        return;
      case "tick": case "presence": case "health": return;
      default:
        if (window.__clawdDebug) console.debug("[unhandled event]", frame.event, frame.payload);
        return;
    }
  }
}

function rpc(method, params) {
  return new Promise((resolve, reject) => {
    if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return reject(new Error("not connected"));
    const id = "r" + (++state.reqSeq);
    state.pending.set(id, { resolve, reject });
    state.ws.send(JSON.stringify({ type: "req", id, method, params }));
    setTimeout(() => {
      if (state.pending.has(id)) { state.pending.delete(id); reject(new Error(method + " timed out")); }
    }, 60000);
  });
}

async function onConnected() {
  state.connected = true;
  updateSendButton();
  const tab = currentTab();
  if (!tab) { setStatus("bad", "(no tab)"); return; }
  setStatus("ok", tab.sessionKey);
  try {
    await rpc("sessions.patch", {
      key: tab.sessionKey,
      verboseLevel: "on",
      reasoningLevel: "stream",  // emit live thinking_delta agent events
    });
    tab.verboseEnabled = true;
  } catch (e) { console.warn("sessions.patch failed:", e.message); }
  await loadHistory(tab);
}

// ── Pending-message persistence ────────────────────────────────────────────
// User-typed messages are kept in sessionStorage so a reload mid-flight doesn't
// lose the prompt. Each entry is tagged with the runId after chat.send returns
// so we can pop it deterministically on chat:final, instead of fuzzy-matching
// against history (which adds timestamp prefixes that break equality checks).
const PENDING_KEY = "clawd.pending";
const PENDING_TTL_MS = 5 * 60 * 1000;  // 5 minutes — drop anything older

function _readAllPending() {
  try { return JSON.parse(sessionStorage.getItem(PENDING_KEY) || "{}"); } catch { return {}; }
}
function _writeAllPending(obj) {
  try { sessionStorage.setItem(PENDING_KEY, JSON.stringify(obj)); } catch {}
}
function getPendingForTab(tab) { return _readAllPending()[tab.sessionKey] || []; }
function setPendingForTab(tab, list) {
  const all = _readAllPending();
  if (list.length === 0) delete all[tab.sessionKey]; else all[tab.sessionKey] = list;
  _writeAllPending(all);
}
function pushPending(tab, text) {
  const list = getPendingForTab(tab);
  const id = "p-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
  list.push({ id, text, ts: Date.now(), runId: null });
  setPendingForTab(tab, list);
  return id;
}
function setPendingRunId(tab, pendingId, runId) {
  const list = getPendingForTab(tab);
  const p = list.find(x => x.id === pendingId);
  if (p) { p.runId = runId; setPendingForTab(tab, list); }
}
function removePendingById(tab, pendingId) {
  const list = getPendingForTab(tab);
  const remaining = list.filter(p => p.id !== pendingId);
  if (remaining.length !== list.length) setPendingForTab(tab, remaining);
}
function removePendingByRunId(tab, runId) {
  if (!runId) return;
  const list = getPendingForTab(tab);
  const remaining = list.filter(p => p.runId !== runId);
  if (remaining.length !== list.length) setPendingForTab(tab, remaining);
}
function purgeOldPending(tab) {
  const now = Date.now();
  const list = getPendingForTab(tab);
  const fresh = list.filter(p => now - (p.ts || 0) < PENDING_TTL_MS);
  if (fresh.length !== list.length) setPendingForTab(tab, fresh);
}
function clearPendingForTab(tab) { setPendingForTab(tab, []); }
// Openclaw bundles user messages with optional system-injection lines
// (e.g. "System: [...] Model switched to X") AND timestamp prefixes
// (e.g. "[Sat 2026-04-25 11:57 MDT] gm"). This extracts ONLY what the user
// actually typed, by taking everything after the LAST timestamp bracket.
// Examples:
//   "[Sat 2026-04-25 11:57 MDT] gm"                                  → "gm"
//   "System: [2026-04-25 11:57:43 MDT] Model switched to X.\n\n\n[Sat 2026-04-25 11:57 MDT] gm"
//                                                                    → "gm"
//   "gm" (no prefix)                                                 → "gm"
function extractUserTypedText(rawText) {
  if (!rawText) return "";
  const text = String(rawText);
  // Match brackets like "[Sat 2026-04-25 11:57 MDT]" or "[2026-04-25 11:57:43 MDT]"
  const re = /\[(?:[A-Za-z]{3,9} )?\d{4}-\d{2}-\d{2} \d{2}:\d{2}(?::\d{2})?(?: [A-Z]{2,5})?\]/g;
  let lastMatch = null, m;
  while ((m = re.exec(text)) !== null) lastMatch = m;
  if (lastMatch) {
    return text.slice(lastMatch.index + lastMatch[0].length).trim();
  }
  // No timestamp wrapper — try stripping "System: [...] ..." prefix line
  const sysStripped = text.replace(/^System:\s*\[[^\]]+\][^\n]*\n+/, "").trim();
  return sysStripped || text.trim();
}

function _normalizeUserText(t) {
  return extractUserTypedText(t).toLowerCase();
}


// ── History load ───────────────────────────────────────────────────────────
async function loadHistory(tab) {
  // Mark loading so concurrent chat/agent events get buffered (avoid race
  // where mid-flight events render an assistant container before history,
  // leaving DOM in wrong order or orphan run entries after pane clear).
  tab.loadingHistory = true;
  tab.bufferedEvents = [];
  tab.paneEl.innerHTML = "";
  tab.runs.clear();  // any stale turn entries from a prior connection
  try {
    const res = await rpc("chat.history", { sessionKey: tab.sessionKey, limit: 100 });
    const msgs = res.messages || res.items || [];
    if (msgs.length === 0) {
      const el = document.createElement("div");
      el.className = "empty";
      el.innerHTML = `<h2>${tab.displayName}</h2><p>session: <code>${tab.sessionKey}</code><br/>no history yet — say something below.</p>`;
      tab.paneEl.appendChild(el);
      tab.historyLoaded = true;
      return;
    }

    // Pair tool_use blocks with their tool_result outputs so the rendered
    // history shows the same nice card view as live streaming. Handles BOTH
    // the Anthropic shape (tool_use_id on block) and the openclaw shape
    // (role="toolResult" with toolCallId at message level).
    const toolResults = new Map();
    for (const m of msgs) {
      const c = m.content;
      if (Array.isArray(c)) {
        for (const b of c) {
          if (b?.type === "tool_result" && b.tool_use_id) toolResults.set(b.tool_use_id, b);
        }
      }
      if (m.role === "tool" && m.tool_use_id) toolResults.set(m.tool_use_id, m);
      // openclaw style:
      if (m.role === "toolResult" && m.toolCallId) toolResults.set(m.toolCallId, m);
    }

    for (const m of msgs) {
      const role = m.role || "system";
      const content = m.content;

      if (role === "user") {
        // Skip user messages that are *only* tool_result blocks — they're paired
        // into the preceding assistant card already.
        if (Array.isArray(content) && content.length > 0 && content.every(b => b?.type === "tool_result")) continue;
        // Strip openclaw's "System: ..." injection + timestamp wrappers so
        // history renders the same as the live view did.
        const rawText = extractText(content);
        const typed = extractUserTypedText(rawText) || rawText || "(empty)";
        renderUserMessage(typed, tab);
      } else if (role === "assistant") {
        const container = renderAssistantContainer(tab);
        const textEl = container.querySelector(".text");
        const toolsEl = container.querySelector(".tools");
        if (Array.isArray(content)) {
          for (const b of content) {
            if (b?.type === "thinking" && typeof b.thinking === "string") {
              const tEl = renderThinkingCard(container, "thinking", b.thinking, false);
              container.insertBefore(tEl, toolsEl);
            } else if (b?.type === "tool_use" || b?.type === "toolCall") {
              const baseName = b.name || "tool";
              const argSrc = b.input || b.arguments || {};
              const argPreview = argSrc.command || argSrc.path || argSrc.url;
              const title = argPreview ? `${baseName}: ${String(argPreview).slice(0, 60)}` : baseName;
              const card = renderToolCard(toolsEl, title, argSrc);
              const result = toolResults.get(b.id);
              if (result) {
                const out = extractToolResultText(result);
                const isError = !!(result.is_error || result.isError);
                updateToolResult(card, out, isError);
              } else {
                const statusEl = card.querySelector(".status");
                statusEl.className = "status done";
                statusEl.textContent = "done";
              }
            }
          }
        }
        const text = extractText(content);
        if (text) textEl.innerHTML = renderText(text);
      } else if (role === "tool" || role === "toolResult") {
        // Tool results are paired into the assistant card above; don't render again.
        continue;
      } else {
        const text = extractText(content);
        if (text) renderSystem(text, tab);
      }
    }

    // Drop any pending messages that already showed up in history; render the rest.
    purgeOldPending(tab);  // TTL cleanup for orphaned entries
    const historyUserTextsNorm = new Set(
      msgs.filter(m => m.role === "user").map(m => _normalizeUserText(extractText(m.content)))
    );
    const pending = getPendingForTab(tab);
    const stillPending = [];
    for (const p of pending) {
      const inHistory = historyUserTextsNorm.has(_normalizeUserText(p.text));
      // Render the user message only if history doesn't already have it.
      if (!inHistory) renderUserMessage(p.text, tab);

      // CRITICAL: pending entry exists ⇒ chat:final hasn't popped it ⇒ the
      // response is STILL in flight server-side. Always pre-create the
      // response container so the user sees a "working" indicator instead of
      // a gap, regardless of whether the user msg was persisted to history.
      if (p.runId) {
        ensureTurn(p.runId, tab);
        tab.activeRunId = p.runId;
        stillPending.push(p);  // keep until chat:final fires
      } else if (!inHistory) {
        stillPending.push(p);  // no runId yet, keep so we don't drop it
      }
      // If runId is null AND text is in history: orphan — drop it.
    }
    setPendingForTab(tab, stillPending);
    if (tab === currentTab()) updateSendButton();

    if (tab === currentTab()) {
      // Restore saved scroll position; if none, go to bottom (newest msg).
      const main = document.querySelector("main");
      requestAnimationFrame(() => {
        if (tab.scrollTop && tab.scrollTop > 0) main.scrollTop = tab.scrollTop;
        else main.scrollTop = main.scrollHeight;
      });
    }
    tab.historyLoaded = true;
  } catch (e) {
    renderError("Could not load history: " + e.message, tab);
  } finally {
    // Drain buffered events now that history is fully rendered.
    tab.loadingHistory = false;
    const buf = tab.bufferedEvents;
    tab.bufferedEvents = [];
    for (const ev of buf) {
      if (ev.kind === "chat") handleChatEvent(ev.payload);
      else if (ev.kind === "agent") handleAgentEvent(ev.payload);
    }
  }
}

function extractToolResultText(block) {
  if (!block) return "";
  const c = block.content;
  if (typeof c === "string") return c;
  if (Array.isArray(c)) {
    return c.map(b => {
      if (typeof b === "string") return b;
      if (b?.type === "text") return b.text || "";
      if (b?.type === "image") return "(image)";
      return JSON.stringify(b);
    }).join("\n");
  }
  if (typeof block.text === "string") return block.text;
  return "";
}

// ── Sending ────────────────────────────────────────────────────────────────
function updateSendButton() {
  const tab = currentTab();
  if (tab && tab.activeRunId) {
    $btnSend.textContent = "Stop";
    $btnSend.classList.add("stop");
    $btnSend.disabled = false;
  } else {
    $btnSend.textContent = "Send";
    $btnSend.classList.remove("stop");
    $btnSend.disabled = !state.connected;
  }
}

function resolveTabRunCompletion(tab, runId, reason) {
  const r = tab.runCompletions.get(runId);
  if (!r) return;
  tab.runCompletions.delete(runId);
  if (reason) r.reject(new Error(reason));
  else r.resolve();
}

async function ensureModelSelected(tab) {
  if (tab.selectedModel === tab.lastSentModel) return;
  const model = tab.selectedModel;
  const res = await rpc("chat.send", {
    sessionKey: tab.sessionKey,
    message: `/model ${model}`,
    deliver: false,
    idempotencyKey: uuid(),
  });
  if (!res?.runId) throw new Error("model-switch send returned no runId");
  tab.activeRunId = res.runId;
  if (tab === currentTab()) updateSendButton();
  await new Promise((resolve, reject) => {
    tab.runCompletions.set(res.runId, { resolve, reject });
  });
  tab.lastSentModel = model;
}

async function onSend() {
  const tab = currentTab();
  if (!tab) return;
  if (tab.activeRunId) return onStop();
  const text = $input.value.trim();
  if (!text) return;
  if (!state.connected) { renderError("Not connected", tab); return; }

  const empty = tab.paneEl.querySelector(".empty");
  if (empty) empty.remove();

  renderUserMessage(text, tab);
  const pendingId = pushPending(tab, text);
  $input.value = "";
  saveDraft(tab, "");
  autosize($input);

  try {
    await ensureModelSelected(tab);
    const res = await rpc("chat.send", {
      sessionKey: tab.sessionKey,
      message: text,
      thinking: state.thinking,
      deliver: false,
      idempotencyKey: uuid(),
    });
    if (res?.runId) {
      tab.activeRunId = res.runId;
      setPendingRunId(tab, pendingId, res.runId);
      updateSendButton();
    }
  } catch (e) {
    removePendingById(tab, pendingId);
    renderError("chat.send failed: " + e.message, tab);
    tab.activeRunId = null;
    updateSendButton();
  }
}

async function onStop() {
  const tab = currentTab();
  if (!tab || !tab.activeRunId) return;
  try {
    await rpc("chat.abort", { sessionKey: tab.sessionKey, runId: tab.activeRunId });
  } catch (e) {
    renderError("chat.abort failed: " + e.message, tab);
  }
}

$btnReset.onclick = async () => {
  const tab = currentTab();
  if (!tab) return;
  if (!confirm(`Reset "${tab.displayName}" session? The transcript on the server will be cleared.`)) return;
  try {
    await rpc("sessions.reset", { key: tab.sessionKey, reason: "reset" });
    tab.runs.clear();
    tab.activeRunId = null;
    tab.historyLoaded = false;
    tab.lastSentModel = null;
    clearPendingForTab(tab);
    updateSendButton();
    await loadHistory(tab);
  } catch (e) {
    renderError("sessions.reset failed: " + e.message, tab);
  }
};

// ── Input handling ─────────────────────────────────────────────────────────
const INPUT_DRAFT_KEY = "clawd.draft";
function _readDrafts() { try { return JSON.parse(localStorage.getItem(INPUT_DRAFT_KEY) || "{}"); } catch { return {}; } }
function _writeDrafts(o) { try { localStorage.setItem(INPUT_DRAFT_KEY, JSON.stringify(o)); } catch {} }
function saveDraft(tab, text) {
  if (!tab) return;
  const all = _readDrafts();
  if (text && text.length) all[tab.sessionKey] = text;
  else delete all[tab.sessionKey];
  _writeDrafts(all);
}
function loadDraft(tab) {
  if (!tab) return "";
  return _readDrafts()[tab.sessionKey] || "";
}

let _draftSaveTimer = null;
$input.addEventListener("input", () => {
  autosize($input);
  clearTimeout(_draftSaveTimer);
  _draftSaveTimer = setTimeout(() => saveDraft(currentTab(), $input.value), 200);
});
$input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && ((e.metaKey || e.ctrlKey) || !e.shiftKey)) {
    e.preventDefault();
    onSend();
  }
});

// ── Model picker ───────────────────────────────────────────────────────────
function initModelPicker() {
  const sel = document.getElementById("modelPicker");
  const tab = currentTab();
  if (tab) {
    if ([...sel.options].some(o => o.value === tab.selectedModel)) sel.value = tab.selectedModel;
    else { sel.value = DEFAULT_MODEL; tab.selectedModel = DEFAULT_MODEL; }
  }
  sel.addEventListener("change", () => {
    const t = currentTab();
    if (!t) return;
    t.selectedModel = sel.value;
    saveTabs();
  });
}

// ── Boot ───────────────────────────────────────────────────────────────────
async function boot() {
  // Settings/auth config
  const stored = localStorage.getItem("clawd.config");
  if (stored) {
    try {
      const cfg = JSON.parse(stored);
      // Drop legacy sessionKey field — sessions live on tabs now
      delete cfg.sessionKey;
      state.config = cfg;
    } catch {}
  }
  if (!state.config?.wsUrl || !state.config?.token) {
    try {
      const resp = await fetch("/config");
      const cfg = await resp.json();
      state.config = state.config || {};
      if (!state.config.wsUrl) state.config.wsUrl = cfg.wsUrl;
      if (!state.config.token) state.config.token = cfg.token;
    } catch (e) { console.warn("no /config endpoint", e); }
  }
  if (!state.config?.wsUrl) state.config = { ...(state.config || {}), wsUrl: "ws://127.0.0.1:18789" };
  if (!state.config.token) {
    setStatus("bad", "no token — open settings");
    openSettings();
    return;
  }

  // Initialize tabs (restore from storage or seed default)
  const restored = loadTabsFromStorage();
  if (restored && restored.length) {
    state.tabs = restored;
    for (const t of state.tabs) $transcript.appendChild(t.paneEl);
    const savedActive = localStorage.getItem("clawd.activeTab");
    state.activeTabId = (savedActive && state.tabs.find(t => t.id === savedActive)) ? savedActive : state.tabs[0].id;
  } else {
    const tab = makeTab({
      id: "ui-" + shortHex(6),
      sessionKey: "agent:clawd:main",
      displayName: "main",
      selectedModel: localStorage.getItem("clawd.model") || DEFAULT_MODEL,
    });
    state.tabs.push(tab);
    $transcript.appendChild(tab.paneEl);
    state.activeTabId = tab.id;
    saveTabs();
  }
  state.tabs.forEach(t => t.paneEl.classList.toggle("active", t.id === state.activeTabId));
  renderTabs();
  initModelPicker();
  // Restore composer draft for the active tab
  const _activeTab = currentTab();
  if (_activeTab) {
    $input.value = loadDraft(_activeTab);
    autosize($input);
  }
  connect();
}

window.__clawdState = state;
boot();
</script>
</body>
</html>
