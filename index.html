// ── Rendering (per-tab) ────────────────────────────────────────────────────
function renderUserMessage(text, tab, ageMs = 0) {
  const el = document.createElement("div");
  el.className = "msg user";
  el.innerHTML = `<div class="role">You</div><div class="body"></div>`;
  el.querySelector(".body").innerHTML = renderText(text);
  tab.paneEl.appendChild(el);
  applyVisibility(tab.paneEl);
  return el;
}

function renderAssistantContainer(tab) {
  const el = document.createElement("div");
  el.className = "msg assistant";
  el.innerHTML = `
    <div class="body"></div>
    <div class="tools"></div>
    <div class="text"></div>
    <div class="footer-status"></div>
  `;
  tab.paneEl.appendChild(el);
  return el;
}

const KEEP_VISIBLE_COUNT = 2;
const REVEAL_HISTORY_MS = 30_000;

function applyVisibility(pane) {
  if (!pane) return;
  const msgs = Array.from(pane.querySelectorAll(":scope > .msg"));
  const hideUpTo = Math.max(0, msgs.length - KEEP_VISIBLE_COUNT);
  msgs.forEach((el, i) => el.classList.toggle("faded", i < hideUpTo));

  let counter = pane.querySelector(":scope > .hidden-counter");
  if (hideUpTo > 0) {
    if (!counter) {
      counter = document.createElement("div");
      counter.className = "hidden-counter";
      counter.title = "Show hidden messages";
      counter.addEventListener("click", () => revealHistory(pane));
    }
    counter.textContent = `[${hideUpTo}]`;
    const firstVisible = msgs[hideUpTo];
    if (firstVisible) pane.insertBefore(counter, firstVisible);
    else pane.appendChild(counter);
  } else if (counter) {
    counter.remove();
  }
}

function revealHistory(pane, durationMs = REVEAL_HISTORY_MS) {
  if (!pane) {
    const tab = currentTab();
    pane = tab && tab.paneEl;
  }
  if (!pane) return;
  if (pane._revealTimer) clearTimeout(pane._revealTimer);
  pane.classList.add("revealing");
  pane._revealTimer = setTimeout(() => {
    pane.classList.remove("revealing");
    pane._revealTimer = null;
  }, durationMs);
}

// Parse openclaw's "[Sat 2026-04-25 11:57 MDT]" or "[2026-04-25 11:57:43 MDT]"
// from a user message's raw text. Treats the time as local — close enough for
// fading old history when the user is on the same machine that sent it.
function parseHistoryTimestamp(rawText) {
  if (!rawText) return null;
  const m = /\[(?:[A-Za-z]{3,9} )?(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2}(?::\d{2})?)/.exec(String(rawText));
  if (!m) return null;
  const d = new Date(`${m[1]}T${m[2]}`);
  return isNaN(d.getTime()) ? null : d.getTime();
}

function isModelSwitchMsg(text) {
  return /model (set|switched) to /i.test(text) || /^\/model\s/i.test(text.trim());
}

function renderSystem(text, tab) {
  if (isModelSwitchMsg(text)) return null;
  const el = document.createElement("div");
  el.className = "msg system";
  el.textContent = text;
  tab.paneEl.appendChild(el);
  return el;
}

function renderError(text, tab = null) {
  const t = tab || currentTab();
  const el = document.createElement("div");
  el.className = "msg error";
  el.innerHTML = `<div class="role">Error</div><div class="body"></div>`;
  el.querySelector(".body").textContent = text;
  if (t) t.paneEl.appendChild(el);
  else { console.error(text); alert(text); }
  return el;
}

function renderThinkingCard(parent, label, text, startOpen=false) {
  const card = document.createElement("div");
  card.className = "thinking-card" + (startOpen ? " open" : "");
  card.innerHTML = `
    <div class="hdr">
      <span class="icon">💭</span>
      <span class="label"></span>
      <span class="preview"></span>
      <span class="chev">›</span>
    </div>
    <div class="body-wrap"><div class="body"></div></div>
  `;
  card.querySelector(".label").textContent = label || "thinking";
  if (text) updateThinkingCard(card, text);
  card.querySelector(".hdr").onclick = () => card.classList.toggle("open");
  parent.appendChild(card);
  return card;
}
function updateThinkingCard(card, text) {
  if (!card || typeof text !== "string") return;
  card.querySelector(".body").textContent = text;
  // Preview shows the most recent non-empty line so streaming gives a live
  // "what's it thinking right now" feel even while the card stays collapsed.
  const lines = text.split("\n");
  let last = "";
  for (let i = lines.length - 1; i >= 0; i--) {
    const s = lines[i].trim();
    if (s) { last = s; break; }
  }
  card.querySelector(".preview").textContent = last.slice(0, 200);
}

function extractClaudePrompt(cmd) {
  // Match: claude -p "..." or claude -p '...' or claude --print "..."
  const m = cmd.match(/claude\s+(?:-p|--print)\s+(?:"((?:[^"\\]|\\.)*)"|'((?:[^'\\]|\\.)*)')/);
  if (!m) return null;
  return (m[1] || m[2] || "").replace(/\\"/g, '"').replace(/\\'/g, "'").replace(/\\n/g, "\n");
}

function renderToolCard(parent, toolName, input, startOpen=false) {
  const card = document.createElement("div");
  card.className = "tool-card" + (startOpen ? " open" : "");

  const cmd = (input && typeof input === "object") ? (input.command || "") : "";
  const isClaudeCode = toolName === "exec" && /^\s*claude\s+(-p|--print)\b/.test(cmd);

  card.innerHTML = `
    <div class="hdr">
      <span class="icon">${isClaudeCode ? "🧠" : "🔧"}</span>
      <span class="name"></span>
      <span class="status running">running</span>
      <span class="chev">›</span>
    </div>
    <div class="body-wrap">
      <div class="section input-section"><div class="label"></div><pre></pre></div>
      <div class="section output-section" style="display:none"><div class="label">output</div><pre></pre></div>
    </div>
  `;
  if (isClaudeCode) card.classList.add("claude-code");
  card.querySelector(".name").textContent = isClaudeCode ? "Claude Code" : (toolName || "tool");
  const inputLabel = card.querySelector(".input-section .label");
  const inputPre = card.querySelector(".input-section pre");
  if (isClaudeCode) {
    const prompt = extractClaudePrompt(cmd);
    inputLabel.textContent = "prompt";
    inputPre.textContent = prompt || cmd;
  } else {
    inputLabel.textContent = "input";
    inputPre.textContent = formatToolData(input);
  }
  card.querySelector(".hdr").onclick = () => card.classList.toggle("open");
  parent.appendChild(card);
  return card;
}

function formatToolData(v) {
  if (v === undefined || v === null) return "";
  if (typeof v === "string") return v;
  try { return JSON.stringify(v, null, 2); } catch { return String(v); }
}

function updateToolResult(card, output, isError=false) {
  const statusEl = card.querySelector(".status");
  statusEl.className = "status " + (isError ? "error" : "done");
  statusEl.textContent = isError ? "error" : "done";
  const outSec = card.querySelector(".output-section");
  outSec.style.display = "block";
  outSec.querySelector("pre").textContent = formatToolData(output);
}

function ensureTurn(runId, tab) {
  let t = tab.runs.get(runId);
  if (t) return t;
  const container = renderAssistantContainer(tab);
  t = {
    runId, container,
    textEl: container.querySelector(".text"),
    toolsEl: container.querySelector(".tools"),
    footerEl: container.querySelector(".footer-status"),
    thinkingEl: null,
    toolCards: new Map(),
    lastText: "",
    lastThinking: "",
    startedAt: Date.now(),
    state: "working",
    tickerId: null,
  };
  tab.runs.set(runId, t);
  // (Note: TTS state is reset in onSend at user-submit time, NOT here.
  // Resetting here would abort the in-flight Haiku ack fetch via
  // _ttsAborts, since the first WS event for a new run typically lands
  // ~300ms after user-send — well before Haiku has had time to respond.)
  // Working indicator + 1s elapsed ticker
  t.footerEl.innerHTML = `<div class="working"><span class="blink"></span><span class="label">working</span><span class="elapsed"></span></div>`;
  const labelEl = t.footerEl.querySelector(".label");
  const elapsedEl = t.footerEl.querySelector(".elapsed");
  const tick = () => {
    if (!tab.runs.has(runId)) { clearInterval(t.tickerId); return; }
    const secs = Math.floor((Date.now() - t.startedAt) / 1000);
    elapsedEl.textContent = ` · ${secs}s`;
  };
  tick();
  t.tickerId = setInterval(tick, 1000);
  // Promote "working" → "responding" once we've actually seen content
  t.markResponding = () => {
    if (t.state === "working") {
      t.state = "responding";
      labelEl.textContent = "responding";
    }
  };
  if (tab === currentTab()) scrollToBottom(true);
  return t;
}

function markDirtyIfBackground(tab) {
  if (tab !== currentTab() && !tab.dirty) {
    tab.dirty = true;
    renderTabs();
  }
}

// Reconcile a turn's UI with the canonical assistant message from server
// history. Used after chat:final to pull in thinking/tool data that the
// delta stream didn't carry (common for non-Anthropic models via OpenAI-
// compat APIs — they only stream text, openclaw extracts thinking later).
async function syncTurnFromHistory(tab, turn) {
  // No-op for Hermes: the /v1/chat/completions stream already delivers the full
  // assistant text inline, and there's no server history endpoint to reconcile
  // against. Kept as a stub so the chat:final path stays unchanged.
}

// ── Event handlers ─────────────────────────────────────────────────────────
function handleChatEvent(payload) {
  const { runId, sessionKey, state: chatState, message, errorMessage } = payload;
  if (window.__clawdDebug) console.debug("[chat]", chatState, sessionKey, message?.content);
  const tab = sessionKey ? tabBySession(sessionKey) : null;
  if (!tab) return;
  if (tab.loadingHistory) {
    // Queue this event; we'll replay it once history finishes rendering so the
    // DOM order stays correct (history first, then in-flight content below).
    tab.bufferedEvents.push({ kind: "chat", payload });
    return;
  }

  if (tab.silentRuns.has(runId)) {
    if (chatState === "final" || chatState === "aborted" || chatState === "error") {
      tab.silentRuns.delete(runId);
      // Don't clobber a freshly-started run's id — type-to-interrupt may have
      // already kicked off a new run while this old one was still finishing.
      if (tab.activeRunId === runId) tab.activeRunId = null;
      removePendingByRunId(tab, runId);
      resolveTabRunCompletion(tab, runId, chatState === "final" ? null : chatState);
      // Cascade cleanup: if agent events had already created a turn for this
      // silently-aborted run, tear it down so we don't leave a ticking ghost
      // card behind ("responding · 37s" forever).
      const ghost = tab.runs.get(runId);
      if (ghost) {
        if (ghost.tickerId) clearInterval(ghost.tickerId);
        try { ghost.container?.remove(); } catch {}
        tab.runs.delete(runId);
      }
      if (tab === currentTab()) updateSendButton();
    }
    return;
  }

  // Cascade hook: if this run is mid-cascade (pre-first-token) and errors or
  // aborts, reject the waiter and skip ALL rendering — sendWithCascade will
  // retry on the next tier. The pending bubble is detached from runId by
  // the cascade before aborting, so removePendingByRunId here is a no-op.
  if ((chatState === "error" || chatState === "aborted") && tab.runFirstDelta?.has(runId)) {
    const fd = tab.runFirstDelta.get(runId);
    tab.runFirstDelta.delete(runId);
    tab.activeRunId = null;
    fd.reject(new Error(errorMessage || chatState));
    return;
  }

  const t = ensureTurn(runId, tab);

  if (chatState === "delta" || chatState === "final") {
    // Cascade: any chat activity (text/thinking/tool delta) counts as life.
    markRunAlive(tab, runId);
    if (message) {
      const text = extractText(message.content);
      if (text) {
        if (chatState === "delta") clawdVid.chatting(text);
        t.lastText = text; t.textEl.innerHTML = renderText(text);
        if (tab === currentTab()) ttsFeed(text, chatState === "final");
      }
      if (Array.isArray(message.content)) {
        for (const b of message.content) {
          if (b && (b.type === "tool_use" || b.type === "toolCall") && b.id) {
            if (!t.toolCards.has(b.id)) {
              const card = renderToolCard(t.toolsEl, b.name, b.input || b.arguments);
              t.toolCards.set(b.id, card);
            }
          }
          if (b && b.type === "thinking" && typeof b.thinking === "string") {
            if (!t.thinkingEl) {
              t.thinkingEl = renderThinkingCard(t.container, "thinking", b.thinking);
              t.container.insertBefore(t.thinkingEl, t.toolsEl);
            } else {
              updateThinkingCard(t.thinkingEl, b.thinking);
            }
          }
        }
      }
    }
    markDirtyIfBackground(tab);
  }

  if (chatState === "delta") {
    t.markResponding && t.markResponding();
  }
  if (chatState === "final") {
    if (t.tickerId) clearInterval(t.tickerId);
    t.footerEl.innerHTML = "";
    if (tab.activeRunId === runId) tab.activeRunId = null;
    removePendingByRunId(tab, runId);
    resolveTabRunCompletion(tab, runId, null);
    tab.turnCount = (tab.turnCount || 0) + 1;
    if (tab.turnCount === 3 || tab.turnCount === 9) autoTitleTab(tab).catch(() => {});
    const usedTools = t.toolCards && t.toolCards.size > 0;
    clawdVid.chatting(t.lastText || "", {
      firstEver: tab.turnCount === 1,
      satisfied: usedTools,
    });
    // Sync thinking + tool blocks from server-side history. For non-Anthropic
    // models, deltas don't carry thinking content — it only appears in the
    // persisted message after the run completes.
    syncTurnFromHistory(tab, t).catch(() => {});
    applyVisibility(tab.paneEl);
  } else if (chatState === "aborted") {
    if (t.tickerId) clearInterval(t.tickerId);
    t.footerEl.innerHTML = `<div style="color:var(--warn); font-size:12px">⏹ aborted</div>`;
    if (tab.activeRunId === runId) tab.activeRunId = null;
    removePendingByRunId(tab, runId);
    resolveTabRunCompletion(tab, runId, "aborted");
  } else if (chatState === "error") {
    if (t.tickerId) clearInterval(t.tickerId);
    t.footerEl.innerHTML = `<div style="color:var(--bad); font-size:12px">⚠ ${errorMessage || "error"}</div>`;
    if (tab.activeRunId === runId) tab.activeRunId = null;
    removePendingByRunId(tab, runId);
    resolveTabRunCompletion(tab, runId, errorMessage || "error");
  }

  if (tab === currentTab()) {
    updateSendButton();
    if (chatState === "delta" || chatState === "final") scrollToBottom();
  }
}

// Resolves any in-flight first-token waiter for runId. Called from BOTH chat
// and agent event paths so the cascade treats thinking/tool activity as "the
// run is healthy" — not just text deltas. Without this, a thinking model that
// reasons + tool-calls for >8s before emitting text trips the cascade timeout.
function markRunAlive(tab, runId) {
  if (!tab.runFirstDelta?.has(runId)) return;
  const fd = tab.runFirstDelta.get(runId);
  tab.runFirstDelta.delete(runId);
  fd.resolve();
}

function handleAgentEvent(payload) {
  const { runId, sessionKey, stream, data } = payload;
  if (window.__clawdDebug) console.debug("[agent]", stream, sessionKey, data);
  let tab = sessionKey ? tabBySession(sessionKey) : null;
  if (!tab) tab = state.tabs.find(x => x.runs.has(runId)) || null;
  if (!tab) return;
  if (tab.loadingHistory) {
    tab.bufferedEvents.push({ kind: "agent", payload });
    return;
  }
  // Cascade: ignore agent events for silently-aborted runs — otherwise a
  // thinking/tool delta arriving for an old tier creates an orphan "responding"
  // turn card that never clears.
  if (tab.silentRuns.has(runId)) return;
  markRunAlive(tab, runId);
  const t = ensureTurn(runId, tab);

  if (stream === "tool") {
    const callId = data?.toolCallId || data?.id || ("call-" + Date.now());
    const phase = data?.phase;
    if (phase === "start") {
      const baseName = data?.name || data?.toolName || "tool";
      clawdVid.building(baseName);
      if (!t.toolCards.has(callId)) {
        const argPreview = data?.args?.command || data?.args?.path || data?.args?.url;
        const title = argPreview ? `${baseName}: ${String(argPreview).slice(0, 60)}` : baseName;
        const card = renderToolCard(t.toolsEl, title, data?.args || data?.input);
        t.toolCards.set(callId, card);
      }
      // Have Haiku narrate the tool call, casually, while it's running —
      // unless he's reading his own brain (clawd-md / CLAUDE.md), in which
      // case just emit a short thinking sound (no narration of the path).
      if (_ttsEnabled && tab === currentTab() && !_ttsRealArrived && _fillerLastToolId !== callId) {
        _fillerLastToolId = callId;
        const inputObj = data?.args || data?.input;
        if (isBrainFileRead(baseName, inputObj)) {
          if (_fillerInflight === 0) ttsEnqueue(pickBrainSound(), "tool");
        } else {
          let inputStr = "";
          try { inputStr = inputObj ? JSON.stringify(inputObj).slice(0, 300) : ""; } catch {}
          fillerSpeak({ kind: "tool", toolName: baseName, toolInput: inputStr });
        }
      }
    } else if (phase === "result" || phase === "end") {
      const card = t.toolCards.get(callId);
      const out = data?.output ?? data?.result ?? data?.text ?? data?.content ?? data?.meta ?? "(completed)";
      const isError = !!data?.isError || !!data?.error;
      if (card) updateToolResult(card, out, isError);
      else {
        const orphan = renderToolCard(t.toolsEl, data?.name || "(result)", out, true);
        updateToolResult(orphan, out, isError);
      }
    }
  } else if (stream === "thinking" || stream === "reasoning") {
    const text = data?.text || data?.content;
    if (text) {
      if (!t.thinkingEl) {
        t.thinkingEl = renderThinkingCard(t.container, stream, text);
        t.container.insertBefore(t.thinkingEl, t.toolsEl);
      } else {
        updateThinkingCard(t.thinkingEl, text);
      }
      // Narrate the reasoning out loud. Coalesce rapid deltas into one
      // Haiku call: append to a buffer, fire either when the buffer crosses
      // ~200 chars or 1.2s after the last delta, whichever comes first.
      if (_ttsEnabled && tab === currentTab() && !_ttsRealArrived) {
        const newPart = text.slice(_fillerLastThinkingLen);
        if (newPart) {
          _fillerLastThinkingLen = text.length;
          _fillerThinkingPending += newPart;
          const flush = () => {
            if (!_fillerThinkingPending || _ttsRealArrived) {
              _fillerThinkingPending = "";
              return;
            }
            const snip = _fillerThinkingPending.slice(0, 800);
            _fillerThinkingPending = "";
            fillerSpeak({ kind: "thinking", thinkingText: snip });
          };
          clearTimeout(_fillerThinkingTimer);
          if (_fillerThinkingPending.length >= 200) {
            _fillerThinkingTimer = null;
            flush();
          } else {
            _fillerThinkingTimer = setTimeout(flush, 1200);
          }
        }
      }
    }
  }

  if (t.markResponding) t.markResponding();
  markDirtyIfBackground(tab);
  if (tab === currentTab()) scrollToBottom();
}

// ── Hermes transport (OpenAI-compatible SSE via the local proxy) ───────────
// No socket: server.py holds the Hermes bearer key and proxies /api/hermes/chat.
// connect() just flips to "connected" and repaints the tab's locally-cached
// transcript. Agent continuity is server-side in Hermes, keyed by the session
// key header we send on every turn; the cache is only for repainting the UI.
function connect() {
  state.connected = true;
  const tab = currentTab();
  setStatus("ok", tab ? tab.sessionKey : "ready");
  updateSendButton();
  if (tab && !tab.historyLoaded) loadHistory(tab);
}

// One streaming chat turn. POSTs {sessionKey, text} to the proxy, parses the
// SSE, and dispatches synthesized payloads into the SAME renderers the old WS
// client used (handleChatEvent / handleAgentEvent). `runId` is a client-minted
// id shared by every event of the turn so ensureTurn() groups them under one
// card. Resolves when the stream ends; throws on transport/proxy errors.
async function hermesSend(tab, text, runId) {
  const controller = new AbortController();
  tab.hermesAbort = controller;
  const sk = tab.sessionKey;
  let acc = "";            // accumulated assistant text
  let sawFinal = false;
  const emitChat  = (chatState, extra) => handleChatEvent({ runId, sessionKey: sk, state: chatState, ...extra });
  const emitAgent = (stream, data)     => handleAgentEvent({ runId, sessionKey: sk, stream, data });

  function dispatchSseFrame(frame) {
    let eventName = "message";
    const dataLines = [];
    for (const line of frame.split("\n")) {
      if (line.startsWith("event:")) eventName = line.slice(6).trim();
      else if (line.startsWith("data:")) dataLines.push(line.slice(5).replace(/^ /, ""));
    }
    const raw = dataLines.join("\n");
    if (!raw || raw === "[DONE]") return;
    let obj;
    try { obj = JSON.parse(raw); } catch { return; }
    if (window.__clawdDebug) {
      window.__eventLog.push({ event: eventName, payload: obj, ts: Date.now() });
      if (window.__eventLog.length > 500) window.__eventLog.shift();
    }

    if (eventName === "hermes.tool.progress") {
      const id = obj.toolCallId || ("tool-" + Date.now());
      if (obj.status === "running") {
        emitAgent("tool", { phase: "start", toolCallId: id, name: obj.tool || "tool",
          args: obj.label ? { command: obj.label } : undefined });
      } else {  // completed | error
        emitAgent("tool", { phase: "result", toolCallId: id, name: obj.tool,
          isError: obj.status === "error",
          output: obj.status === "error" ? (obj.error || "error") : "(done)" });
      }
      return;
    }

    // Otherwise: a standard OpenAI chat.completion.chunk
    const choice = obj.choices && obj.choices[0];
    if (!choice) return;
    const delta = choice.delta || {};
    if (typeof delta.content === "string" && delta.content) {
      acc += delta.content;
      emitChat("delta", { message: { content: [{ type: "text", text: acc }] } });
    }
    if (choice.finish_reason) {
      sawFinal = true;
      emitChat("final", { message: { content: [{ type: "text", text: acc }] } });
      saveTurnToCache(tab, text, acc);
    }
  }

  let resp;
  try {
    resp = await fetch("/api/hermes/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionKey: sk, text }),
      signal: controller.signal,
    });
  } catch (e) {
    if (controller.signal.aborted) return;   // user hit Stop before headers
    throw e;
  }
  if (!resp.ok || !resp.body) {
    let msg = `proxy ${resp.status}`;
    try { const j = await resp.json(); msg = j.error || msg; } catch {}
    throw new Error(msg);
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = "";
  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf("\n\n")) >= 0) {       // SSE frames split on blank line
        dispatchSseFrame(buf.slice(0, idx));
        buf = buf.slice(idx + 2);
      }
    }
    if (buf.trim()) dispatchSseFrame(buf);
  } catch (e) {
    if (controller.signal.aborted) return;             // Stop button mid-stream
    emitChat("error", { errorMessage: e.message });
    return;
  } finally {
    if (tab.hermesAbort === controller) tab.hermesAbort = null;
  }
  // Stream closed cleanly without an explicit finish_reason — finalize.
  if (!sawFinal) {
    emitChat("final", { message: { content: [{ type: "text", text: acc }] } });
    saveTurnToCache(tab, text, acc);
  }
}

// ── Local transcript cache ──────────────────────────────────────────────────
// Hermes exposes no history endpoint, so we cache rendered turns per session
// key in localStorage purely to repaint the UI on reload/tab-switch. (The
// agent's own memory is server-side, keyed by the X-Hermes-Session-Key header.)
const HISTORY_KEY = "clawd.history";
function _allHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "{}"); } catch { return {}; } }
function _writeHistory(o) { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(o)); } catch {} }
function getCachedTurns(tab) { return _allHistory()[tab.sessionKey] || []; }
function saveTurnToCache(tab, userText, assistantText) {
  const all = _allHistory();
  const list = all[tab.sessionKey] || [];
  list.push({ role: "user", text: userText });
  list.push({ role: "assistant", text: assistantText });
  all[tab.sessionKey] = list.slice(-200);   // cap per session
  _writeHistory(all);
}
function clearCachedTurns(tab) {
  const all = _allHistory();
  delete all[tab.sessionKey];
  _writeHistory(all);
}

// ── Pending-message persistence ────────────────────────────────────────────
// User-typed messages are kept in sessionStorage so a reload mid-flight doesn't
// lose the prompt. Each entry is tagged with the runId after chat.send returns
// so we can pop it deterministically on chat:final, instead of fuzzy-matching
// against history (which adds timestamp prefixes that break equality checks).
const PENDING_KEY = "clawd.pending";
const PENDING_TTL_MS = 5 * 60 * 1000;  // 5 minutes — drop anything older

function _readAllPending() {
  try { return JSON.parse(sessionStorage.getItem(PENDING_KEY) || "{}"); } catch { return {}; }
}
function _writeAllPending(obj) {
  try { sessionStorage.setItem(PENDING_KEY, JSON.stringify(obj)); } catch {}
}
function getPendingForTab(tab) { return _readAllPending()[tab.sessionKey] || []; }
function setPendingForTab(tab, list) {
  const all = _readAllPending();
  if (list.length === 0) delete all[tab.sessionKey]; else all[tab.sessionKey] = list;
  _writeAllPending(all);
}
function pushPending(tab, text) {
  const list = getPendingForTab(tab);
  const id = "p-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
  list.push({ id, text, ts: Date.now(), runId: null });
  setPendingForTab(tab, list);
  return id;
}
function setPendingRunId(tab, pendingId, runId) {
  const list = getPendingForTab(tab);
  const p = list.find(x => x.id === pendingId);
  if (p) { p.runId = runId; setPendingForTab(tab, list); }
}
function removePendingById(tab, pendingId) {
  const list = getPendingForTab(tab);
  const remaining = list.filter(p => p.id !== pendingId);
  if (remaining.length !== list.length) setPendingForTab(tab, remaining);
}
function removePendingByRunId(tab, runId) {
  if (!runId) return;
  const list = getPendingForTab(tab);
  const remaining = list.filter(p => p.runId !== runId);
  if (remaining.length !== list.length) setPendingForTab(tab, remaining);
}
function purgeOldPending(tab) {
  const now = Date.now();
  const list = getPendingForTab(tab);
  const fresh = list.filter(p => now - (p.ts || 0) < PENDING_TTL_MS);
  if (fresh.length !== list.length) setPendingForTab(tab, fresh);
}
function clearPendingForTab(tab) { setPendingForTab(tab, []); }
// Openclaw bundles user messages with optional system-injection lines
// (e.g. "System: [...] Model switched to X") AND timestamp prefixes
// (e.g. "[Sat 2026-04-25 11:57 MDT] gm"). This extracts ONLY what the user
// actually typed, by taking everything after the LAST timestamp bracket.
// Examples:
//   "[Sat 2026-04-25 11:57 MDT] gm"                                  → "gm"
//   "System: [2026-04-25 11:57:43 MDT] Model switched to X.\n\n\n[Sat 2026-04-25 11:57 MDT] gm"
//                                                                    → "gm"
//   "gm" (no prefix)                                                 → "gm"
function extractUserTypedText(rawText) {
  if (!rawText) return "";
  const text = String(rawText);
  // Match brackets like "[Sat 2026-04-25 11:57 MDT]" or "[2026-04-25 11:57:43 MDT]"
  const re = /\[(?:[A-Za-z]{3,9} )?\d{4}-\d{2}-\d{2} \d{2}:\d{2}(?::\d{2})?(?: [A-Z]{2,5})?\]/g;
  let lastMatch = null, m;
  while ((m = re.exec(text)) !== null) lastMatch = m;
  if (lastMatch) {
    return text.slice(lastMatch.index + lastMatch[0].length).trim();
  }
  // No timestamp wrapper — try stripping "System: [...] ..." prefix line
  const sysStripped = text.replace(/^System:\s*\[[^\]]+\][^\n]*\n+/, "").trim();
  return sysStripped || text.trim();
}

function _normalizeUserText(t) {
  return extractUserTypedText(t).toLowerCase();
}


// ── History load (from local cache — Hermes has no history endpoint) ────────
function loadHistory(tab) {
  tab.loadingHistory = false;   // synchronous repaint, no events to buffer
  tab.bufferedEvents = [];
  tab.paneEl.innerHTML = "";
  tab.runs.clear();
  const turns = getCachedTurns(tab);
  if (turns.length === 0) {
    const el = document.createElement("div");
    el.className = "empty";
    el.innerHTML = `<h2>${tab.displayName}</h2><p>session: <code>${tab.sessionKey}</code><br/>no history yet — say something below.</p>`;
    tab.paneEl.appendChild(el);
    tab.historyLoaded = true;
    return;
  }
  for (const m of turns) {
    if (m.role === "user") {
      renderUserMessage(m.text || "(empty)", tab);
    } else {
      const container = renderAssistantContainer(tab);
      const textEl = container.querySelector(".text");
      if (textEl && m.text) textEl.innerHTML = renderText(m.text);
    }
  }

  // A pending entry means a turn was in flight when we last unloaded; render
  // its user bubble back so nothing is silently dropped (the run itself is
  // gone — Hermes streams aren't resumable across reloads).
  purgeOldPending(tab);
  for (const p of getPendingForTab(tab)) renderUserMessage(p.text, tab);
  clearPendingForTab(tab);

  tab.historyLoaded = true;
  tab.modeApplied = true;   // existing history ⇒ mode already decided
  if (tab === currentTab()) { syncModePicker(tab); updateSendButton(); }
  applyVisibility(tab.paneEl);
  if (tab === currentTab()) {
    requestAnimationFrame(() => {
      const el = getMsgArea();
      if (!el) return;
      el.scrollTop = (tab.scrollTop && tab.scrollTop > 0) ? tab.scrollTop : el.scrollHeight;
    });
  }
}

function extractToolResultText(block) {
  if (!block) return "";
  const c = block.content;
  if (typeof c === "string") return c;
  if (Array.isArray(c)) {
    return c.map(b => {
      if (typeof b === "string") return b;
      if (b?.type === "text") return b.text || "";
      if (b?.type === "image") return "(image)";
      return JSON.stringify(b);
    }).join("\n");
  }
  if (typeof block.text === "string") return block.text;
  return "";
}

// ── Sending ────────────────────────────────────────────────────────────────
function updateSendButton() {
  const tab = currentTab();
  if (tab && tab.activeRunId) {
    $btnSend.textContent = "Stop";
    $btnSend.classList.add("stop");
    $btnSend.disabled = false;
  } else {
    $btnSend.textContent = "Send";
    $btnSend.classList.remove("stop");
    $btnSend.disabled = !state.connected;
  }
}

function resolveTabRunCompletion(tab, runId, reason) {
  const r = tab.runCompletions.get(runId);
  if (!r) return;
  tab.runCompletions.delete(runId);
  if (reason) r.reject(new Error(reason));
  else r.resolve();
}

async function ensureModelSelected(tab) {
  // Hermes serves a single agent/model; there's no per-tab /model switch.
}

async function onSend() {
  const tab = currentTab();
  if (!tab) return;
  let text = $input.value.trim();
  // Type-to-interrupt: if a run is in flight, abort it. Clawd can hang for
  // minutes in a blocking tool call (e.g. cc-session.sh manage waiting on
  // Claude Code) before honoring the abort, so we clear local state right
  // away and fire the abort fire-and-forget. If the user typed something,
  // proceed with the new send below; otherwise this was just a Stop.
  if (tab.activeRunId) {
    abortAndClearLocally(tab);
    if (!text) return;
  }
  if (!text) return;
  if (!state.connected) { renderError("Not connected", tab); return; }

  // On the first send of a tab that has a mode selected, prepend the mode's
  // .md content as a <mode> block so the agent sees it as part of the user's
  // opening turn. modeApplied + the locked picker prevent double-injection.
  const userText = text;  // pre-prepend, used for the ack filler
  if (!tab.modeApplied && (tab.turnCount || 0) === 0 && tab.selectedMode) {
    const m = state.modesById[tab.selectedMode];
    if (m && m.content) {
      text = `<mode name="${m.slug}">\n${m.content.trim()}\n</mode>\n\n${text}`;
    }
    tab.modeApplied = true;
    syncModePicker(tab);
    saveTabs();
  }

  const empty = tab.paneEl.querySelector(".empty");
  if (empty) empty.remove();

  // New turn: clear any in-flight TTS / filler state from the prior turn, and
  // lift any panic-stop mute so this turn speaks normally.
  _ttsMuted = false;
  ttsReset();
  // Fire Haiku stall-talk in parallel with the real RPC so the user hears
  // an ack within ~1s instead of waiting for the main model's first token.
  // Opening the ack window buffers any real text deltas that arrive before
  // the ack response — guarantees ack speaks first. Skip entirely for short
  // messages and bare greetings — the real reply is faster than the stall.
  if (_ttsEnabled && !shouldSkipAck(userText)) {
    openAckWindow();
    fillerSpeak({
      kind: "ack",
      lastUser: userText,
      history: fillerHistorySnapshot(tab, 3),
    });
  }

  scrollToBottom(true);
  renderUserMessage(text, tab);
  clawdVid.thinking();
  if (tab.turnCount === 0) autoTitleTab(tab, text).catch(() => {});
  const pendingId = pushPending(tab, text);
  $input.value = "";
  saveDraft(tab, "");
  autosize($input);

  await sendWithCascade(tab, text, pendingId);
}

// Single clean send: exactly ONE chat.send per user utterance — no client-side
// retries and no per-tier /model switching. OpenClaw owns provider failover via
// the agent's configured `fallbacks` (it correctly fails over on thrown
// auth/rate-limit errors), so the webchat must never re-send the same message.
//
// Why this matters: each chat.send makes OpenClaw append a user turn to the
// session *immediately*, before generation. The old cascade aborted a tier on
// an 8s timeout and re-sent the same text to the next tier — but OpenClaw has
// no per-turn rewind RPC, so every aborted tier left an orphaned `user:Q →
// assistant:(empty)` pair in the transcript it replays to the model. The model
// then saw Q as unanswered and re-answered it alongside the next question, and
// the orphans accumulated over a session ("context creep"). One send = no
// orphans. The function name is kept so the call site stays unchanged.
async function sendWithCascade(tab, text, pendingId) {
  tab.cascadeAborted = false;  // reset at start of every send
  try {
    const runId = "run-" + uuid();
    tab.activeRunId = runId;
    setPendingRunId(tab, pendingId, runId);
    updateSendButton();
    // hermesSend streams the turn, driving handleChatEvent/handleAgentEvent for
    // the full lifecycle (delta → tool cards → final), and resolves at stream end.
    await hermesSend(tab, text, runId);
  } catch (e) {
    console.warn("[send] failed:", e.message);
    // User clicked Stop mid-send (abortAndClearLocally set the flag) — bail
    // quietly without rendering an error.
    if (tab.cascadeAborted) {
      tab.cascadeAborted = false;
    } else {
      renderError("send failed: " + e.message, tab);
    }
    removePendingById(tab, pendingId);
    tab.activeRunId = null;
    updateSendButton();
  }
}

async function onStop() {
  const tab = currentTab();
  if (!tab || !tab.activeRunId) return;
  abortAndClearLocally(tab);
}

// Optimistically tear down the active run on the client so the UI never sticks
// when the gateway is slow to honor an abort. Adds the runId to silentRuns so
// any late deltas / final-event from the doomed run are swallowed cleanly, and
// fires the abort RPC fire-and-forget — awaiting it would re-introduce the
// hang we're trying to avoid.
function abortAndClearLocally(tab) {
  const runId = tab.activeRunId;
  if (!runId) return;
  tab.cascadeAborted = true;
  tab.silentRuns.add(runId);
  tab.activeRunId = null;
  const t = tab.runs.get(runId);
  if (t) {
    if (t.tickerId) clearInterval(t.tickerId);
    if (t.footerEl) {
      t.footerEl.innerHTML = `<div style="color:var(--warn); font-size:12px">⏹ stopped</div>`;
    }
  }
  removePendingByRunId(tab, runId);
  resolveTabRunCompletion(tab, runId, "aborted");
  if (tab === currentTab()) updateSendButton();
  // Abort the in-flight fetch; server.py sees the disconnect and closes its
  // upstream socket to Hermes, which aborts the running turn.
  try { tab.hermesAbort?.abort(); } catch {}
  tab.hermesAbort = null;
}

// Rotate the session key to abandon the current server-side Hermes session and
// start a fresh one. Strips any prior "#suffix" so repeated resets stay clean.
function rotateSessionKey(key) {
  return key.replace(/#[0-9a-f]+$/i, "") + "#" + shortHex(6);
}

async function resetTab(tab) {
  if (!tab) return;
  if (!confirm(`Reset "${tab.displayName}"? This starts a fresh Hermes session — the agent forgets this conversation.`)) return;
  try { tab.hermesAbort?.abort(); } catch {}
  tab.hermesAbort = null;
  clearCachedTurns(tab);
  tab.sessionKey = rotateSessionKey(tab.sessionKey);
  tab.runs.clear();
  tab.activeRunId = null;
  tab.historyLoaded = false;
  tab.lastSentModel = null;
  tab.modeApplied = false;
  clearPendingForTab(tab);
  saveTabs();
  updateSendButton();
  loadHistory(tab);
  setStatus("ok", tab.sessionKey);
}

// ── Click anywhere to focus input ─────────────────────────────────────────
document.addEventListener("click", (e) => {
  if ($widget.classList.contains("minimized")) return;
  if (window.getSelection().toString().length > 0) return;
  if (!e.target.closest("button, a, input, textarea, select, [role='button']")) {
    $input.focus();
  }
});

// ── Input handling ─────────────────────────────────────────────────────────
const INPUT_DRAFT_KEY = "clawd.draft";
function _readDrafts() { try { return JSON.parse(localStorage.getItem(INPUT_DRAFT_KEY) || "{}"); } catch { return {}; } }
function _writeDrafts(o) { try { localStorage.setItem(INPUT_DRAFT_KEY, JSON.stringify(o)); } catch {} }
function saveDraft(tab, text) {
  if (!tab) return;
  const all = _readDrafts();
  if (text && text.length) all[tab.sessionKey] = text;
  else delete all[tab.sessionKey];
  _writeDrafts(all);
}
function loadDraft(tab) {
  if (!tab) return "";
  return _readDrafts()[tab.sessionKey] || "";
}

let _draftSaveTimer = null;
$input.addEventListener("input", () => {
  autosize($input);
  clearTimeout(_draftSaveTimer);
  _draftSaveTimer = setTimeout(() => saveDraft(currentTab(), $input.value), 200);
});
$input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && ((e.metaKey || e.ctrlKey) || !e.shiftKey)) {
    e.preventDefault();
    onSend();
  }
});

document.addEventListener("keydown", (e) => {
  if (e.key === "n" && e.ctrlKey && e.metaKey) {
    e.preventDefault();
    createTab();
  }
  // Ctrl+Alt+Cmd+- toggles speech mode. Use e.code so Option-mangled chars
  // (e.g. "–" en-dash on Mac) still match.
  if (e.code === "Minus" && e.ctrlKey && e.altKey && e.metaKey) {
    e.preventDefault();
    toggleSpeechMode();
  }
});

// ── Speech mode ────────────────────────────────────────────────────────────
const $speechSubtitle = document.getElementById("speechSubtitle");
function setSubtitle(text) {
  if (!$speechSubtitle) return;
  $speechSubtitle.textContent = text || "";
}
function toggleSpeechMode() {
  const on = $widget.classList.toggle("speech");
  localStorage.setItem("clawd.speech", on ? "1" : "0");
  if (!on) setSubtitle("");
  // Auto-focus the invisible composer so the user can just start typing.
  if (on) requestAnimationFrame(() => document.getElementById("speechInput")?.focus());
}
if (localStorage.getItem("clawd.speech") === "1") {
  $widget.classList.add("speech");
  requestAnimationFrame(() => document.getElementById("speechInput")?.focus());
}
document.getElementById("speechMode").addEventListener("click", (e) => {
  // Don't toggle off when interacting with the inline composer or HUD.
  if (e.target.closest("#speechComposer, #speechHud")) return;
  toggleSpeechMode();
});

// Inline composer inside speech mode — forwards through onSend / onStop so
// it shares TTS, ack, stop-button, and draft behavior with the main composer.
const $speechInput = document.getElementById("speechInput");
function speechSend() {
  const tab = currentTab();
  const text = $speechInput.value.trim();
  // Same type-to-interrupt semantics as the main composer: typing a new
  // message while busy aborts the active run and sends the new text.
  if (tab && tab.activeRunId) {
    abortAndClearLocally(tab);
    if (!text) return;
  }
  if (!text) return;
  $input.value = text;
  $speechInput.value = "";
  onSend();
}
$speechInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    speechSend();
  }
});

// ── Text-to-speech ─────────────────────────────────────────────────────────
const $btnSpeak = document.getElementById("btnSpeak");
let _ttsEnabled = localStorage.getItem("clawd.tts") === "1";
let _ttsMuted = false;      // one-shot "shut up" — silences TTS for the rest of
                            // the current turn (panic stop). Cleared on next send.
let _ttsSpokenUpTo = 0;     // char count of fullText already enqueued/spoken
let _ttsTurnFullText = "";  // latest fullText for picking chat variant
let _ttsIdleTimer = null;
let _ttsMode = "browser";   // "elevenlabs" | "openai" | "browser"
let _ttsAudio = null;       // active HTMLAudioElement (openai mode)
let _ttsTurnId = 0;         // bumped on every reset; in-flight requests check this
let _ttsChunkIndex = 0;     // 0 = first chunk this turn (lower split threshold)
let _ttsQueue = [];         // [{ turnId, blobPromise, kind }] played sequentially
let _ttsAborts = [];        // active AbortControllers for in-flight /api/tts fetches
let _ttsDraining = false;   // mutex — only one drain loop active at a time
let _ttsResolveCurrent = null; // resolves the in-flight playback promise (for reset)
// Filler / Haiku stall-talk state — see fillerSpeak(). Lives alongside the
// real-text TTS queue so they share one audio output (no overlap).
// Ack is special: it's the user's "intro to the thought" and must always play
// first. We open an "ack window" on user-send and BUFFER real text deltas
// during it; the window closes when the ack lands (or 2.5s timeout) and
// buffered real flushes through immediately. Tool/thinking narration is
// droppable — dies as soon as real arrives.
let _ttsRealArrived = false;        // first "real" chunk enqueued — drops pending tool/thinking
let _ttsRealAudioStarted = false;   // first "real" chunk actually started playing
let _ackWindowOpen = false;         // while true, real ttsFeed() calls are deferred
let _ackWindowTimer = null;         // timeout that force-closes the window if ack stalls
let _ackPendingTtsFeed = null;      // latest deferred {fullText, isFinal} call
let _fillerLastToolId = null;       // last tool callId we've already narrated
let _fillerLastThinkingLen = 0;     // chars of current thinking stream already consumed
let _fillerThinkingPending = "";    // not-yet-narrated thinking deltas
let _fillerThinkingTimer = null;    // debounce timer for thinking narration
let _fillerInflight = 0;            // # of /api/filler fetches in flight (cap to 1)
const _ACK_WINDOW_MS = 2500;        // max time real text waits for ack before flushing

function ttsStrip(text) {
  return text
    .replace(/```[\s\S]*?```/g, "")          // fenced code blocks
    .replace(/`[^`]*`/g, "")                  // inline code
    .replace(/\*\*([^*]+)\*\*/g, "$1")        // bold
    .replace(/\*([^*]+)\*/g, "$1")            // italic
    .replace(/__([^_]+)__/g, "$1")            // bold underscore
    .replace(/_([^_]+)_/g, "$1")              // italic underscore
    .replace(/^#{1,6}\s+/gm, "")              // headings
    .replace(/^\s*[-*+]\s+/gm, "")            // bullet points
    .replace(/^\s*\d+\.\s+/gm, "")            // numbered lists
    .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")  // links → label only
    .replace(/[>|]/g, "")                      // blockquotes, tables
    .replace(/\s+/g, " ")
    .trim();
}

function ttsReset() {
  _ttsSpokenUpTo = 0;
  _ttsChunkIndex = 0;
  _ttsTurnFullText = "";
  _ttsTurnId++;             // invalidate every in-flight chunk
  _ttsQueue = [];
  _ttsRealArrived = false;
  _ttsRealAudioStarted = false;
  _ackWindowOpen = false;
  clearTimeout(_ackWindowTimer);
  _ackWindowTimer = null;
  _ackPendingTtsFeed = null;
  _fillerLastToolId = null;
  _fillerLastThinkingLen = 0;
  _fillerThinkingPending = "";
  _fillerInflight = 0;
  clearTimeout(_fillerThinkingTimer);
  _fillerThinkingTimer = null;
  clearTimeout(_ttsIdleTimer);
  speechSynthesis.cancel();
  _ttsAborts.forEach(ac => { try { ac.abort(); } catch {} });
  _ttsAborts = [];
  if (_ttsAudio) {
    try { _ttsAudio.pause(); } catch {}
    _ttsAudio.src = "";
    _ttsAudio = null;
  }
  // Unblock any drain loop awaiting the (now-stopped) audio.
  if (_ttsResolveCurrent) { const r = _ttsResolveCurrent; _ttsResolveCurrent = null; r(); }
  setSubtitle("");
}

// Panic "shut up" — silences clawd immediately AND keeps him silent for the
// rest of this turn. Does NOT abort the run (any background work/build keeps
// going); it only kills speech. _ttsMuted gates ttsFeed/ttsEnqueue/fillerSpeak
// so streaming deltas can't restart talking. Cleared at the next user send
// (onSend), so the next message speaks normally. Wired to the 🤫 button and
// the Ctrl+Option+Cmd+Delete global hotkey.
function stopTalking() {
  _ttsMuted = true;
  ttsReset();            // kill current audio, queue, in-flight TTS fetches, subtitle
  try { clawdVid.idle(true); } catch {}
}

async function ttsFetchChunk(text, turnId) {
  const ac = new AbortController();
  _ttsAborts.push(ac);
  try {
    const res = await fetch("/api/tts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
      signal: ac.signal,
    });
    if (!res.ok) throw new Error(`tts ${res.status}: ${await res.text()}`);
    if (turnId !== _ttsTurnId) return null;
    return await res.blob();
  } catch (e) {
    if (e.name !== "AbortError") console.warn("[tts]", e.message);
    return null;
  } finally {
    const i = _ttsAborts.indexOf(ac);
    if (i >= 0) _ttsAborts.splice(i, 1);
  }
}

function ttsPlayBlob(blob, kind, subtitleText) {
  return new Promise(resolve => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.__kind = kind;
    _ttsAudio = audio;
    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      URL.revokeObjectURL(url);
      if (_ttsAudio === audio) _ttsAudio = null;
      if (_ttsResolveCurrent === finish) _ttsResolveCurrent = null;
      resolve();
    };
    _ttsResolveCurrent = finish;
    audio.onplay = () => {
      clearTimeout(_ttsIdleTimer);
      clawdVid.chatting(_ttsTurnFullText);
      if (kind === "real") _ttsRealAudioStarted = true;
      if (kind === "ack") ackTrace("audio.onplay fired — ack is speaking");
      if (subtitleText) setSubtitle(subtitleText);
    };
    audio.onended = () => { if (kind === "ack") ackTrace("audio.onended for ack"); finish(); };
    audio.onerror = (e) => { if (kind === "ack") ackTrace("audio.onerror for ack", audio.error); finish(); };
    audio.play().catch((e) => { if (kind === "ack") ackTrace("audio.play() rejected for ack", e.message); finish(); });
  });
}

async function ttsDrainQueue() {
  if (_ttsDraining) return;     // a drain loop is already running — it'll pick up new items
  _ttsDraining = true;
  try {
    while (_ttsEnabled && _ttsQueue.length) {
      const item = _ttsQueue.shift();
      if (item.kind === "ack") ackTrace("drain shifted ack", { turnIdMatch: item.turnId === _ttsTurnId, realAudioStarted: _ttsRealAudioStarted });
      if (item.turnId !== _ttsTurnId) { if (item.kind === "ack") ackTrace("drain DROP ack: turnId mismatch"); continue; }
      // Drop late tool/thinking once the real answer has begun.
      if ((item.kind === "tool" || item.kind === "thinking") && _ttsRealArrived) continue;
      // Drop late ack once real audio has actually started playing.
      if (item.kind === "ack" && _ttsRealAudioStarted) { ackTrace("drain DROP ack pre-await: realAudioStarted"); continue; }
      let blob = null;
      try { blob = await item.blobPromise; } catch {}
      if (item.kind === "ack") ackTrace("drain awaited ack blob", blob ? `${blob.size} bytes` : "null");
      if (item.turnId !== _ttsTurnId || !_ttsEnabled || !blob) { if (item.kind === "ack") ackTrace("drain DROP ack: turnId/disabled/no-blob"); continue; }
      // Re-check after async wait.
      if ((item.kind === "tool" || item.kind === "thinking") && _ttsRealArrived) continue;
      if (item.kind === "ack" && _ttsRealAudioStarted) { ackTrace("drain DROP ack post-await: realAudioStarted"); continue; }
      if (item.kind === "ack") ackTrace("drain calling ttsPlayBlob for ack");
      await ttsPlayBlob(blob, item.kind, item.text);
      if (item.kind === "ack") ackTrace("drain ack playback done");
    }
  } finally {
    _ttsDraining = false;
  }
  if (!_ttsAudio && !_ttsQueue.length) {
    // Snap to idle right when audio ends so his lips don't keep moving after
    // the voice stops (short grace only, to bridge tiny gaps between chunks).
    _ttsIdleTimer = setTimeout(() => clawdVid.idle(true), 80);
    setSubtitle("");
  }
}

// kind: "real" | "ack" | "tool" | "thinking"
//   - real:               main model output (default)
//   - ack:                "intro to the thought" — always plays unless real
//                         audio has already started; jumps to front of queue.
//   - tool / thinking:    droppable narration; killed when real arrives.
// When the first "real" chunk lands, we drop pending tool/thinking from the
// queue and put a 1.5s grace timer on any currently-playing tool/thinking
// audio. Ack is exempt — it always plays through.
function ttsEnqueue(text, kind = "real") {
  if (_ttsMuted) return;   // panic-stop backstop — block real + filler alike
  const stripped = ttsStrip(text).trim();
  if (kind === "ack") ackTrace("ttsEnqueue called", { stripped, realAudioStarted: _ttsRealAudioStarted, ackWindowOpen: _ackWindowOpen });
  if (!stripped) { if (kind === "ack") ackTrace("DROP: stripped text empty"); return; }
  // Late tool/thinking after real arrived → drop.
  if ((kind === "tool" || kind === "thinking") && _ttsRealArrived) return;
  // Late ack after real has actually started playing → drop.
  if (kind === "ack" && _ttsRealAudioStarted) { ackTrace("DROP in ttsEnqueue: realAudioStarted"); return; }

  const turnId = _ttsTurnId;
  const blobPromise = ttsFetchChunk(stripped, turnId);
  if (kind === "ack") {
    blobPromise.then(b => ackTrace("ack TTS blob arrived", b ? `${b.size} bytes` : "null/aborted"))
               .catch(e => ackTrace("ack TTS blob fetch failed", e.message));
  }
  const item = { turnId, blobPromise, kind, text: stripped };
  // Ack jumps to the front so the user hears it before queued real chunks.
  // (If real audio is already mid-playback, the ack still has to wait for
  // the current chunk to end — that's intentional, no overlap.)
  if (kind === "ack") _ttsQueue.unshift(item);
  else _ttsQueue.push(item);

  if (kind === "real" && !_ttsRealArrived) {
    _ttsRealArrived = true;
    // Drop pending tool/thinking; keep ack and real.
    _ttsQueue = _ttsQueue.filter(it => it.kind === "real" || it.kind === "ack");
    // Soft-cut tool/thinking mid-playback: give 1.5s grace, then hard-cut.
    // Ack is exempt — it's short and the user wants to hear it.
    if (_ttsAudio && (_ttsAudio.__kind === "tool" || _ttsAudio.__kind === "thinking")) {
      const audio = _ttsAudio;
      setTimeout(() => {
        if (_ttsAudio === audio) {
          try { audio.pause(); } catch {}
          if (_ttsResolveCurrent) { const r = _ttsResolveCurrent; _ttsResolveCurrent = null; r(); }
        }
      }, 1500);
    }
  }
  ttsDrainQueue();
}

// ── Filler / Haiku stall-talk ──────────────────────────────────────────────
// Calls /api/filler (Bankr → claude-haiku-4.5) for a quick 1-line voice line
// while the main model is still composing. Three kinds:
//   - ack:      fired once on user-send. Just acknowledges, never answers.
//   - tool:     fired on agent.tool start. Narrates what it's about to do.
//   - thinking: fired (debounced) on agent.thinking deltas. Paraphrases.
// Skipped silently if real text has already started or another filler is
// already in flight (we don't want stacking — ack already covers most stalls).
// Trace for the ack pipeline. Quiet by default; set window.__clawdDebug=true
// in the console to re-enable. Prefix is searchable: "[clawd-ack]".
let _ackTraceStart = 0;
function ackTrace(...args) {
  if (!window.__clawdDebug) return;
  const dt = _ackTraceStart ? `+${Date.now() - _ackTraceStart}ms` : "0ms";
  console.log(`%c[clawd-ack ${dt}]`, "color:#ff8855;font-weight:bold", ...args);
}

async function fillerSpeak({ kind, lastUser, toolName, toolInput, thinkingText, history }) {
  if (kind === "ack") { _ackTraceStart = Date.now(); ackTrace("fillerSpeak ENTER", { ttsEnabled: _ttsEnabled, ttsMode: _ttsMode, realArrived: _ttsRealArrived, realAudioStarted: _ttsRealAudioStarted, ackWindowOpen: _ackWindowOpen, fillerInflight: _fillerInflight }); }
  if (!_ttsEnabled || _ttsMuted) { if (kind === "ack") ackTrace("DROP: tts disabled/muted"); return; }
  if (_ttsMode === "browser") { if (kind === "ack") ackTrace("DROP: tts mode is browser (no /api/tts pipeline)"); return; }
  // Entry guards (per-kind):
  //   - ack:               only blocked if real audio already started playing
  //   - tool / thinking:   blocked once real has arrived OR another filler is in flight
  if (kind === "ack") {
    if (_ttsRealAudioStarted) { ackTrace("DROP: real audio already started before ack fired"); return; }
  } else {
    if (_ttsRealArrived) return;
    if (_fillerInflight > 0) return;
  }
  const turnId = _ttsTurnId;
  _fillerInflight++;
  const ac = new AbortController();
  _ttsAborts.push(ac);
  try {
    if (kind === "ack") ackTrace("fetching /api/filler");
    const res = await fetch("/api/filler", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ kind, lastUser, toolName, toolInput, thinkingText, history }),
      signal: ac.signal,
    });
    if (kind === "ack") ackTrace("fetch returned", { ok: res.ok, status: res.status });
    if (!res.ok) {
      if (kind === "ack") ackTrace("DROP: HTTP not ok", res.status);
      else if (window.__clawdDebug) console.warn("[filler]", kind, "HTTP", res.status);
      return;
    }
    const data = await res.json();
    if (kind === "ack") ackTrace("response parsed", { text: data?.text, error: data?.error });
    if (turnId !== _ttsTurnId || !_ttsEnabled) { if (kind === "ack") ackTrace("DROP: turnId mismatch or tts disabled"); return; }
    // Exit guards mirror entry guards (state may have advanced during fetch).
    if (kind === "ack" ? _ttsRealAudioStarted : _ttsRealArrived) {
      if (kind === "ack") ackTrace("DROP post-fetch: realAudioStarted=true (real audio began playing during ack fetch)");
      return;
    }
    const text = (data?.text || "").trim();
    if (!text) { if (kind === "ack") ackTrace("DROP: empty text from /api/filler"); return; }
    if (kind === "ack") ackTrace("calling ttsEnqueue", text);
    ttsEnqueue(text, kind);   // kind passes through: "ack" | "tool" | "thinking"
    if (kind === "ack") ackTrace("ttsEnqueue returned, queue length now", _ttsQueue.length);
  } catch (e) {
    if (kind === "ack") ackTrace("DROP: exception", e.name, e.message);
    else if (e.name !== "AbortError" && window.__clawdDebug) console.warn("[filler]", e.message);
  } finally {
    _fillerInflight = Math.max(0, _fillerInflight - 1);
    const i = _ttsAborts.indexOf(ac);
    if (i >= 0) _ttsAborts.splice(i, 1);
    if (kind === "ack") {
      // Always close the ack window when the ack request settles — success,
      // skip, or error. Buffered real text gets to play.
      ackTrace("calling closeAckWindow from finally");
      closeAckWindow("ack-settled");
    }
  }
}

// Open a brief "ack window" right after the user submits. While it's open,
// real text deltas are buffered so the ack reliably plays first. Closes
// when the ack lands (fillerSpeak success), the ack fails, or _ACK_WINDOW_MS
// elapses — whichever comes first. After close, any buffered ttsFeed call
// is replayed exactly once with the latest cumulative text.
function openAckWindow() {
  _ackWindowOpen = true;
  clearTimeout(_ackWindowTimer);
  _ackWindowTimer = setTimeout(() => { ackTrace("ack window TIMEOUT (haiku slower than 2.5s)"); closeAckWindow("timeout"); }, _ACK_WINDOW_MS);
  ackTrace("openAckWindow");
}
function closeAckWindow(reason) {
  if (!_ackWindowOpen) return;
  _ackWindowOpen = false;
  clearTimeout(_ackWindowTimer);
  _ackWindowTimer = null;
  ackTrace("closeAckWindow", reason, "pendingTtsFeed:", !!_ackPendingTtsFeed);
  if (_ackPendingTtsFeed) {
    const { fullText, isFinal } = _ackPendingTtsFeed;
    _ackPendingTtsFeed = null;
    ttsFeed(fullText, isFinal);   // window now closed — falls through to normal path
  }
}

// Touching clawd-md / CLAUDE.md / .claude / workspace-clawd files is the
// assistant looking at its own instructions — *thinking*, not doing work.
// Match ANY tool whose input mentions one of these paths (Read file_path,
// Bash `cat`/`head`/`grep`, etc.). We just check for the path substring;
// no need to enumerate command shapes.
const _BRAIN_PATH_RE = /(clawd-md\/|claude\.md|\.claude\/|workspace-clawd\/)/i;
const _BRAIN_SOUNDS = ["Hmm.", "Hmmm.", "Mmm.", "Hrmm.", "Hm, lemme see.", "Mm-hmm.", "Mmm, okay."];
function isBrainFileRead(toolName, toolInput) {
  let inputStr = "";
  try {
    inputStr = typeof toolInput === "string" ? toolInput : JSON.stringify(toolInput || {});
  } catch { inputStr = String(toolInput || ""); }
  return _BRAIN_PATH_RE.test(inputStr);
}
function pickBrainSound() {
  return _BRAIN_SOUNDS[Math.floor(Math.random() * _BRAIN_SOUNDS.length)];
}

// Short messages and bare greetings don't need an ack — the model will
// answer almost as fast as Haiku could stall, and the ack ends up echoing
// the greeting back ("gm let me think" feels like an answer, not a stall).
const _GREETING_RE = /^(gm|gn|gn8|good\s+(morning|night|evening|afternoon|day)|hi|hello|hey|howdy|sup|yo|hiya|greetings|hola|aloha|ok|k|kk|okay|thanks|thx|ty|cool|nice|great|got\s*it|cheers|bye|cya|night|morning)\b[!.?\s]*$/i;
function shouldSkipAck(text) {
  const t = (text || "").trim();
  if (t.length < 10) return true;       // too short to bother
  if (_GREETING_RE.test(t)) return true; // bare greeting
  return false;
}

// Pull the last few user/assistant turns from the DOM as bare text — keeps
// the Haiku context tight. Each entry: {role, content}.
function fillerHistorySnapshot(tab, n = 3) {
  if (!tab || !tab.paneEl) return [];
  const out = [];
  const msgs = tab.paneEl.querySelectorAll(".msg.user, .msg.assistant");
  const take = Math.min(msgs.length, n * 2);
  for (let i = msgs.length - take; i < msgs.length; i++) {
    const m = msgs[i];
    const role = m.classList.contains("user") ? "user" : "assistant";
    const body = m.querySelector(".text") || m.querySelector(".body");
    const content = (body?.textContent || "").trim().slice(0, 400);
    if (content) out.push({ role, content });
  }
  return out;
}

// First chunk: split on any pause (',' ';' ':' '.' '!' '?' '\n') for fast first-audio.
// Later chunks: full sentence boundary only, for smoother delivery.
const _TTS_FIRST_RE = /^([\s\S]*?[.,!?;:\n])\s/;
const _TTS_SENT_RE  = /^([\s\S]*?[.!?\n])\s/;
// Hard cap so a long unbroken stream doesn't stall forever.
const _TTS_MAX_CHUNK = 240;

function ttsFeed(fullText, isFinal) {
  if (!_ttsEnabled || _ttsMuted) return;
  // Hold real text while we're waiting for the ack to land. We only stash
  // the latest cumulative {fullText, isFinal} — closeAckWindow replays it.
  if (_ackWindowOpen) {
    if (!_ackPendingTtsFeed) ackTrace("ttsFeed: BUFFERING real text (window open)", fullText.slice(0, 60));
    _ackPendingTtsFeed = { fullText, isFinal };
    _ttsTurnFullText = fullText;   // keep video sync up to date even while deferred
    return;
  }
  _ttsTurnFullText = fullText;
  if (_ttsMode !== "browser") {
    while (true) {
      const newPart = fullText.slice(_ttsSpokenUpTo);
      if (!newPart) return;
      if (isFinal) {
        ttsEnqueue(newPart);
        _ttsSpokenUpTo = fullText.length;
        _ttsChunkIndex++;
        return;
      }
      const re = _ttsChunkIndex === 0 ? _TTS_FIRST_RE : _TTS_SENT_RE;
      const m = newPart.match(re);
      if (m) {
        ttsEnqueue(m[1]);
        _ttsSpokenUpTo += m[0].length;
        _ttsChunkIndex++;
        continue;            // try to drain more boundaries from same buffer
      }
      if (newPart.length >= _TTS_MAX_CHUNK) {
        const cut = newPart.lastIndexOf(" ", _TTS_MAX_CHUNK);
        const split = cut > 40 ? cut : _TTS_MAX_CHUNK;
        ttsEnqueue(newPart.slice(0, split));
        _ttsSpokenUpTo += split;
        _ttsChunkIndex++;
        continue;
      }
      return;                // wait for more text
    }
  }
  // ── Browser SpeechSynthesis fallback (unchanged behavior) ──
  const newPart = fullText.slice(_ttsSpokenUpTo);
  if (!newPart) return;
  function mkUtt(text) {
    const stripped = ttsStrip(text);
    const utt = new SpeechSynthesisUtterance(stripped);
    utt.rate = 1.25;
    utt.onstart = () => { clearTimeout(_ttsIdleTimer); clawdVid.chatting(_ttsTurnFullText); setSubtitle(stripped); };
    utt.onend   = () => { _ttsIdleTimer = setTimeout(() => clawdVid.idle(true), 80); setSubtitle(""); };
    return utt;
  }
  if (isFinal) {
    const rem = newPart.trim();
    if (rem) speechSynthesis.speak(mkUtt(rem));
    _ttsSpokenUpTo = fullText.length;
    return;
  }
  const m = newPart.match(/([\s\S]*[.!?\n])\s*/);
  if (m) {
    const toSpeak = m[1].trim();
    if (toSpeak) speechSynthesis.speak(mkUtt(toSpeak));
    _ttsSpokenUpTo += m[0].length;
  }
}

function applyTtsState() {
  $btnSpeak.classList.toggle("active", _ttsEnabled);
  $btnSpeak.textContent = _ttsEnabled ? "🔊" : "🔇";
  const label = _ttsMode === "elevenlabs" ? "ElevenLabs"
              : _ttsMode === "openai" ? "Onyx"
              : "TTS";
  $btnSpeak.title = _ttsEnabled ? `${label} on — click to mute` : `${label} off — click to enable`;
}
applyTtsState();

$btnSpeak.addEventListener("click", () => {
  _ttsEnabled = !_ttsEnabled;
  localStorage.setItem("clawd.tts", _ttsEnabled ? "1" : "0");
  applyTtsState();
  if (!_ttsEnabled) ttsReset();
});

// 🤫 panic "shut up" — stop talking now without disabling TTS for next turn.
const $btnStopTalk = document.getElementById("btnStopTalk");
if ($btnStopTalk) $btnStopTalk.addEventListener("click", stopTalking);

// ── Voice input ────────────────────────────────────────────────────────────
const $btnMic = document.getElementById("btnMic");
let _recog = null;
let _recording = false;
let _cancelSend = false;

function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { renderError("Speech recognition not supported — needs Chrome/Edge."); return; }
  ttsReset();   // kill in-flight TTS so the mic doesn't pick up Matthew's voice
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = "en-US";
  let sessionFinal = "";
  let silenceTimer = null;
  const baseText = $input.value.trimEnd();

  function resetSilenceTimer() {
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => { _cancelSend = false; stopRecording(); }, 777);
  }

  r.onstart = () => {
    _recording = true;
    _cancelSend = false;
    $btnMic.classList.add("recording");
    $btnMic.title = "Recording… click to cancel";
    clawdVid.listening();
  };
  r.onresult = (e) => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) sessionFinal += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    $input.value = (baseText ? baseText + " " : "") + sessionFinal + interim;
    autosize($input);
    resetSilenceTimer();
  };
  r.onerror = (e) => {
    clearTimeout(silenceTimer);
    if (e.error !== "aborted" && e.error !== "no-speech") {
      console.warn("mic:", e.error);
      if (e.error === "not-allowed" || e.error === "service-not-allowed")
        renderError("🎤 blocked — this window needs microphone permission. Open DevTools→reload, or relaunch the app window and click Allow.");
      else
        renderError("🎤 error: " + e.error);
    }
    _cancelSend = true;
    stopRecording();
  };
  r.onend = () => {
    clearTimeout(silenceTimer);
    _recording = false;
    $btnMic.classList.remove("recording");
    $btnMic.title = "Voice input";
    _recog = null;
    if (!_cancelSend && $input.value.trim()) onSend();
    else clawdVid.idle(true);
  };
  _recog = r;
  try {
    r.start();
  } catch (err) {
    // r.start() throws synchronously if a prior recognition instance still holds
    // the mic (toggle desync) — this used to fail completely silently.
    console.warn("mic start failed:", err);
    renderError("🎤 couldn't start: " + (err && err.message ? err.message : err) + " — try once more.");
    _recog = null;
    _recording = false;
    try { clawdVid.idle(true); } catch {}
  }
}

function stopRecording() {
  if (_recog) { try { _recog.stop(); } catch {} }
}

$btnMic.addEventListener("click", () => {
  if (_recording) { _cancelSend = true; stopRecording(); }
  else startRecording();
});

// SSE — receive global hotkey trigger from hotkey.py
const _micEvents = new EventSource("/events");
_micEvents.onmessage = (e) => {
  if (e.data === "toggle-mic") {
    if (_recording) { _cancelSend = true; stopRecording(); }
    else startRecording();
  } else if (e.data === "toggle-view") {
    toggleMinimize();
  } else if (e.data === "reveal-history") {
    revealHistory();
  } else if (e.data === "new-tab") {
    createTab();
  } else if (e.data === "stop-talking") {
    stopTalking();
  } else if (e.data === "toggle-speech-mode") {
    toggleSpeechMode();
  }
};

// ── Model picker ───────────────────────────────────────────────────────────
function initModelPicker() {
  const sel = document.getElementById("modelPicker");
  const tab = currentTab();
  if (tab) {
    if ([...sel.options].some(o => o.value === tab.selectedModel)) sel.value = tab.selectedModel;
    else { sel.value = DEFAULT_MODEL; tab.selectedModel = DEFAULT_MODEL; }
  }
  sel.addEventListener("change", () => {
    const t = currentTab();
    if (!t) return;
    t.selectedModel = sel.value;
    saveTabs();
  });
}

// ── Mode picker ────────────────────────────────────────────────────────────
function initModePicker() {
  const sel = document.getElementById("modePicker");
  if (!sel) return;
  sel.addEventListener("change", () => {
    const t = currentTab();
    if (!t) return;
    if (t.modeApplied || (t.turnCount || 0) > 0) {
      syncModePicker(t);  // snap back; not allowed mid-conversation
      return;
    }
    t.selectedMode = sel.value || "";
    syncModePicker(t);
    saveTabs();
  });
}

// ── Boot ───────────────────────────────────────────────────────────────────
async function boot() {
  // Settings/auth config
  const stored = localStorage.getItem("clawd.config");
  if (stored) {
    try {
      const cfg = JSON.parse(stored);
      // Drop legacy sessionKey field — sessions live on tabs now
      delete cfg.sessionKey;
      state.config = cfg;
    } catch {}
  }
  // Ask the server for backend config (Hermes status + TTS backend). The
  // Hermes URL/key live server-side; the browser never sees them.
  state.config = state.config || {};
  try {
    const resp = await fetch("/config");
    const cfg = await resp.json();
    if (!cfg.hermesConfigured) {
      setStatus("bad", "Hermes not configured — set HERMES_BASE_URL/HERMES_API_KEY");
      console.warn("[config] Hermes not configured on the server");
    }
    _ttsMode = (cfg.ttsBackend && cfg.ttsBackend !== "none") ? cfg.ttsBackend : "browser";
    console.log("[tts] backend:", _ttsMode);
    applyTtsState();
  } catch (e) { console.warn("no /config endpoint", e); }

  // Initialize tabs (restore from storage or seed default)
  const restored = loadTabsFromStorage();
  if (restored && restored.length) {
    state.tabs = restored;
    for (const t of state.tabs) $transcript.appendChild(t.paneEl);
    const savedActive = localStorage.getItem("clawd.activeTab");
    state.activeTabId = (savedActive && state.tabs.find(t => t.id === savedActive)) ? savedActive : state.tabs[0].id;
  } else {
    const tab = makeTab({
      id: "ui-" + shortHex(6),
      sessionKey: "agent:clawd:main",
      displayName: "new chat 1",
      selectedModel: localStorage.getItem("clawd.model") || DEFAULT_MODEL,
    });
    state.tabs.push(tab);
    $transcript.appendChild(tab.paneEl);
    state.activeTabId = tab.id;
    saveTabs();
  }
  state.tabs.forEach(t => t.paneEl.classList.toggle("active", t.id === state.activeTabId));
  renderTabs();
  initModelPicker();
  initModePicker();
  loadModes();
  // Restore composer draft for the active tab
  const _activeTab = currentTab();
  if (_activeTab) {
    $input.value = loadDraft(_activeTab);
    autosize($input);
  }
  connect();
}

window.__clawdState = state;
boot();
</script>
